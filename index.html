<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATC Training Center - NextGen</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --radar-green: #00ff41;
            --radar-dim: #004411;
            --danger-red: #ff3333;
            --text-white: #e0e0e0;
            --primary-blue: #4f46e5;
            --card-bg: #1a1a1a;
            --border-color: #333;
        }

        * { box-sizing: border-box; } /* 레이아웃 깨짐 방지 핵심 */

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.5;
        }

        .container { 
            width: 100%; 
            max-width: 600px; 
            margin: 0 auto;
        }

        .mode-card { 
            background: var(--card-bg); 
            border-radius: 16px; 
            padding: 20px; 
            margin-bottom: 20px; 
            border: 1px solid var(--border-color);
            transition: transform 0.2s ease;
        }

        button { 
            border-radius: 12px; 
            cursor: pointer; 
            transition: all 0.2s; 
            font-weight: bold; 
            border: 1px solid transparent; 
            padding: 12px; 
            width: 100%; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:active { transform: scale(0.98); }
        button:disabled { 
            background-color: #222 !important; 
            color: #555 !important; 
            cursor: not-allowed; 
            opacity: 0.6; 
            border-color: var(--border-color) !important;
        }

        .btn-start { background: var(--primary-blue); color: white; }
        .btn-stats { 
            background: #4b5563; 
            color: white; 
            font-size: 0.75rem; 
            width: auto; 
            padding: 6px 12px; 
        }

        /* 토글 스위치 정렬 보정 */
        .toggle-container { 
            background: #1f1f1f; 
            border-radius: 50px; 
            padding: 8px 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 15px; 
            margin-bottom: 30px; 
            color: #aaa; 
            font-size: 0.9rem;
            border: 1px solid var(--border-color);
        }

        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { 
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; 
            background-color: #444; transition: .4s; border-radius: 34px; 
        }
        .slider:before { 
            position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; 
            background-color: white; transition: .4s; border-radius: 50%; 
        }
        input:checked + .slider { background-color: var(--danger-red); }
        input:checked + .slider:before { transform: translateX(24px); }

        /* 프로그레스 바 */
        .progress-container { 
            width: 100%; 
            background: #222; 
            height: 6px; 
            border-radius: 3px; 
            margin: 20px 0; 
            overflow: hidden; 
        }
        .progress-bar { 
            height: 100%; 
            background: var(--radar-green); 
            width: 0%; 
            transition: width 0.4s ease;
            box-shadow: 0 0 10px var(--radar-green);
        }

        /* 데이터 센터 테이블 모바일 대응 */
        .stats-wrap { 
            width: 100%; 
            overflow-x: auto; 
            margin-top: 10px; 
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: 0.8rem; 
            background: #111; 
            min-width: 500px;
        }
        th { 
            background: #1a1a1a; 
            padding: 12px; 
            color: var(--radar-green); 
            border-bottom: 2px solid var(--border-color);
            position: sticky; top: 0;
        }
        td { padding: 12px; border-bottom: 1px solid #222; text-align: center; vertical-align: middle; }

        .rate-bg { width: 100%; background: #333; height: 4px; border-radius: 2px; margin-top: 6px; }
        .rate-bar { height: 100%; background: var(--danger-red); border-radius: 2px; }

        #feedback-layer { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: #111; 
            border-top: 3px solid var(--radar-green); 
            padding: 24px; 
            display: none; 
            z-index: 1000; 
            max-height: 80vh; 
            overflow-y: auto; 
            border-radius: 24px 24px 0 0;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }

        .hidden { display: none !important; }

        /* 애니메이션 */
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        #loading-msg { animation: pulse 1.5s infinite; }
    </style>
</head>
<body>

<div class="container">
    <div id="main-page">
        <h1 style="text-align: center; margin-bottom: 8px; letter-spacing: -1px;">항공 훈련 관제소</h1>
        <p style="text-align: center; color: #888; font-size: 0.85rem; margin-bottom: 30px;">포커 소좌, 시스템이 온라인 상태입니다.</p>
        
        <div class="toggle-container">
            <span>NORMAL</span>
            <label class="switch">
                <input type="checkbox" id="diff-toggle" onchange="window.setDifficulty(this.checked)">
                <span class="slider"></span>
            </label>
            <span style="color:var(--danger-red); font-weight: bold;">HELL (INFERNO)</span>
        </div>

        <div id="subject-cards">
            <!-- 법규 섹션 -->
            <div class="mode-card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom:16px;">
                    <span style="font-size: 1.1rem; font-weight: bold;">✈️ 항공법규 (Law)</span>
                    <button class="btn-stats" onclick="window.loadStats('LAW')">📊 DATA</button>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <button class="btn-start" onclick="window.prepMission('LAW', 'MULTI')">객관식</button>
                    <button class="btn-start" onclick="window.prepMission('LAW', 'SUBJ')">주관식</button>
                </div>
            </div>
            
            <!-- 관제 섹션 -->
            <div class="mode-card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom:16px;">
                    <span style="font-size: 1.1rem; font-weight: bold;">📡 항공관제 (Control)</span>
                    <button class="btn-stats" onclick="window.loadStats('CTRL')">📊 DATA</button>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <button class="btn-start" onclick="window.prepMission('CTRL', 'MULTI')">객관식</button>
                    <button class="btn-start" onclick="window.prepMission('CTRL', 'SUBJ')">주관식</button>
                </div>
            </div>
        </div>

        <div id="mode-selection" class="hidden">
            <p style="text-align:center; color:orange; font-weight:bold; margin-bottom: 20px;">MISSION PROFILE SELECT</p>
            <button class="btn-start" onclick="window.loadQuiz('OMAKASE')" style="background:#222; border:1px solid #444; margin-bottom:12px;">🍱 100문항 오마카세 (신규)</button>
            <button class="btn-start" onclick="window.loadQuiz('WRONG')" style="background:#222; border:1px solid #444;">📝 100문항 오답노트 (복습)</button>
            <button onclick="location.reload()" style="background:none; color:#666; margin-top:30px; border:1px solid #333; font-size: 0.8rem;">BACK TO BASE</button>
        </div>
    </div>

    <!-- 통계 페이지 -->
    <div id="stats-page" class="hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="margin:0; color:var(--radar-green); font-size: 1.2rem;">DATA CENTER</h2>
            <button onclick="location.reload()" style="padding:8px 16px; background:#333; color:white; width: auto; font-size: 0.8rem;">RTB</button>
        </div>
        <div class="stats-wrap">
            <table>
                <thead>
                    <tr>
                        <th onclick="window.sortStats('type')">유형</th>
                        <th onclick="window.sortStats('problem')">문제 분석</th>
                        <th onclick="window.sortStats('count')">기출</th>
                        <th onclick="window.sortStats('wrong')">오답</th>
                        <th onclick="window.sortStats('rate')">율</th>
                    </tr>
                </thead>
                <tbody id="stats-body"></tbody>
            </table>
        </div>
    </div>

    <!-- 퀴즈 페이지 -->
    <div id="quiz-page" class="hidden">
        <div style="display: flex; justify-content: space-between; color:var(--radar-green); font-size:0.75rem; font-family: monospace;" id="pos-display"></div>
        <div class="progress-container"><div class="progress-bar" id="pb"></div></div>
        <div id="question-box" style="margin:25px 0; font-size:1.1rem; line-height:1.6; min-height:100px; padding: 15px; background: #111; border-radius: 12px; border-left: 4px solid var(--primary-blue);"></div>
        <div id="answer-area" style="display: flex; flex-direction: column; gap: 10px;"></div>
        <button onclick="window.stopSession()" style="border:1px solid #444; color:#666; margin-top:40px; background: none; font-size: 0.8rem;">ABORT MISSION (EXIT)</button>
    </div>

    <div id="loading-page" class="hidden">
        <div style="text-align: center; margin-top: 150px;">
            <h2 id="loading-msg" style="color: var(--radar-green); letter-spacing: 2px;">LINKING TO TOWER...</h2>
            <p style="color: #555;">데이터 동기화 중</p>
        </div>
    </div>
</div>

<div id="feedback-layer">
    <div id="result-status" style="text-align:center; padding:12px; font-weight:bold; border-radius:8px; margin-bottom:15px; font-size: 1.1rem;"></div>
    <div style="background:#1a1a1a; padding:18px; border-radius:12px; margin-bottom:15px; border: 1px solid #333;">
        <div id="correct-ans-show" style="color:var(--radar-green); font-weight:bold; margin-bottom:12px; font-size: 1rem; border-bottom: 1px solid #333; padding-bottom: 8px;"></div>
        <div id="explanation-box" style="font-size:0.9rem; line-height:1.6; color:#aaa; white-space:pre-wrap;"></div>
    </div>
    <div style="display:flex; gap:10px; margin-bottom:12px;">
        <button id="go-around-btn" style="flex:1; border:1px solid var(--radar-green); color:var(--radar-green); background:none; font-size: 0.85rem;">✈️ GO AROUND</button>
        <button id="deviation-btn" style="flex:1; border:1px solid orange; color:orange; background:none; font-size: 0.85rem;">⚠️ DEVIATION</button>
    </div>
    <button id="next-btn" style="background:var(--radar-green); color:black; font-size:1.1rem; border:none; margin-top:8px;">NEXT CONTACT</button>
</div>

<script>
/** [SECURITY & ARCHITECTURE] */
window.state = {
    difficulty: 'EZ',
    subject: '',
    type: '',
    questions: [],
    currentIndex: 0,
    sessionResults: [],
    reportedIds: [],
    excludedIds: [],
    statsData: [],
    isProcessing: false
};

const CONFIG = {
    EZ: {
        URL: "https://script.google.com/macros/s/AKfycbxQdRw8bAcYSfZWNV6r808lVpwED88FaZj6bviR1pMZ2DimYDKHYu13jeT7oXaT04ErGw/exec",
        GIDs: { LAW_MULTI: 0, LAW_SUBJ: 1036407965, CTRL_MULTI: 438358690, CTRL_SUBJ: 1403157384, LAW_STATS: 1846282036, CTRL_STATS: 1880986641 }
    },
    INFERNO: {
        URL: "https://script.google.com/macros/s/AKfycbzjGLlSq7-xpO0dZxCWExg06paUtwsP1kcPBXTCXhDzm8wkU0CJCyCADB0gJKsU76z7RA/exec",
        GIDs: { LAW_MULTI: 0, LAW_SUBJ: 1805786990, CTRL_MULTI: 2049752243, CTRL_SUBJ: 570358631, LAW_STATS: 668283973, CTRL_STATS: 1546545747 }
    }
};
  
window.showPage = function(id) {
    const pages = ['main-page', 'stats-page', 'loading-page', 'quiz-page'];
    pages.forEach(p => {
        const el = document.getElementById(p);
        if(el) el.classList.add('hidden');
    });
    const target = document.getElementById(id);
    if(target) target.classList.remove('hidden');
};

window.setDifficulty = function(isHell) {
    window.state.difficulty = isHell ? 'INFERNO' : 'EZ';
    console.log(`[SYSTEM] Difficulty shifted to: ${window.state.difficulty}`);
};

window.prepMission = function(sub, type) {
    window.state.subject = sub;
    window.state.type = type;
    document.getElementById('subject-cards').classList.add('hidden');
    document.getElementById('mode-selection').classList.remove('hidden');
};

window.loadQuiz = async function(mode) {
    window.showPage('loading-page');
    const cfg = CONFIG[window.state.difficulty];
    const targetGid = cfg.GIDs[`${window.state.subject}_${window.state.type}`];
    
    try {
        const res = await fetch(`${cfg.URL}?gid=${targetGid}`);
        if (!res.ok) throw new Error("Link Failure");
        let data = await res.json();
        
        if (mode === 'OMAKASE') {
            data.sort((a,b) => (Number(a['누적 기출 횟수'])||0) - (Number(b['누적 기출 횟수'])||0));
        } else {
            data.sort((a,b) => (Number(b['누적 오답 횟수'])||0) - (Number(a['누적 오답 횟수'])||0));
        }
        
        window.state.questions = data.slice(0, 100);
        window.state.currentIndex = 0;
        window.state.sessionResults = [];
        window.state.isProcessing = false;
        
        window.renderQuestion();
        window.showPage('quiz-page');
    } catch(e) { 
        alert("통신 절차 실패. 타워 신호를 확인하십시오."); 
        location.reload(); 
    }
};

window.renderQuestion = function() {
    const q = window.state.questions[window.state.currentIndex];
    const total = window.state.questions.length;
    
    document.getElementById('pos-display').innerHTML = `<span>POSITION: ${window.state.currentIndex + 1} / ${total}</span><span>SQ: ${Math.random().toString(16).slice(2,6).toUpperCase()}</span>`;
    document.getElementById('pb').style.width = `${((window.state.currentIndex + 1) / total) * 100}%`;
    document.getElementById('question-box').innerText = `[${q.대분류 || 'UNCLASSIFIED'}] ${q.문제}`;
    
    const area = document.getElementById('answer-area');
    area.innerHTML = '';

    if (window.state.type === 'MULTI') {
        for(let i=1; i<=4; i++) {
            const btn = document.createElement('button');
            btn.style = "text-align:left; background:#1a1a1a; color:#eee; border:1px solid #333; padding: 15px 20px; justify-content: flex-start;";
            btn.innerText = `${i}. ${q['보기'+i]}`;
            btn.onclick = () => window.checkAnswer(i);
            area.appendChild(btn);
        }
    } else {
        const input = document.createElement('input');
        input.id = "subj-input";
        input.placeholder = "명령어를 입력하십시오...";
        input.style = "width:100%; padding:16px; background:#111; border:1px solid var(--radar-green); color:white; border-radius:12px; font-size:1rem; margin-bottom:5px;";
        input.onkeyup = (e) => e.key === 'Enter' && window.checkAnswer(input.value);
        area.appendChild(input);
        
        const b = document.createElement('button');
        b.innerText = "TRANSMIT COMMAND";
        b.className = "btn-start";
        b.onclick = () => window.checkAnswer(input.value);
        area.appendChild(b);
        
        setTimeout(() => { 
            const el = document.getElementById('subj-input');
            if(el) el.focus(); 
        }, 300);
    }
};

window.checkAnswer = function(userAns) {
    if (window.state.isProcessing) return;
    window.state.isProcessing = true;
    
    const q = window.state.questions[window.state.currentIndex];
    const realAnsText = (window.state.type === 'MULTI') ? q['보기'+q.정답번호] : q.정답;
    let isCorrect = false;
    
    if (window.state.type === 'MULTI') {
        isCorrect = parseInt(userAns) === parseInt(q.정답번호);
    } else {
        const clean = (s) => String(s || '').replace(/\s+/g, '').toLowerCase();
        isCorrect = clean(userAns) === clean(q.정답);
    }

    window.state.sessionResults.push({ id: q.ID, isCorrect: isCorrect, userAns: userAns });
    
    const status = document.getElementById('result-status');
    status.innerText = isCorrect ? "● CORRECT (CLEARED)" : "● INCORRECT (DEVIATION)";
    status.style.background = isCorrect ? "rgba(0,255,65,0.1)" : "rgba(255,51,51,0.1)";
    status.style.color = isCorrect ? "var(--radar-green)" : "var(--danger-red)";
    
    document.getElementById('correct-ans-show').innerText = "IDENTIFIED AS: " + (realAnsText || "NO DATA");
    document.getElementById('explanation-box').innerText = q.해설 || "해설 데이터가 존재하지 않습니다.";
    
    document.getElementById('feedback-layer').style.display = 'block';
};

window.nextQuestion = function() {
    document.getElementById('feedback-layer').style.display = 'none';
    window.state.isProcessing = false;
    window.state.currentIndex++;
    
    if (window.state.currentIndex < window.state.questions.length) {
        window.renderQuestion();
    } else {
        window.stopSession();
    }
};

window.stopSession = async function() {
    if(!confirm("훈련 결과를 타워(DB)에 동기화하시겠습니까?")) return;
    window.showPage('loading-page');
    
    const cfg = CONFIG[window.state.difficulty];
    const results = window.state.sessionResults.map(res => {
        const q = window.state.questions.find(item => item.ID === res.id);
        return q ? { 
            id: res.id, 
            isCorrect: res.isCorrect, 
            type: window.state.type, 
            problem: q.문제, 
            userResponse: res.userAns, 
            correctAnswer: (window.state.type === 'MULTI' ? q['보기'+q.정답번호] : q.정답) 
        } : null;
    }).filter(r => r);

    try {
        await fetch(cfg.URL, { 
            method: 'POST', 
            mode: 'no-cors', // GAS 보안 이슈 대응
            body: JSON.stringify({ 
                results, 
                reportedIds: window.state.reportedIds, 
                excludedIds: window.state.excludedIds,
                masterGid: cfg.GIDs[`${window.state.subject}_${window.state.type}`],
                statsGid: cfg.GIDs[`${window.state.subject}_STATS`]
            }) 
        });
        location.reload();
    } catch(e) { 
        alert("동기화 실패. 로컬 세션이 만료되었습니다."); 
        window.showPage('quiz-page'); 
    }
};

window.loadStats = async function(subject) {
    window.showPage('loading-page');
    const cfg = CONFIG[window.state.difficulty];
    try {
        const res = await fetch(`${cfg.URL}?gid=${cfg.GIDs[subject+'_STATS']}`);
        const data = await res.json();
        window.state.statsData = data.map(row => {
            const c = Number(row['누적 기출 횟수'])||0;
            const w = Number(row['누적 오답 횟수'])||0;
            return { 
                type: row['유형']||'-', 
                problem: row['문제']||'-', 
                answer: row['실제정답']||row['정답']||'-', 
                exp: row['해설']||'-', 
                count: c, 
                wrong: w, 
                rate: c > 0 ? (w/c)*100 : 0 
            };
        });
        window.renderStats();
        window.showPage('stats-page');
    } catch(e) { 
        alert("통계 데이터 수신 실패."); 
        location.reload(); 
    }
};

window.renderStats = function() {
    const tbody = document.getElementById('stats-body');
    tbody.innerHTML = window.state.statsData.map((d, i) => `
        <tr>
            <td><span style="background:#222; padding:2px 6px; border-radius:4px;">${d.type}</span></td>
            <td style="text-align:left;">
                <div style="font-weight:bold; margin-bottom:4px;">${d.problem}</div>
                <div style="color:var(--radar-green); font-size:0.75rem;">정답: ${d.answer}</div>
                <div style="cursor:pointer; color:#555; font-size:0.7rem; margin-top:4px;" onclick="const e=document.getElementById('st-exp-${i}'); e.style.display=e.style.display==='block'?'none':'block'">[ VIEW MANUAL ]</div>
                <div id="st-exp-${i}" class="exp-content" style="display:none; background:#000; padding:10px; margin-top:5px; border-left:2px solid var(--radar-green); font-size:0.8rem;">${d.exp}</div>
            </td>
            <td>${d.count}</td>
            <td style="color:var(--danger-red)">${d.wrong}</td>
            <td>
                ${d.rate.toFixed(0)}%
                <div class="rate-bg"><div class="rate-bar" style="width:${d.rate}%"></div></div>
            </td>
        </tr>
    `).join('');
};

window.sortStats = function(key) {
    this.asc = !this.asc;
    window.state.statsData.sort((a,b) => this.asc ? (a[key]>b[key]?1:-1) : (b[key]>a[key]?1:-1));
    window.renderStats();
};
</script>
</body>
</html>
