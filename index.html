<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATC Training Center</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --radar-green: #00ff41;
            --radar-dim: #004411;
            --danger-red: #ff3333;
            --text-white: #e0e0e0;
            --primary-blue: #4f46e5;
            --card-bg: #1a1a1a;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: var(--bg-color); color: var(--text-white);
            font-family: 'Pretendard', sans-serif; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }
        .container { width: 100%; max-width: 600px; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .mode-card { background: var(--card-bg); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        h1 { font-size: 1.7rem; letter-spacing: -0.5px; }
        
        button { border-radius: 12px; cursor: pointer; transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1); font-weight: bold; border: 1px solid transparent; padding: 15px; width: 100%; font-size: 1rem; }
        button:active { transform: scale(0.98); opacity: 0.9; }
        button:disabled { border-color: #333 !important; color: #555 !important; cursor: not-allowed; opacity: 0.6; filter: grayscale(1); }
        
        .btn-start { background: var(--primary-blue); color: white; }
        .btn-stats { background: #4b5563; color: white; font-size: 0.8rem; width: auto; padding: 8px 16px; border-radius: 8px; }
        
        .toggle-container { background: #eee; border-radius: 50px; padding: 8px 24px; display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 30px; color: #111; font-weight: 800; }
        .switch { position: relative; display: inline-block; width: 54px; height: 28px; flex-shrink: 0; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--danger-red); }
        input:checked + .slider:before { transform: translateX(26px); }

        .progress-container { width: 100%; background: #222; height: 6px; border-radius: 10px; margin: 20px 0; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--radar-green); width: 0%; transition: 0.4s ease; box-shadow: 0 0 10px var(--radar-green); }

        .stats-wrap { width: 100%; overflow-x: auto; margin-top: 15px; border-radius: 12px; border: 1px solid #333; background: #111; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; min-width: 580px; table-layout: fixed; }
        th { background: #1a1a1a; padding: 14px; cursor: pointer; border-bottom: 2px solid #333; color: var(--radar-green); position: sticky; top: 0; z-index: 10; }
        th:hover { background: #222; }
        td { padding: 14px; border-bottom: 1px solid #1a1a1a; text-align: center; word-break: break-all; }
        
        .rate-bg { width: 100%; background: #222; height: 5px; border-radius: 10px; margin-top: 8px; }
        .rate-bar { height: 100%; background: var(--danger-red); border-radius: 10px; }
        
        .exp-content { display: none; background: #1a1a1a; padding: 15px; margin-top: 10px; border-radius: 10px; color: #aaa; text-align: left; line-height: 1.6; border-left: 4px solid var(--radar-green); font-size: 0.9rem; }
        
        #feedback-layer { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 600px; background: #0f0f0f; border-top: 3px solid var(--radar-green); padding: 25px; display: none; z-index: 2000; max-height: 85vh; overflow-y: auto; border-radius: 30px 30px 0 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.8); }
        .hidden { display: none !important; }
        
        #subj-input { width: 100%; padding: 18px; background: #111; border: 2px solid #333; color: white; border-radius: 15px; font-size: 1.1rem; outline: none; transition: 0.3s; margin-bottom: 15px; }
        #subj-input:focus { border-color: var(--radar-green); box-shadow: 0 0 10px rgba(0,255,65,0.2); }
    </style>
</head>
<body>

<div class="container">
    <!-- Main Home Page -->
    <div id="main-page">
        <h1 style="text-align: center; margin-bottom: 8px; color: var(--radar-green);">ATC TRAINING CENTER</h1>
        <p style="text-align: center; color: #777; font-size: 0.95rem; margin-bottom: 30px;">포커 소좌, 작전 지역을 선택하십시오.</p>
        
        <div class="toggle-container">
            <span>NORMAL</span>
            <label class="switch">
                <input type="checkbox" id="diff-toggle" onchange="window.setDifficulty(this.checked)">
                <span class="slider"></span>
            </label>
            <span style="color:var(--danger-red)">HELL</span>
        </div>

        <div id="subject-cards">
            <div class="mode-card">
                 <div style="font-weight: 800; display: flex; justify-content: space-between; align-items: center; margin-bottom:18px;">
                     <span style="font-size: 1.1rem;">✈️ 항공법규 (Law)</span>
                     <button class="btn-stats" onclick="window.loadStats('LAW')">📊 DATA CENTER</button>
                 </div>
                 <div style="display:flex; gap:12px;">
                     <button class="btn-start" onclick="window.prepMission('LAW', 'MULTI')">훈련 시작 (객)</button>
                     <button class="btn-start" onclick="window.prepMission('LAW', 'SUBJ')">훈련 시작 (주)</button>
                 </div>
            </div>
            <div class="mode-card">
                 <div style="font-weight: 800; display: flex; justify-content: space-between; align-items: center; margin-bottom:18px;">
                     <span style="font-size: 1.1rem;">📡 항공관제 (Control)</span>
                     <button class="btn-stats" onclick="window.loadStats('CTRL')">📊 DATA CENTER</button>
                 </div>
                 <div style="display:flex; gap:12px;">
                     <button class="btn-start" onclick="window.prepMission('CTRL', 'MULTI')">훈련 시작 (객)</button>
                     <button class="btn-start" onclick="window.prepMission('CTRL', 'SUBJ')">훈련 시작 (주)</button>
                 </div>
            </div>
        </div>

        <div id="mode-selection" class="hidden">
            <div style="text-align:center; margin-bottom:25px;">
                <p style="color:orange; font-weight:900; letter-spacing:1px; margin-bottom:5px;">MISSION PROFILE</p>
                <h3 id="mission-title" style="margin:0; font-size:1.4rem;"></h3>
            </div>
            <button class="btn-start" onclick="window.loadQuiz('OMAKASE')" style="background:#222; margin-bottom:12px; border:1px solid #444;">🍱 100문항 오마카세 (신규 위주)</button>
            <button class="btn-start" onclick="window.loadQuiz('WRONG')" style="background:#222; border:1px solid #444;">📝 100문항 오답노트 (취약 위주)</button>
            <button onclick="location.reload()" style="background:none; color:#666; margin-top:25px; border:1px solid #333; font-size:0.9rem;">BACK TO BASE</button>
        </div>
    </div>

    <!-- Data Center Page -->
    <div id="stats-page" class="hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="margin:0; color:var(--radar-green); letter-spacing:1px;">DATA CENTER</h2>
            <button onclick="location.reload()" style="padding:10px 20px; background:#333; color:white; border-radius:8px; width:auto; font-size:0.8rem;">EXIT</button>
        </div>
        <p style="font-size:0.8rem; color:#777; margin-bottom:15px;">* 최근 훈련 이력이 있는 문항만 분석 데이터로 노출됩니다.</p>
        <div class="stats-wrap">
            <table>
                <colgroup>
                    <col style="width: 85px;">
                    <col>
                    <col style="width: 65px;">
                    <col style="width: 65px;">
                    <col style="width: 90px;">
                </colgroup>
                <thead>
                    <tr>
                        <th onclick="window.sortStats('type')">유형</th>
                        <th onclick="window.sortStats('problem')">문제 분석</th>
                        <th onclick="window.sortStats('count')">기출</th>
                        <th onclick="window.sortStats('wrong')">오답</th>
                        <th onclick="window.sortStats('rate')">오답률</th>
                    </tr>
                </thead>
                <tbody id="stats-body"></tbody>
            </table>
        </div>
    </div>

    <!-- Quiz Session Page -->
    <div id="quiz-page" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; color: var(--radar-green); font-size: 0.85rem; font-weight: bold;">
            <span id="pos-display">Position: 0 / 100</span>
            <span id="diff-status">MODE: NORMAL</span>
        </div>
        <div class="progress-container"><div class="progress-bar" id="pb"></div></div>
        <div id="question-box" style="margin:35px 0; font-size:1.2rem; line-height:1.7; min-height:100px; font-weight:500;"></div>
        <div id="answer-area"></div>
        <button onclick="window.stopSession()" style="border:1px solid #333; color:#555; margin-top:50px; background: none; font-size:0.85rem;">ABORT MISSION (TERMINAL SYNC)</button>
    </div>

    <!-- Loading State -->
    <div id="loading-page" class="hidden">
        <div style="text-align: center; margin-top: 180px;">
            <div style="display:inline-block; width:40px; height:40px; border:4px solid var(--radar-dim); border-top-color:var(--radar-green); border-radius:50%; animation: spin 1s linear infinite; margin-bottom:20px;"></div>
            <h2 id="loading-msg" style="color: var(--radar-green); letter-spacing:2px; font-weight:900;">LINKING TO TOWER...</h2>
        </div>
    </div>
</div>

<!-- Global Feedback Overlay -->
<div id="feedback-layer">
    <div id="result-status" style="text-align:center; padding:18px; font-weight:900; border-radius:15px; margin-bottom:20px; font-size:1.2rem;"></div>
    <div style="background:#1a1a1a; padding:20px; border-radius:18px; margin-bottom:20px; border:1px solid #333;">
        <div id="correct-ans-show" style="color:var(--radar-green); font-weight:800; margin-bottom:12px; font-size:1.1rem; border-bottom:1px solid #333; padding-bottom:10px;"></div>
        <div id="explanation-box" style="font-size:1rem; line-height:1.6; color:#ccc; white-space:pre-wrap;"></div>
    </div>
    <div style="display:flex; gap:12px; margin-bottom:15px;">
        <button id="go-around-btn" style="flex:1; border:2px solid var(--radar-green); color:var(--radar-green); background:none; font-size:0.9rem;">✈️ Go Around</button>
        <button id="deviation-btn" style="flex:1; border:2px solid orange; color:orange; background:none; font-size:0.9rem;">⚠️ Deviation</button>
    </div>
    <button id="next-btn" style="background:var(--radar-green); color:black; font-size:1.3rem; border:none; margin-top:10px; font-weight:900;">NEXT CONTACT</button>
</div>

<style> @keyframes spin { to { transform: rotate(360deg); } } </style>

<script>
/** [ENGINE v1.1.4] Final Integrity Package */
window.state = {
    difficulty: 'EZ', subject: '', type: '', questions: [], currentIndex: 0,
    sessionResults: [], reportedIds: [], excludedIds: [], statsData: [],
    isProcessing: false
};

const CONFIG = {
    EZ: {
        URL: "https://script.google.com/macros/s/AKfycbxQdRw8bAcYSfZWNV6r808lVpwED88FaZj6bviR1pMZ2DimYDKHYu13jeT7oXaT04ErGw/exec",
        GIDs: { LAW_MULTI: 0, LAW_SUBJ: 1036407965, CTRL_MULTI: 438358690, CTRL_SUBJ: 1403157384, LAW_STATS: 1846282036, CTRL_STATS: 1880986641 }
    },
    INFERNO: {
        URL: "https://script.google.com/macros/s/AKfycbzjGLlSq7-xpO0dZxCWExg06paUtwsP1kcPBXTCXhDzm8wkU0CJCyCADB0gJKsU76z7RA/exec",
        GIDs: { LAW_MULTI: 0, LAW_SUBJ: 1805786990, CTRL_MULTI: 2049752243, CTRL_SUBJ: 570358631, LAW_STATS: 668283973, CTRL_STATS: 1546545747 }
    }
};
window.showPage = function(id) {
    ['main-page', 'stats-page', 'loading-page', 'quiz-page'].forEach(p => {
        const el = document.getElementById(p);
        if(el) el.classList.add('hidden');
    });
    document.getElementById(id).classList.remove('hidden');
};

window.setDifficulty = function(isHell) {
    window.state.difficulty = isHell ? 'INFERNO' : 'EZ';
    document.getElementById('diff-status').innerText = isHell ? 'MODE: INFERNO' : 'MODE: NORMAL';
    document.getElementById('diff-status').style.color = isHell ? 'var(--danger-red)' : 'var(--radar-green)';
};

window.prepMission = function(sub, type) {
    window.state.subject = sub;
    window.state.type = type;
    const subLabel = sub === 'LAW' ? '항공법규' : '항공관제';
    const typeLabel = type === 'MULTI' ? '객관식' : '주관식';
    document.getElementById('mission-title').innerText = `${subLabel} [${typeLabel}] PROFILE`;
    document.getElementById('subject-cards').classList.add('hidden');
    document.getElementById('mode-selection').classList.remove('hidden');
};

window.loadQuiz = async function(mode) {
    window.showPage('loading-page');
    const cfg = CONFIG[window.state.difficulty];
    const targetGid = cfg.GIDs[`${window.state.subject}_${window.state.type}`];
    
    try {
        const res = await fetch(`${cfg.URL}?gid=${targetGid}`);
        const data = await res.json();
        const getNum = (v) => Number(String(v || '0').replace(/[^0-9.-]+/g, "")) || 0;
        
        if (mode === 'OMAKASE') {
            data.sort((a,b) => getNum(a['누적 기출']) - getNum(b['누적 기출']));
        } else {
            data.sort((a,b) => getNum(b['누적 오답']) - getNum(a['누적 오답']));
        }
        
        window.state.questions = data.slice(0, 100);
        window.state.currentIndex = 0;
        window.state.sessionResults = [];
        window.state.reportedIds = [];
        window.state.excludedIds = [];
        window.state.isProcessing = false;

        if (window.state.questions.length === 0) {
            alert("No Flight Data available.");
            location.reload();
            return;
        }
        
        window.renderQuestion();
        window.showPage('quiz-page');
    } catch(e) { 
        alert("Tower Link Failure."); 
        location.reload(); 
    }
};

window.renderQuestion = function() {
    const q = window.state.questions[window.state.currentIndex];
    const total = window.state.questions.length;
    document.getElementById('pos-display').innerText = `Position: ${window.state.currentIndex + 1} / ${total}`;
    document.getElementById('pb').style.width = `${((window.state.currentIndex + 1) / total) * 100}%`;
    document.getElementById('question-box').innerText = `[${q.대분류 || q.Category || 'ATC'}] ${q.문제 || q.Problem}`;
    
    const area = document.getElementById('answer-area');
    area.innerHTML = '';

    if (window.state.type === 'MULTI') {
        for(let i=1; i<=4; i++) {
            const btn = document.createElement('button');
            const choice = q['보기'+i] || q[`Choice${i}`];
            btn.style = "margin-bottom:12px; border:1px solid #333; text-align:left; background:#111; color:#eee; padding-left:20px;";
            btn.innerText = `${i}. ${choice}`;
            btn.onclick = () => window.checkAnswer(i);
            area.appendChild(btn);
        }
    } else {
        const input = document.createElement('input');
        input.id = "subj-input";
        input.type = "text";
        input.placeholder = "Enter Command...";
        input.onkeyup = (e) => e.key === 'Enter' && window.checkAnswer(input.value);
        area.appendChild(input);
        
        const b = document.createElement('button');
        b.innerText = "SEND COMMAND"; 
        b.className = "btn-start";
        b.onclick = () => window.checkAnswer(input.value);
        area.appendChild(b);
        setTimeout(() => document.getElementById('subj-input')?.focus(), 300);
    }
};

window.checkAnswer = function(userAns) {
    if (window.state.isProcessing) return;
    window.state.isProcessing = true;
    
    const q = window.state.questions[window.state.currentIndex];
    const correctIdx = q.정답번호 || q.AnswerIndex;
    const realAnsText = (window.state.type === 'MULTI') ? (q['보기'+correctIdx] || q[`Choice${correctIdx}`]) : (q.정답 || q.Answer);
    
    let isCorrect = false;
    if (window.state.type === 'MULTI') {
        isCorrect = parseInt(userAns) === parseInt(correctIdx);
    } else {
        const clean = (s) => String(s || '').replace(/\s+/g, '').toLowerCase();
        isCorrect = clean(userAns) === clean(realAnsText);
    }

    window.state.sessionResults.push({ 
        id: q.ID || q.id, 
        isCorrect: isCorrect, 
        userAns: userAns,
        type: window.state.type,
        problem: q.문제 || q.Problem,
        category: q.대분류 || q.Category || 'ATC',
        explanation: q.해설 || q.Explanation || 'No manual.'
    });

    const status = document.getElementById('result-status');
    status.innerText = isCorrect ? "● CORRECT (CLEARED)" : "● INCORRECT (DEVIATION)";
    status.style.background = isCorrect ? "rgba(0,255,65,0.15)" : "rgba(255,51,51,0.15)";
    status.style.color = isCorrect ? "var(--radar-green)" : "var(--danger-red)";
    status.style.border = `1px solid ${isCorrect ? 'var(--radar-green)' : 'var(--danger-red)'}`;
    
    document.getElementById('correct-ans-show').innerText = "IDENTIFIED AS: " + (realAnsText || "N/A");
    document.getElementById('explanation-box').innerText = q.해설 || q.Explanation || "작전 지침이 등록되지 않았습니다.";
    
    document.getElementById('go-around-btn').onclick = () => {
        const qId = q.ID || q.id;
        if(!window.state.excludedIds.includes(qId)) window.state.excludedIds.push(qId);
        alert("Marked as Go Around.");
    };
    document.getElementById('deviation-btn').onclick = () => {
        const qId = q.ID || q.id;
        if(!window.state.reportedIds.includes(qId)) window.state.reportedIds.push(qId);
        alert("Deviation Reported.");
    };
    
    document.getElementById('next-btn').onclick = () => window.nextQuestion();
    document.getElementById('feedback-layer').style.display = 'block';
};

window.nextQuestion = function() {
    document.getElementById('feedback-layer').style.display = 'none';
    window.state.isProcessing = false;
    window.state.currentIndex++;
    if (window.state.currentIndex < window.state.questions.length) {
        window.renderQuestion();
    } else {
        window.stopSession();
    }
};

window.stopSession = async function() {
    if(!confirm("Sync all flight records with Tower?")) return;
    window.showPage('loading-page');
    document.getElementById('loading-msg').innerText = "UPLOADING TO TOWER...";
    
    const cfg = CONFIG[window.state.difficulty];
    try {
        await fetch(cfg.URL, { 
            method: 'POST', 
            mode: 'no-cors', 
            body: JSON.stringify({ 
                results: window.state.sessionResults, 
                reportedIds: window.state.reportedIds, 
                excludedIds: window.state.excludedIds, 
                masterGid: cfg.GIDs[`${window.state.subject}_${window.state.type}`], 
                statsGid: cfg.GIDs[`${window.state.subject}_STATS`] 
            }) 
        });
        alert("Mission Complete. Log Synced.");
        location.reload();
    } catch(e) { 
        alert("Sync Failure."); 
        window.showPage('quiz-page'); 
    }
};

window.loadStats = async function(subject) {
    window.showPage('loading-page');
    const cfg = CONFIG[window.state.difficulty];
    try {
        const res = await fetch(`${cfg.URL}?gid=${cfg.GIDs[subject+'_STATS']}`);
        const data = await res.json();
        
        const getNum = (v) => Number(String(v || '0').replace(/[^0-9.-]+/g, "")) || 0;

        window.state.statsData = data
            .filter(row => getNum(row['누적 기출']) > 0) // [FINAL INTEGRITY] 기출 1회 이상 필터링
            .map(row => {
                const c = getNum(row['누적 기출']);
                const w = getNum(row['누적 오답']);
                const rawRate = row['오답률'] || "0%";
                const parsedRate = parseFloat(rawRate.replace('%','')) || 0;
                
                return { 
                    type: row['유형'] || '-', 
                    problem: row['문제'] || '-', 
                    answer: row['실제정답'] || row['정답'] || '-',
                    count: c, 
                    wrong: w, 
                    rate: parsedRate,
                    exp: row['해설'] || '-'
                };
            });
        
        window.renderStats();
        window.showPage('stats-page');
    } catch(e) { 
        alert("Data Center Link Failure."); 
        location.reload(); 
    }
};

window.renderStats = function() {
    const tbody = document.getElementById('stats-body');
    if(window.state.statsData.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" style="padding:40px; color:#555;">기록된 훈련 데이터가 없습니다.</td></tr>`;
        return;
    }
    tbody.innerHTML = window.state.statsData.map((d, i) => `
        <tr>
            <td><span style="color:#777;">${d.type}</span></td>
            <td style="text-align:left;">
                <b style="color:#eee;">${d.problem}</b><br>
                <div style="margin-top:5px;">
                    <span style="cursor:pointer;text-decoration:underline;font-size:0.75rem;color:var(--radar-green);opacity:0.7;" 
                          onclick="const e=document.getElementById('st-exp-${i}'); e.style.display=e.style.display==='block'?'none':'block'">[VIEW MANUAL]</span>
                </div>
                <div id="st-exp-${i}" class="exp-content"><b>정답:</b> ${d.answer}<br><br>${d.exp}</div>
            </td>
            <td>${d.count}</td>
            <td style="color:var(--danger-red);">${d.wrong}</td>
            <td>
                <span style="font-weight:bold; color:${d.rate > 50 ? 'var(--danger-red)' : '#eee'}">${d.rate.toFixed(1)}%</span>
                <div class="rate-bg"><div class="rate-bar" style="width:${d.rate}%"></div></div>
            </td>
        </tr>
    `).join('');
};

window.sortStats = function(key) {
    if (this.currentSortKey === key) this.asc = !this.asc;
    else { this.currentSortKey = key; this.asc = false; }
    
    window.state.statsData.sort((a,b) => {
        let v1 = a[key], v2 = b[key];
        if (typeof v1 === 'string') return this.asc ? v1.localeCompare(v2) : v2.localeCompare(v1);
        return this.asc ? v1 - v2 : v2 - v1;
    });
    this.currentSortKey = key;
    window.renderStats();
};
