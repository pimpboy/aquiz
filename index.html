<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>항공 훈련소 v5.0 (Mastery Sync)</title>
    <style>
        :root { --p: #1a73e8; --bg: #f8f9fa; --txt: #202124; --err: #d93025; --suc: #1e8e3e; --border: #dadce0; --warn: #f9ab00; --soft: #f1f3f4; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 15px; display: flex; justify-content: center; }
        #app { background: #fff; width: 100%; max-width: 500px; border-radius: 15px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); min-height: 90vh; display: flex; flex-direction: column; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 16px; background: var(--p); color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 17px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-stats { width: 100%; padding: 16px; background: var(--warn); color: #000; border: none; border-radius: 8px; font-weight: bold; font-size: 17px; cursor: pointer; transition: 0.3s; margin-top: 20px; text-align: center; text-decoration: none; display: block; box-sizing: border-box; }
        .btn-sub { width: 100%; padding: 12px; background: #fff; color: var(--p); border: 2px solid var(--p); border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .btn-redo { flex: 1; padding: 12px; background: var(--soft); color: #5f6368; border: 1px solid var(--border); border-radius: 8px; font-weight: bold; cursor: pointer; margin-right: 8px; font-size: 14px; }
        .btn-next { flex: 2; padding: 12px; background: var(--p); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-stop { background: #fee; color: var(--err); border: 1px solid #fadad7; padding: 5px 12px; border-radius: 5px; font-size: 12px; cursor: pointer; font-weight: bold; }
        .menu-group { margin-bottom: 20px; animation: fadeIn 0.5s; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; color: #5f6368; }
        select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; background: #fff; margin-bottom: 15px; }
        .header { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: #70757a; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .q-text { font-size: 19px; font-weight: bold; margin-bottom: 25px; line-height: 1.6; word-break: keep-all; }
        .opt-list { display: grid; gap: 12px; }
        .opt-item { padding: 16px; border: 1px solid var(--border); border-radius: 10px; background: #fff; font-size: 16px; cursor: pointer; }
        .opt-item.correct { background-color: #e6f4ea; border-color: var(--suc); color: var(--suc); font-weight: bold; }
        .opt-item.wrong { background-color: #fce8e6; border-color: var(--err); color: var(--err); }
        .opt-item.disabled { cursor: default; pointer-events: none; }
        #feedback-area { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; border: 1px solid var(--border); background: #fafafa; }
        #exp-content { font-size: 14px; color: #555; white-space: pre-wrap; line-height: 1.6; margin-bottom: 15px; }
        .btn-group { display: flex; justify-content: space-between; margin-top: 10px; }
        .review-card { border: 1px solid #eee; border-radius: 10px; padding: 15px; margin-bottom: 15px; background: #fafafa; border-left: 5px solid var(--err); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
<div id="app">
    <div id="loader" style="display:none; text-align:center; padding-top:100px;">📡<br>데이터 동기화 중...</div>

    <div id="step1" class="menu-group">
        <h2 style="text-align:center;">✈️ 항공 훈련소 v5.0</h2>
        <button class="btn-main" onclick="selectSubject('법규')">항공법규</button>
        <button class="btn-main" style="background:#5f6368" onclick="selectSubject('관제')">관제일반</button>
        <a id="stats-link" class="btn-stats" target="_blank">📊 나의 훈련 데이터 센터</a>
    </div>

    <div id="step2" class="menu-group" style="display:none">
        <h3 id="sub-title"></h3>
        <button class="btn-main" onclick="selectType('객관식')">객관식 훈련</button>
        <button class="btn-main" onclick="selectType('주관식')">주관식 훈련</button>
        <button class="btn-sub" onclick="goBack(1)">처음으로</button>
    </div>

    <div id="step3" class="menu-group" style="display:none">
        <h3 id="mission-title"></h3>
        <label>세부 카테고리</label>
        <select id="lcat-select"></select>
        <button class="btn-main" style="background:#d93025" onclick="startSession('weak')">🎯 취약문제 정밀타격</button>
        <button class="btn-main" style="background:#1e8e3e" onclick="startSession('smart')">🍱 지능형 오마카세</button>
        <button class="btn-sub" onclick="goBack(2)">이전으로</button>
    </div>

    <div id="quiz-ui" style="display:none">
        <div class="header"><span id="prog"></span><button class="btn-stop" onclick="finishMission()">🏁 중단</button></div>
        <div id="q" class="q-text"></div>
        <div id="opts" class="opt-list"></div>
        <div id="feedback-area">
            <div id="feedback-res" style="font-weight:bold; margin-bottom:8px;"></div>
            <div id="exp-content"></div>
            <div class="btn-group">
                <button class="btn-redo" id="btn-redo-action">♻️ 반복(기록 제외)</button>
                <button class="btn-next" onclick="goToNext()">다음 문제</button>
            </div>
        </div>
    </div>

    <div id="review-ui" style="display:none">
        <h2 style="text-align:center;">📝 미션 디브리핑</h2>
        <div id="report-summary" style="background:#202124; color:white; padding:20px; border-radius:10px; margin-bottom:20px; text-align:center;"></div>
        <div id="review-container"></div>
        <button class="btn-main" onclick="location.reload()">새로운 훈련 시작</button>
    </div>
</div>

<script>
    // ⚠️ [설정] 본인의 GID와 GAS URL을 입력하십시오.
    const GID_MAP = { '법규': { '객관식': '0', '주관식': '2011973258' }, '관제': { '객관식': '1053182571', '주관식': '217691441' } };
    const BASE_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTyZ24Pjcs6P2E4bzyxYuuVBSSxltreMArT-jxVdEK6J-Wc7_uPMTO47NwZQxA7mLZK_WIYqkmj5YAK/pub?single=true&output=csv';
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxtjoaIxCQy8e97qwIhHPhVv5JXRDFaJQxKqMyFUZ_j7aoS_t44vnP-gr4Z77YujA-A/exec'; 
    
    document.getElementById('stats-link').href = GAS_URL;

    let currentSub = '', currentType = '', allData = [], filteredQuiz = [], idx = 0, score = 0, wrongHistory = [];
    let isResolved = false;

    function selectSubject(sub) { currentSub = sub; document.getElementById('step1').style.display = 'none'; document.getElementById('step2').style.display = 'block'; document.getElementById('sub-title').innerText = `🛸 ${sub} 코스`; }
    async function selectType(type) {
        currentType = type; document.getElementById('step2').style.display = 'none'; document.getElementById('loader').style.display = 'block';
        const gid = GID_MAP[currentSub][currentType];
        try { 
            const res = await fetch(`${BASE_URL}&gid=${gid}`); 
            const text = await res.text(); 
            parseCSVData(text); 
            document.getElementById('loader').style.display = 'none'; 
            document.getElementById('step3').style.display = 'block'; 
        } catch (e) { alert("데이터 로딩 실패!"); location.reload(); }
    }

    function parseCSVData(text) {
        const rows = []; let currentRow = []; let currentCell = ''; let inQuotes = false;
        for (let i = 0; i < text.length; i++) {
            let char = text[i]; let nextChar = text[i+1];
            if (inQuotes) {
                if (char === '"' && nextChar === '"') { currentCell += '"'; i++; }
                else if (char === '"') inQuotes = false;
                else currentCell += char;
            } else {
                if (char === '"') inQuotes = true;
                else if (char === ',') { currentRow.push(currentCell.trim()); currentCell = ''; }
                else if (char === '\r' || char === '\n') {
                    currentRow.push(currentCell.trim()); currentCell = '';
                    if (currentRow.length >= 8) { rows.push(currentRow); currentRow = []; }
                    if (char === '\r' && nextChar === '\n') i++;
                } else currentCell += char;
            }
        }
        if (currentRow.length > 0) { currentRow.push(currentCell.trim()); rows.push(currentRow); }

        const h = rows[0];
        const find = (k) => h.findIndex(name => name.trim().includes(k));
        
        allData = rows.slice(1).map(r => {
            const opts = [r[find('보기1')], r[find('보기2')], r[find('보기3')], r[find('보기4')]].filter(Boolean);
            let ansTxt = (currentType === '주관식') ? r[find('보기1')] : opts[parseInt(r[find('정답')])-1] || r[find('정답')];
            return { 
                lcat: r[find('대분류')], q: r[find('문제')], ans: ansTxt, exp: r[find('해설')], 
                opts: opts, wrongCount: parseInt(r[find('오답수')])||0, totalCount: parseInt(r[find('전체수')])||0 
            };
        }).filter(i => i.q);

        const lcats = [...new Set(allData.map(d => d.lcat))].filter(Boolean);
        const lSelect = document.getElementById('lcat-select');
        lSelect.innerHTML = '<option value="ALL">전체 카테고리</option>';
        lcats.forEach(c => lSelect.innerHTML += `<option value="${c}">${c}</option>`);
    }

    function startSession(mode) {
        const lVal = document.getElementById('lcat-select').value;
        let pool = allData.filter(d => lVal === 'ALL' || d.lcat === lVal);
        if (mode === 'weak') { pool.sort((a, b) => b.wrongCount - a.wrongCount); filteredQuiz = pool.slice(0, 100); }
        else { pool.sort((a, b) => (b.wrongCount * 2 - b.totalCount) - (a.wrongCount * 2 - a.totalCount)); filteredQuiz = pool.slice(0, 200).sort(() => Math.random() - 0.5); }
        idx = 0; score = 0; wrongHistory = [];
        document.getElementById('step3').style.display = 'none'; document.getElementById('quiz-ui').style.display = 'block';
        render();
    }

    function render() {
        isResolved = false;
        const item = filteredQuiz[idx];
        document.getElementById('prog').innerText = `${idx + 1} / ${filteredQuiz.length}`;
        document.getElementById('q').innerText = item.q;
        const container = document.getElementById('opts'); container.innerHTML = '';
        document.getElementById('feedback-area').style.display = 'none';

        if (currentType === '주관식') {
            container.innerHTML = `<input id="subj-input" style="width:100%; padding:15px; font-size:18px; border:2px solid var(--border); border-radius:10px; box-sizing:border-box;">
                                   <button class="btn-main" onclick="checkSubj()">제출</button>`;
        } else {
            [...item.opts].sort(() => Math.random() - 0.5).forEach(o => {
                const btn = document.createElement('div'); btn.className = 'opt-item'; btn.innerText = o;
                btn.onclick = () => check(btn, item); container.appendChild(btn);
            });
        }
    }

    function check(btn, item) {
        if(isResolved) return;
        isResolved = true;
        const isCorrect = btn.innerText.trim() === String(item.ans).trim();
        handleResult(isCorrect, item, btn.innerText);
        btn.classList.add(isCorrect ? 'correct' : 'wrong');
        document.querySelectorAll('.opt-item').forEach(el => { if(el.innerText.trim() === item.ans) el.classList.add('correct'); el.classList.add('disabled'); });
    }

    function checkSubj() {
        if(isResolved) return;
        isResolved = true;
        const input = document.getElementById('subj-input');
        const item = filteredQuiz[idx];
        const isCorrect = input.value.trim().replace(/\s/g, "") === String(item.ans).trim().replace(/\s/g, "");
        handleResult(isCorrect, item, input.value);
        input.disabled = true;
    }

    function handleResult(isCorrect, item, userRes) {
        if (isCorrect) score++;
        else wrongHistory.push(item);
        
        item._lastRes = userRes; item._isCorrect = isCorrect;
        
        const redoBtn = document.getElementById('btn-redo-action');
        redoBtn.onclick = () => {
            if(isCorrect) score--; 
            wrongHistory.push(item);
            item._skipServer = true; // 서버 전송 취소 마킹
            alert("기록 제외 완료! 이 문제는 성적표 오답 리스트에 포함됩니다.");
            goToNext();
        };

        const resDiv = document.getElementById('feedback-res');
        resDiv.innerText = isCorrect ? "✅ 정답" : `❌ 오답 (정답: ${item.ans})`;
        resDiv.style.color = isCorrect ? "var(--suc)" : "var(--err)";
        document.getElementById('exp-content').innerText = item.exp || "해설 없음";
        document.getElementById('feedback-area').style.display = 'block';
    }

    function goToNext() {
        const item = filteredQuiz[idx];
        if (!item._skipServer) {
            sendDataToGAS(item.q, currentSub, currentType, item._lastRes, item._isCorrect, item.totalCount, item.wrongCount);
        }
        idx++;
        if (idx < filteredQuiz.length) render(); else finishMission();
    }

    function sendDataToGAS(q, sub, type, res, isCorrect, total, wrong) {
        const payload = new FormData();
        payload.append('subject', sub); payload.append('type', type); payload.append('id', q);
        payload.append('result', res); payload.append('isCorrect', isCorrect);
        payload.append('totalCount', total); payload.append('wrongCount', wrong);
        const rate = total > 0 ? ((wrong / total) * 100).toFixed(1) + "%" : "0%";
        payload.append('errorRateTrend', rate);
        fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: payload });
    }

    function finishMission() {
        document.getElementById('quiz-ui').style.display = 'none';
        document.getElementById('review-ui').style.display = 'block';
        const rate = Math.round((score / idx) * 100);
        document.getElementById('report-summary').innerHTML = `<h3>정답률 ${rate}% (${score}/${idx})</h3>`;
        const container = document.getElementById('review-container');
        wrongHistory.forEach((m, i) => {
            container.innerHTML += `<div class="review-card"><b>${i+1}. ${m.q}</b><br><small style="color:red">정답: ${m.ans}</small></div>`;
        });
    }

    function goBack(s) { document.querySelectorAll('.menu-group').forEach(e=>e.style.display='none'); document.getElementById(`step${s}`).style.display='block'; }
</script>
</body>
</html>
