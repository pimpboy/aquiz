<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATC Training Center</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --radar-green: #00ff41;
            --radar-dim: #004411;
            --danger-red: #ff3333;
            --text-white: #e0e0e0;
            --primary-blue: #4f46e5;
            --card-bg: #1a1a1a;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'Pretendard', sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 600px; }
        
        /* 메인 메뉴 디자인 */
        .mode-card {
            background: var(--card-bg); border-radius: 20px;
            padding: 20px; margin-bottom: 20px; border: 1px solid #333;
        }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { border-radius: 12px; cursor: pointer; transition: 0.2s; font-weight: bold; border: none; padding: 15px; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-start { background: var(--primary-blue); color: white; flex: 2; }
        .btn-stats { background: #4b5563; color: white; flex: 1; font-size: 0.85rem; }

        /* 토글 스위치 */
        .toggle-container { background: #eee; border-radius: 50px; padding: 10px 30px; display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 30px; color: #333; font-weight: bold; }
        .switch { position: relative; display: inline-block; width: 60px; height: 34px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--danger-red); }
        input:checked + .slider:before { transform: translateX(26px); }

        /* 통계 테이블 */
        .stats-wrap { width: 100%; overflow-x: auto; margin-top: 10px; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; background: #111; min-width: 500px; }
        th { background: #222; padding: 12px; cursor: pointer; border-bottom: 2px solid #333; color: var(--radar-green); position: sticky; top: 0; }
        td { padding: 10px; border-bottom: 1px solid #222; text-align: center; vertical-align: middle; }
        .text-left { text-align: left; }
        
        .rate-bg { width: 100%; background: #333; height: 6px; border-radius: 3px; margin-top: 5px; }
        .rate-bar { height: 100%; background: var(--danger-red); }
        .exp-content { display: none; background: #222; padding: 10px; margin-top: 8px; border-radius: 8px; color: #bbb; line-height: 1.4; }
        .exp-btn { color: var(--radar-green); cursor: pointer; font-size: 0.75rem; text-decoration: underline; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div id="main-page">
        <h1 style="text-align: center; margin-bottom: 10px;">항 공 훈련 관제소</h1>
        <p style="text-align: center; color: #888; font-size: 0.9rem; margin-bottom: 25px;">포커 소좌, 훈련 모드를 선택하십시오.</p>

        <div class="toggle-container">
            <span>NORMAL</span>
            <label class="switch">
                <input type="checkbox" id="diff-toggle" onchange="state.difficulty = this.checked ? 'INFERNO' : 'EZ'">
                <span class="slider"></span>
            </label>
            <span style="color:var(--danger-red)">HELL</span>
        </div>

        <div class="mode-card">
            <div style="font-weight: bold;">✈️ 항공법규 (Law)</div>
            <div class="btn-group">
                <button class="btn-start" onclick="prepTraining('LAW')">🚀 훈련 시작</button>
                <button class="btn-stats" onclick="loadStats('LAW')">📊 데이터 센터</button>
            </div>
        </div>

        <div class="mode-card">
            <div style="font-weight: bold;">📡 항공관제 (Control)</div>
            <div class="btn-group">
                <button class="btn-start" onclick="prepTraining('CTRL')">🚀 훈련 시작</button>
                <button class="btn-stats" onclick="loadStats('CTRL')">📊 데이터 센터</button>
            </div>
        </div>

        <div id="mode-selection" class="hidden">
            <p style="text-align:center; color:orange; margin: 20px 0 10px;">MISSION PROFILE</p>
            <button class="btn-start" onclick="loadQuiz('OMAKASE')" style="background:#444; margin-bottom:10px;">🍱 100문항 오마카세</button>
            <button class="btn-start" onclick="loadQuiz('WRONG')" style="background:#444;">📝 100문항 오답노트</button>
            <button onclick="location.reload()" style="background:none; border:1px solid #444; color:#666; margin-top:10px; width:100%;">BACK TO BASE</button>
        </div>
    </div>

    <div id="stats-page" class="hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 id="stats-title" style="margin:0; color:var(--radar-green);">DATA CENTER</h2>
            <button onclick="location.reload()" style="padding:8px 15px; background:#333; color:white; border-radius:8px;">EXIT</button>
        </div>
        <div class="stats-wrap">
            <table>
                <thead>
                    <tr>
                        <th onclick="sortStats('type')">유형</th>
                        <th onclick="sortStats('problem')">문제 분석</th>
                        <th onclick="sortStats('count')">기출</th>
                        <th onclick="sortStats('wrong')">오답</th>
                        <th onclick="sortStats('rate')">오답률</th>
                    </tr>
                </thead>
                <tbody id="stats-body"></tbody>
            </table>
        </div>
    </div>

    <div id="loading-page" class="hidden">
        <div style="text-align: center; margin-top: 150px;">
            <h2 id="loading-msg" style="color: var(--radar-green);">LINKING...</h2>
        </div>
    </div>

    <div id="quiz-page" class="hidden">
        </div>
</div>

<script>
/**
 * [CONFIG] 
 */
const CONFIG = {
    EZ: {
        URL: "https://script.google.com/macros/s/AKfycbxQdRw8bAcYSfZWNV6r808lVpwED88FaZj6bviR1pMZ2DimYDKHYu13jeT7oXaT04ErGw/exec",
        GIDs: { LAW_MULTI: 0, LAW_SUBJ: 1036407965, CTRL_MULTI: 438358690, CTRL_SUBJ: 1403157384, LAW_STATS: 1846282036, CTRL_STATS: 1880986641 }
    },
    INFERNO: {
        URL: "https://script.google.com/macros/s/AKfycbzjGLlSq7-xpO0dZxCWExg06paUtwsP1kcPBXTCXhDzm8wkU0CJCyCADB0gJKsU76z7RA/exec",
        GIDs: { LAW_MULTI: 0, LAW_SUBJ: 1805786990, CTRL_MULTI: 2049752243, CTRL_SUBJ: 570358631, LAW_STATS: 668283973, CTRL_STATS: 1546545747 }
    }
};

let state = { difficulty: 'EZ', subject: '', type: '', questions: [], currentIndex: 0, sessionResults: [], statsData: [] };

function showPage(id) {
    ['main-page', 'stats-page', 'loading-page', 'quiz-page'].forEach(p => document.getElementById(p)?.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
}

// --- 통계 로직 ---
async function loadStats(subject) {
    showPage('loading-page');
    document.getElementById('loading-msg').innerText = "FETCHING RADAR DATA...";
    const cfg = CONFIG[state.difficulty];
    const gid = cfg.GIDs[`${subject}_STATS`];

    try {
        const res = await fetch(`${cfg.URL}?gid=${gid}`);
        const data = await res.json();

        // 시트 헤더 명칭에 맞춰 정확히 매핑
        state.statsData = data.map(row => {
            const c = Number(row['누적 기출 횟수']) || 0;
            const w = Number(row['누적 오답 횟수']) || 0;
            return {
                type: row['유형'] || '-',
                problem: row['문제'] || '-',
                answer: row['실제 정답'] || row['실제정답'] || '-', // 헤더 오타 대비
                exp: row['해설'] || 'Manual 미등록',
                count: c,
                wrong: w,
                rate: c > 0 ? (w / c) * 100 : 0
            };
        });

        renderStats();
        showPage('stats-page');
    } catch (e) {
        alert("데이터 링크 실패. 시트의 공유 권한(Anyone)을 확인하세요.");
        location.reload();
    }
}

function renderStats() {
    const tbody = document.getElementById('stats-body');
    tbody.innerHTML = state.statsData.map((d, i) => `
        <tr>
            <td>${d.type}</td>
            <td class="text-left">
                <div style="font-weight:bold; margin-bottom:5px;">${d.problem}</div>
                <div style="color:var(--radar-green); font-size:0.75rem;">정답: ${d.answer}</div>
                <span class="exp-btn" onclick="const el=document.getElementById('exp-${i}'); el.style.display=el.style.display==='block'?'none':'block'">[MANUAL VIEW]</span>
                <div id="exp-${i}" class="exp-content">${d.exp}</div>
            </td>
            <td>${d.count}</td>
            <td>${d.wrong}</td>
            <td>
                ${d.rate.toFixed(0)}%
                <div class="rate-bg"><div class="rate-bar" style="width:${d.rate}%"></div></div>
            </td>
        </tr>
    `).join('');
}

function sortStats(key) {
    this.sortOrder = !this.sortOrder;
    state.statsData.sort((a, b) => {
        let valA = a[key], valB = b[key];
        if (this.sortOrder) return valA > valB ? 1 : -1;
        else return valA < valB ? 1 : -1;
    });
    renderStats();
}

// --- 퀴즈 로직 진입 ---
function prepTraining(sub) {
    state.subject = sub;
    // 유형 선택(객/주)을 묻는 대신 바로 프로파일 선택으로 이동하거나 
    // 기존의 유형 선택 버튼을 다시 보여주는 로직으로 연결
    document.getElementById('subject-cards').classList.add('hidden');
    document.getElementById('mode-selection').classList.remove('hidden');
}

// (기존 loadQuiz, renderQuestion 등 퀴즈 로직 코드들 아래에 배치...)
</script>
</body>
</html>
