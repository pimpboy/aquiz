<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>항공 훈련소 v5.5</title>
    <style>
        :root { --p: #1a73e8; --bg: #f8f9fa; --txt: #202124; --err: #d93025; --suc: #1e8e3e; --border: #dadce0; --warn: #f9ab00; --soft: #f1f3f4; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 15px; display: flex; justify-content: center; }
        #app { background: #fff; width: 100%; max-width: 500px; border-radius: 15px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); min-height: 90vh; display: flex; flex-direction: column; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 16px; background: var(--p); color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 17px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-stats { width: 100%; padding: 16px; background: var(--warn); color: #000; border: none; border-radius: 8px; font-weight: bold; font-size: 17px; cursor: pointer; transition: 0.3s; margin-top: 20px; text-align: center; text-decoration: none; display: block; box-sizing: border-box; }
        .btn-sub { width: 100%; padding: 12px; background: #fff; color: var(--p); border: 2px solid var(--p); border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .btn-redo { flex: 1; padding: 12px; background: var(--soft); color: #5f6368; border: 1px solid var(--border); border-radius: 8px; font-weight: bold; cursor: pointer; margin-right: 8px; font-size: 13px; }
        .btn-next { flex: 2; padding: 12px; background: var(--p); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .q-stats { font-size: 12px; color: #1e8e3e; background: #e6f4ea; padding: 5px 10px; border-radius: 5px; margin-bottom: 10px; display: inline-block; }
        .opt-item { padding: 16px; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; cursor: pointer; }
        .opt-item.correct { background: #e6f4ea; color: var(--suc); border-color: var(--suc); font-weight: bold; }
        .opt-item.wrong { background: #fce8e6; color: var(--err); border-color: var(--err); }
        .header { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: #70757a; margin-bottom: 10px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
        .menu-group { animation: fadeIn 0.5s; }
    </style>
</head>
<body>
<div id="app">
    <div id="loader" style="display:none; text-align:center; padding-top:100px;">📡 시트 서버 접속 중...</div>

    <div id="step1" class="menu-group">
        <h2 style="text-align:center;">✈️ 항공 훈련소 v5.5</h2>
        <button class="btn-main" onclick="selectSubject('법규')">항공법규 훈련</button>
        <button class="btn-main" style="background:#5f6368" onclick="selectSubject('관제')">관제일반 훈련</button>
        <button class="btn-stats" onclick="window.open(GAS_URL)">📊 통계 대시보드 열기</button>
    </div>

    <div id="step2" class="menu-group" style="display:none">
        <h3 id="sub-title"></h3>
        <button class="btn-main" onclick="selectType('객관식')">객관식</button>
        <button class="btn-main" onclick="selectType('주관식')">주관식</button>
        <button class="btn-sub" onclick="goBack(1)">처음으로</button>
    </div>

    <div id="step3" class="menu-group" style="display:none">
        <h3 id="mission-title"></h3>
        <button class="btn-main" style="background:#1e8e3e" onclick="startSession('omakase')">🍱 200문항 스마트 오마카세</button>
        <button class="btn-main" style="background:#d93025" onclick="startSession('note')">📝 100문항 오답 노트</button>
        <button class="btn-sub" onclick="goBack(2)">이전으로</button>
    </div>

    <div id="quiz-ui" style="display:none">
        <div class="header"><span id="prog"></span> <span id="timer"></span></div>
        <div id="q-stat-area"></div>
        <div id="q" style="font-size:18px; font-weight:bold; margin-bottom:20px;"></div>
        <div id="opts"></div>
        <div id="feedback" style="display:none; margin-top:20px; padding:15px; background:#f8f9fa; border-radius:10px;">
            <div id="f-res" style="font-weight:bold; margin-bottom:10px;"></div>
            <div id="f-exp" style="font-size:14px; color:#666; margin-bottom:15px;"></div>
            <div style="display:flex;">
                <button class="btn-redo" id="btn-redo">♻️ 다시(기록제외)</button>
                <button class="btn-next" onclick="goToNext()">다음 문제</button>
            </div>
        </div>
    </div>
</div>

<script>
    const GAS_URL = '아우님의_배포_URL_입력';
    const BASE_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTyZ24Pjcs6P2E4bzyxYuuVBSSxltreMArT-jxVdEK6J-Wc7_uPMTO47NwZQxA7mLZK_WIYqkmj5YAK/pub?output=csv';
    const GID = { '법규':{'객관식':'0','주관식':'2011973258'}, '관제':{'객관식':'1053182571','주관식':'217691441'} };

    let currentSub='', currentType='', allData=[], filteredQuiz=[], quizStats={}, idx=0, score=0, isResolved=false;

    // 앱 시작 시 통계 데이터 로드
    window.onload = async () => {
        try {
            const response = await fetch(`${GAS_URL}?action=getStats`); // GAS에서 JSON 반환 로직 필요하나, 여기서는 단순 fetch 예시
            // 실제로는 google.script.run을 쓰거나 GAS를 웹앱으로 호출
        } catch(e) {}
    };

    function selectSubject(s) { currentSub=s; move(1, 2); document.getElementById('sub-title').innerText = s + " 과정"; }
    async function selectType(t) {
        currentType=t; move(2, 'loader');
        const res = await fetch(`${BASE_URL}&gid=${GID[currentSub][t]}`);
        const text = await res.text();
        parseCSV(text);
        move('loader', 3);
    }

    function parseCSV(text) {
        const rows = text.split('\n').map(r => r.split(','));
        allData = rows.slice(1).map(r => ({
            lcat: r[0], q: r[2], ans: r[7], exp: r[8], opts: [r[3],r[4],r[5],r[6]]
        })).filter(i => i.q);
    }

    function startSession(mode) {
        // [로직 반영] 오마카세 vs 오답노트
        let pool = [...allData];
        if(mode === 'omakase') {
            // 누적 기출 적은 순, 오답 높은 순 정렬 (가상 통계 기반)
            pool.sort((a,b) => (quizStats[a.q]?.total || 0) - (quizStats[b.q]?.total || 0));
            filteredQuiz = pool.slice(0, 200);
        } else {
            // 오답 높은 순, 정답률 낮은 순
            pool.sort((a,b) => (quizStats[b.q]?.wrong || 0) - (quizStats[a.q]?.wrong || 0));
            filteredQuiz = pool.slice(0, 100);
        }
        idx=0; score=0; move(3, 'quiz-ui'); render();
    }

    function render() {
        isResolved = false; const item = filteredQuiz[idx];
        const stat = quizStats[item.q] || {wrong:0, total:0};
        const winRate = stat.total > 0 ? Math.round(((stat.total - stat.wrong) / stat.total) * 100) : 100;
        
        document.getElementById('prog').innerText = `${idx+1}/${filteredQuiz.length}`;
        document.getElementById('q-stat-area').innerHTML = `<div class="q-stats">📊 누적 기출: ${stat.total}회 | 오답: ${stat.wrong}회 | 정답률: ${winRate}%</div>`;
        document.getElementById('q').innerText = item.q;
        const opts = document.getElementById('opts'); opts.innerHTML = '';
        document.getElementById('feedback').style.display = 'none';

        item.opts.forEach(o => {
            const div = document.createElement('div'); div.className = 'opt-item'; div.innerText = o;
            div.onclick = () => {
                if(isResolved) return; isResolved=true;
                const isCorrect = o.trim() === item.ans.trim();
                div.classList.add(isCorrect ? 'correct' : 'wrong');
                showFeedback(isCorrect, item, o);
            };
            opts.appendChild(div);
        });
    }

    function showFeedback(isCorrect, item, userRes) {
        const f = document.getElementById('feedback');
        document.getElementById('f-res').innerText = isCorrect ? "✅ 정답입니다!" : `❌ 오답 (정답: ${item.ans})`;
        document.getElementById('f-exp').innerText = item.exp || "해설이 없습니다.";
        f.style.display = 'block';
        
        item._isCorrect = isCorrect; item._userRes = userRes;
        
        // [반복 버튼 로직]
        document.getElementById('btn-redo').onclick = () => {
            item._skip = true; alert("이 문제는 기록에 남지 않으며, 나중에 다시 출현합니다.");
            goToNext();
        };
    }

    function goToNext() {
        const item = filteredQuiz[idx];
        if(!item._skip) {
            // 서버 전송 로직 (fetch)
            const payload = new FormData();
            payload.append('subject', currentSub); payload.append('type', currentType);
            payload.append('id', item.q); payload.append('isCorrect', item._isCorrect);
            payload.append('totalCount', (quizStats[item.q]?.total || 0) + 1);
            payload.append('wrongCount', (quizStats[item.q]?.wrong || 0) + (item._isCorrect ? 0 : 1));
            fetch(GAS_URL, {method:'POST', mode:'no-cors', body:payload});
        }
        idx++; if(idx < filteredQuiz.length) render(); else location.reload();
    }

    function move(from, to) { 
        if(typeof from === 'number') document.getElementById('step'+from).style.display='none';
        else document.getElementById(from).style.display='none';
        if(typeof to === 'number') document.getElementById('step'+to).style.display='block';
        else document.getElementById(to).style.display='block';
    }
    function goBack(s) { move(s+1, s); }
</script>
</body>
</html>
