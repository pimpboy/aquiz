<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATC Training Center</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --radar-green: #00ff41;
            --radar-dim: #004411;
            --danger-red: #ff3333;
            --text-white: #e0e0e0;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'Courier New', Courier, monospace;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 500px; }
        button {
            background: none; border: 1px solid var(--radar-green);
            color: var(--radar-green); padding: 15px; margin: 10px 0;
            width: 100%; font-size: 1.1rem; cursor: pointer;
            border-radius: 5px;
        }
        button:disabled { border-color: #444; color: #444; cursor: not-allowed; }
        input[type="text"] {
            width: 100%; padding: 15px; box-sizing: border-box;
            background: #1a1a1a; border: 1px solid var(--radar-green);
            color: white; font-size: 1.2rem; margin-bottom: 10px;
        }
        .progress-container { width: 100%; background: var(--radar-dim); height: 10px; margin: 20px 0; position: relative; }
        .progress-bar { height: 100%; background: var(--radar-green); width: 0%; transition: 0.3s; }
        .nm-display { text-align: center; font-size: 0.9rem; margin-bottom: 5px; color: var(--radar-green); }
        #feedback-layer {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #111; border-top: 2px solid var(--radar-green);
            padding: 20px; display: none; max-height: 70vh; overflow-y: auto; z-index: 100;
        }
        .correct { color: var(--radar-green); font-weight: bold; }
        .incorrect { color: var(--danger-red); font-weight: bold; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div id="main-page">
        <h2>ATC TRAINING MODE</h2>
        <div style="margin: 20px 0;">
            <button id="toggle-diff" onclick="toggleDifficulty()">DIFFICULTY: EZ</button>
        </div>
        <div id="subject-btns">
            <button class="nav-btn" onclick="prepTraining('LAW', 'MULTI')">✈️ LAW (Multiple)</button>
            <button class="nav-btn" onclick="prepTraining('LAW', 'SUBJ')">✈️ LAW (Subjective)</button>
            <button class="nav-btn" onclick="prepTraining('CTRL', 'MULTI')">📡 CONTROL (Multiple)</button>
            <button class="nav-btn" onclick="prepTraining('CTRL', 'SUBJ')">📡 CONTROL (Subjective)</button>
        </div>
        <div id="mode-selection" class="hidden">
            <p style="text-align:center; color:orange;">Select Mission Profile:</p>
            <button onclick="loadQuiz('OMAKASE')">🍱 100문항 오마카세</button>
            <button onclick="loadQuiz('WRONG')">📝 100문항 오답노트</button>
            <button onclick="location.reload()" style="border-color:#666; color:#666;">Back to Menu</button>
        </div>
    </div>

    <div id="loading-page" class="hidden">
        <h3 id="loading-msg" style="text-align: center; margin-top: 50px; color: var(--radar-green);">Initializing...</h3>
    </div>

    <div id="quiz-page" class="hidden">
        <div class="nm-display" id="pos-display">Current Position: 0nm / 100nm</div>
        <div class="progress-container"><div class="progress-bar" id="pb"></div></div>
        <div id="question-box" style="font-size: 1.1rem; margin-bottom: 20px; min-height: 80px; line-height:1.4;"></div>
        <div id="answer-area"></div>
        <button onclick="stopSession()" style="border-color: #666; color: #666; margin-top: 40px; font-size:0.8rem;">ABORT MISSION</button>
    </div>
</div>

<div id="feedback-layer">
    <div id="result-status" style="font-size: 1.4rem; margin-bottom:10px;"></div>
    <div id="correct-ans-show" style="margin: 10px 0; color: #aaa; font-size:0.9rem;"></div>
    <div id="explanation-box" style="margin: 15px 0; line-height: 1.5; white-space: pre-wrap; font-size:0.95rem; background:#222; padding:10px;"></div>
    <div style="display: flex; gap: 10px;">
        <button id="go-around-btn">✈️ Go Around</button>
        <button id="deviation-btn" style="border-color: orange; color: orange;">⚠️ Possible Deviation</button>
    </div>
    <button onclick="nextQuestion()" style="background: var(--radar-green); color: black; font-weight:bold;">NEXT CONTACT</button>
</div>

<script>
/**
 * [필독] CONFIG의 URL과 GID를 본인의 시트에 맞게 꼭 수정하세요!
 */
const CONFIG = {
    EZ: {
        URL: "https://script.google.com/macros/s/AKfycbxQdRw8bAcYSfZWNV6r808lVpwED88FaZj6bviR1pMZ2DimYDKHYu13jeT7oXaT04ErGw/exec",
        GIDs: { LAW_MULTI: 0, LAW_SUBJ: 1036407965, CTRL_MULTI: 438358690, CTRL_SUBJ: 1403157384, LAW_STATS: 1846282036, CTRL_STATS: 1880986641 }
    },
    INFERNO: {
        URL: "https://script.google.com/macros/s/AKfycbzjGLlSq7-xpO0dZxCWExg06paUtwsP1kcPBXTCXhDzm8wkU0CJCyCADB0gJKsU76z7RA/exec",
        GIDs: { LAW_MULTI: 0, LAW_SUBJ: 1805786990, CTRL_MULTI: 2049752243, CTRL_SUBJ: 570358631, LAW_STATS: 668283973, CTRL_STATS: 1546545747 }
    }
};

let state = {
    difficulty: 'EZ',
    subject: '',
    type: '',
    questions: [],
    currentIndex: 0,
    sessionResults: [],
    reportedIds: [],
    excludedIds: [],
    dbCache: { EZ: {}, INFERNO: {} }
};

function showPage(id) {
    ['main-page', 'loading-page', 'quiz-page'].forEach(p => document.getElementById(p).classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
}

function toggleDifficulty() {
    state.difficulty = state.difficulty === 'EZ' ? 'INFERNO' : 'EZ';
    document.getElementById('toggle-diff').innerText = `DIFFICULTY: ${state.difficulty}`;
    document.getElementById('toggle-diff').style.color = state.difficulty === 'EZ' ? '#00ff41' : '#ff3333';
}

function prepTraining(sub, type) {
    state.subject = sub;
    state.type = type;
    document.getElementById('subject-btns').classList.add('hidden');
    document.getElementById('mode-selection').classList.remove('hidden');
}

async function loadQuiz(mode) {
    showPage('loading-page');
    const msgEl = document.getElementById('loading-msg');
    const seq = ["Performing Checklist...", "Establishing Data Link...", "Radar contact. My control."];
    
    for(let m of seq) {
        msgEl.innerText = m;
        await new Promise(r => setTimeout(r, 500));
    }

    const cfg = CONFIG[state.difficulty];
    const targetGid = cfg.GIDs[`${state.subject}_${state.type}`];
    
    try {
        const res = await fetch(`${cfg.URL}?gid=${targetGid}`);
        let data = await res.json();

        // 알고리즘: 기출_Total(K열), 오답_Total(L열) 기준 정렬
        if (mode === 'OMAKASE') {
            data.sort((a, b) => (a['기출_Total'] || 0) - (b['기출_Total'] || 0) || (b['오답_Total'] || 0) - (a['오답_Total'] || 0));
        } else {
            data.sort((a, b) => ((b['오답_Total'] || 0) / (b['기출_Total'] || 1)) - ((a['오답_Total'] || 0) / (a['기출_Total'] || 1)) || (b['기출_Total'] || 0) - (a['기출_Total'] || 0));
        }

        state.questions = data.slice(0, 100);
        state.currentIndex = 0;
        state.sessionResults = [];
        renderQuestion();
        showPage('quiz-page');
    } catch (e) {
        alert("Check GAS URL/GID and 'Anyone' access setting.");
        location.reload();
    }
}

function renderQuestion() {
    const q = state.questions[state.currentIndex];
    document.getElementById('pos-display').innerText = `Position: ${state.currentIndex + 1}nm / 100nm`;
    document.getElementById('pb').style.width = `${state.currentIndex + 1}%`;
    document.getElementById('question-box').innerText = `[${q.대분류 || 'UNCAT'}] ${q.문제}`;
    
    const area = document.getElementById('answer-area');
    area.innerHTML = '';

    if (state.type === 'MULTI') {
        for(let i=1; i<=4; i++) {
            const btn = document.createElement('button');
            btn.innerText = q[`보기${i}`];
            btn.onclick = () => checkAnswer(i);
            area.appendChild(btn);
        }
    } else {
        const input = document.createElement('input');
        input.type = 'text';
        input.id = 'subj-input';
        input.placeholder = "Response...";
        input.onkeyup = (e) => e.key === 'Enter' && checkAnswer(input.value);
        area.appendChild(input);
        const b = document.createElement('button');
        b.innerText = "SEND (ENTER)";
        b.onclick = () => checkAnswer(input.value);
        area.appendChild(b);
        input.focus();
    }
}

function checkAnswer(userAns) {
    const q = state.questions[state.currentIndex];
    let isCorrect = false;

    if (state.type === 'MULTI') {
        isCorrect = parseInt(userAns) === parseInt(q.정답번호);
    } else {
        const clean = (s) => s.toString().replace(/\s+/g, '').toLowerCase().split(',').sort().join(',');
        isCorrect = clean(userAns) === clean(q.정답);
    }

    state.sessionResults.push({ id: q.ID, isCorrect: isCorrect });

    const status = document.getElementById('result-status');
    status.innerHTML = isCorrect ? '<span class="correct">● CORRECT</span>' : '<span class="incorrect">● INCORRECT</span>';
    document.getElementById('correct-ans-show').innerText = `Correct: ${state.type === 'MULTI' ? q[`보기${q.정답번호}`] : q.정답}`;
    document.getElementById('explanation-box').innerText = q.해설 || "No manual available.";
    
    document.getElementById('go-around-btn').className = state.difficulty === 'EZ' ? '' : 'hidden';
    document.getElementById('deviation-btn').className = state.difficulty === 'INFERNO' ? '' : 'hidden';
    
    document.getElementById('go-around-btn').onclick = () => { state.excludedIds.push(q.ID); alert("Go-around logged."); };
    document.getElementById('deviation-btn').onclick = () => { state.reportedIds.push(q.ID); alert("Deviation reported."); };

    document.getElementById('feedback-layer').style.display = 'block';
}

function nextQuestion() {
    document.getElementById('feedback-layer').style.display = 'none';
    state.currentIndex++;
    if (state.currentIndex < state.questions.length) renderQuestion();
    else stopSession();
}

async function stopSession() {
    if(!confirm("Sync with Tower?")) return;
    showPage('loading-page');
    
    const cfg = CONFIG[state.difficulty];
    
    // 결과 데이터에 문제 텍스트 등을 포함시킴
    const detailedResults = state.sessionResults.map(res => {
        const q = state.questions.find(item => item.ID === res.id);
        return {
            id: res.id,
            isCorrect: res.isCorrect,
            type: state.type, // MULTI 또는 SUBJ
            questionText: q.문제,
            userAns: res.userAns || "N/A"
        };
    });

    try {
        await fetch(cfg.URL, {
            method: 'POST',
            body: JSON.stringify({
                results: detailedResults, // 상세 정보 포함
                reportedIds: state.reportedIds,
                excludedIds: state.excludedIds,
                masterGid: cfg.GIDs[`${state.subject}_${state.type}`],
                statsGid: cfg.GIDs[`${state.subject}_STATS`]
            })
        });
    } catch (e) { console.error(e); }
    location.reload();
}
</script>
</body>
</html>
