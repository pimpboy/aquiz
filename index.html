<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATC Training Center v6.5</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --radar-green: #00ff41;
            --radar-dim: #004411;
            --danger-red: #ff3333;
            --text-white: #f5f5f7; /* 명암비 강화 */
            --primary-blue: #4f46e5;
            --card-bg: #161616;
            --border-color: #333;
        }
        body {
            background-color: var(--bg-color); color: var(--text-white);
            font-family: 'Pretendard', sans-serif; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 600px; position: relative; }
        .mode-card { background: var(--card-bg); border-radius: 20px; padding: 25px; margin-bottom: 20px; border: 1px solid var(--border-color); }
        
        /* 버튼 가독성 개선 */
        button { border-radius: 12px; cursor: pointer; transition: 0.2s; font-weight: bold; border: 1px solid transparent; padding: 15px; width: 100%; font-size: 1rem; }
        .btn-start { background: var(--primary-blue); color: white; box-shadow: 0 4px 14px rgba(79, 70, 229, 0.3); }
        .btn-opt { background: #1a1a1a; border: 1px solid var(--border-color); color: var(--text-white); text-align: left; padding-left: 20px; margin-bottom: 12px; }
        .btn-opt:hover { border-color: var(--radar-green); background: rgba(0, 255, 65, 0.05); }
        
        /* 중단 버튼 위치 조정 */
        .btn-abort { position: absolute; top: -10px; right: 0; width: auto; padding: 8px 16px; background: none; border: 1px solid var(--danger-red); color: var(--danger-red); font-size: 0.8rem; opacity: 0.7; }
        .btn-abort:hover { opacity: 1; background: var(--danger-red); color: white; }

        .progress-container { width: 100%; background: #222; height: 6px; border-radius: 3px; margin: 25px 0; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--radar-green); width: 0%; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        
        #feedback-layer { position: fixed; bottom: 0; left: 0; right: 0; background: #111; border-top: 3px solid var(--radar-green); padding: 25px; display: none; z-index: 1000; border-radius: 30px 30px 0 0; box-shadow: 0 -10px 40px rgba(0,0,0,0.5); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div id="main-page">
        <h1 style="text-align: center; letter-spacing: -1px;">ATC TRAINING CENTER</h1>
        <p style="text-align: center; color: var(--radar-green); font-size: 0.85rem; margin-top: -10px; font-weight: bold; margin-bottom: 30px;">[ SQUADRON LEADER PORKER ]</p>
        
        <div class="toggle-container" style="background:#222; padding:15px; border-radius:50px; display:flex; justify-content:center; align-items:center; gap:15px; margin-bottom:30px;">
            <span style="font-size:0.8rem;">NORMAL</span>
            <label class="switch"><input type="checkbox" id="diff-toggle" onchange="window.setDifficulty(this.checked)"><span class="slider"></span></label>
            <span style="color:var(--danger-red); font-size:0.8rem;">HELL</span>
        </div>

        <div id="subject-cards">
            <div class="mode-card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <span style="font-weight:800; font-size:1.1rem;">✈️ 항공법규 (Law)</span>
                    <button style="width:auto; padding:6px 12px; font-size:0.7rem; background:#333; color:#ccc;" onclick="window.loadStats('LAW')">DATA CENTER</button>
                </div>
                <div style="display:flex; gap:10px;">
                    <button class="btn-start" onclick="window.prepMission('LAW', 'MULTI')">객관식</button>
                    <button class="btn-start" onclick="window.prepMission('LAW', 'SUBJ')">주관식</button>
                </div>
            </div>
            <div class="mode-card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <span style="font-weight:800; font-size:1.1rem;">📡 항공관제 (Control)</span>
                    <button style="width:auto; padding:6px 12px; font-size:0.7rem; background:#333; color:#ccc;" onclick="window.loadStats('CTRL')">DATA CENTER</button>
                </div>
                <div style="display:flex; gap:10px;">
                    <button class="btn-start" onclick="window.prepMission('CTRL', 'MULTI')">객관식</button>
                    <button class="btn-start" onclick="window.prepMission('CTRL', 'SUBJ')">주관식</button>
                </div>
            </div>
        </div>

        <div id="mode-selection" class="hidden">
            <div class="mode-card" style="border-color:orange;">
                <p style="text-align:center; color:orange; font-weight:bold; margin-top:0;">SELECT MISSION PROFILE</p>
                <button class="btn-opt" onclick="window.loadQuiz('OMAKASE')">🍱 100문항 오마카세 (신규)</button>
                <button class="btn-opt" onclick="window.loadQuiz('WRONG')">📝 100문항 오답노트 (취약)</button>
                <button onclick="location.reload()" style="background:none; color:#666; font-size:0.8rem; border:none;">BACK TO BASE</button>
            </div>
        </div>
    </div>

    <div id="quiz-page" class="hidden">
        <button class="btn-abort" onclick="window.stopSession()">ABORT MISSION</button>
        <div id="pos-display" style="text-align:center; color:var(--radar-green); font-weight:800; margin-top:20px;"></div>
        <div class="progress-container"><div class="progress-bar" id="pb"></div></div>
        <div id="question-box" style="margin:40px 0; font-size:1.2rem; font-weight:700; line-height:1.6; text-align:center;"></div>
        <div id="answer-area"></div>
    </div>
</div>

<div id="feedback-layer">
    <div id="result-status" style="text-align:center; padding:12px; font-weight:900; border-radius:10px; margin-bottom:15px; font-size:1.2rem;"></div>
    <div style="background:#1a1a1a; padding:20px; border-radius:15px; margin-bottom:20px; border:1px solid #333;">
        <div id="correct-ans-show" style="color:var(--radar-green); font-weight:800; margin-bottom:10px; font-size:1.1rem;"></div>
        <div id="explanation-box" style="font-size:0.95rem; line-height:1.6; color:#bbb;"></div>
    </div>
    <div style="display:flex; gap:10px; margin-bottom:15px;">
        <button id="go-around-btn" style="flex:1; border:1px solid var(--radar-green); color:var(--radar-green); background:none; font-size:0.8rem;">✈️ GO AROUND</button>
        <button id="deviation-btn" style="flex:1; border:1px solid orange; color:orange; background:none; font-size:0.8rem;">⚠️ DEVIATION</button>
    </div>
    <button id="next-btn" style="background:var(--radar-green); color:black; font-size:1.2rem; border:none;">NEXT CONTACT</button>
</div>

<script>
// [원본 유지] 전역 상태 및 설정
window.state = { difficulty: 'EZ', subject: '', type: '', questions: [], currentIndex: 0, sessionResults: [], reportedIds: [], excludedIds: [], isProcessing: false };
const CONFIG = {
    EZ: {
        URL: "https://script.google.com/macros/s/AKfycbxQdRw8bAcYSfZWNV6r808lVpwED88FaZj6bviR1pMZ2DimYDKHYu13jeT7oXaT04ErGw/exec",
        GIDs: { LAW_MULTI: 0, LAW_SUBJ: 1036407965, CTRL_MULTI: 438358690, CTRL_SUBJ: 1403157384, LAW_STATS: 1846282036, CTRL_STATS: 1880986641 }
    },
    INFERNO: {
        URL: "https://script.google.com/macros/s/AKfycbzjGLlSq7-xpO0dZxCWExg06paUtwsP1kcPBXTCXhDzm8wkU0CJCyCADB0gJKsU76z7RA/exec",
        GIDs: { LAW_MULTI: 0, LAW_SUBJ: 1805786990, CTRL_MULTI: 2049752243, CTRL_SUBJ: 570358631, LAW_STATS: 668283973, CTRL_STATS: 1546545747 }
    }
};
// [원본 유지] 기본 함수들 (showPage, setDifficulty, prepMission 등)
window.showPage = function(id) {
    ['main-page', 'quiz-page'].forEach(p => document.getElementById(p)?.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
};

window.setDifficulty = (isHell) => window.state.difficulty = isHell ? 'INFERNO' : 'EZ';
window.prepMission = (sub, type) => {
    window.state.subject = sub; window.state.type = type;
    document.getElementById('subject-cards').classList.add('hidden');
    document.getElementById('mode-selection').classList.remove('hidden');
};

// [원본 유지 + 셔플 추가] 데이터 로드
window.loadQuiz = async function(mode) {
    showPage('main-page'); // 로딩 대신 잠시 대기
    const cfg = CONFIG[window.state.difficulty];
    const targetGid = cfg.GIDs[`${window.state.subject}_${window.state.type}`];
    try {
        const res = await fetch(`${cfg.URL}?gid=${targetGid}`);
        let data = await res.json();
        
        // 알고리즘 정렬
        if (mode === 'OMAKASE') data.sort((a,b) => (Number(a['누적 기출 횟수'])||0)-(Number(b['누적 기출 횟수'])||0));
        else data.sort((a,b) => (Number(b['누적 오답 횟수'])||0)-(Number(a['누적 오답 횟수'])||0));
        
        window.state.questions = data.slice(0, 100);
        window.state.currentIndex = 0;
        window.renderQuestion();
        window.showPage('quiz-page');
    } catch(e) { alert("연결 실패"); }
};

// [개선] 문제 및 보기 셔플 렌더링
window.renderQuestion = function() {
    const q = window.state.questions[window.state.currentIndex];
    document.getElementById('pos-display').innerText = `RADAR CONTACT: ${window.state.currentIndex + 1} / 100`;
    document.getElementById('pb').style.width = `${window.state.currentIndex + 1}%`;
    document.getElementById('question-box').innerText = q.문제;
    
    const area = document.getElementById('answer-area');
    area.innerHTML = '';

    if (window.state.type === 'MULTI') {
        // [핵심] 보기 셔플 로직
        let options = [];
        for(let i=1; i<=4; i++) {
            if(q['보기'+i]) options.push({ val: i, text: q['보기'+i] });
        }
        options.sort(() => Math.random() - 0.5); // 무작위 셔플

        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = "btn-opt";
            btn.innerText = opt.text;
            btn.onclick = () => window.checkAnswer(opt.val); // 원본 정답 번호로 체크
            area.appendChild(btn);
        });
    } else {
        const input = document.createElement('input');
        input.style = "width:100%; padding:18px; background:#111; border:2px solid var(--radar-green); color:white; border-radius:15px; box-sizing:border-box; margin-bottom:15px; font-size:1.1rem; text-align:center;";
        input.onkeyup = (e) => e.key === 'Enter' && window.checkAnswer(input.value);
        area.appendChild(input);
        setTimeout(() => input.focus(), 200);
    }
};

// [원본 유지] 정답 체크 로직 (변화 없음)
window.checkAnswer = function(userAns) {
    if (window.state.isProcessing) return;
    window.state.isProcessing = true;
    const q = window.state.questions[window.state.currentIndex];
    const isCorrect = (window.state.type === 'MULTI') ? parseInt(userAns) === parseInt(q.정답번호) : userAns.trim() === q.정답;
    
    const status = document.getElementById('result-status');
    status.innerText = isCorrect ? "● CONTACT CLEAR" : "● DEVIATION DETECTED";
    status.style.color = isCorrect ? "var(--radar-green)" : "var(--danger-red)";
    status.style.background = isCorrect ? "rgba(0,255,65,0.1)" : "rgba(255,51,51,0.1)";
    
    document.getElementById('correct-ans-show').innerText = "IDENTIFIED: " + (window.state.type==='MULTI'?q['보기'+q.정답번호]:q.정답);
    document.getElementById('explanation-box').innerText = q.해설 || "NO MANUAL AVAILABLE.";
    document.getElementById('feedback-layer').style.display = 'block';
    
    window.state.sessionResults.push({ id: q.ID, isCorrect });
};

window.nextQuestion = () => {
    document.getElementById('feedback-layer').style.display = 'none';
    window.state.isProcessing = false;
    window.state.currentIndex++;
    if(window.state.currentIndex < window.state.questions.length) window.renderQuestion();
    else window.stopSession();
};

document.getElementById('next-btn').onclick = window.nextQuestion;
</script>
</body>
</html>
