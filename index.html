<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATC Modern Console: California</title>
    <style>
        :root {
            /* Light Mode - 가독성 중심 세팅 */
            --bg-color: #f2f2f7; 
            --card-bg: #ffffff;
            --text-main: #000000; 
            --text-sub: #3a3a3c;
            --accent: #007aff; 
            --radar-green: #248a3d; 
            --danger: #ff3b30; 
            --border: #c6c6c8;
            --opt-bg: #f9f9f9;
        }
        [data-theme="dark"] {
            /* Dark Mode - 기존 쌈뽕함 유지 */
            --bg-color: #000000; 
            --card-bg: #1c1c1e;
            --text-main: #ffffff; 
            --text-sub: #a1a1a6;
            --accent: #5e5ce6; 
            --radar-green: #30d158; 
            --danger: #ff453a; 
            --border: #38383a;
            --opt-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg-color); color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Pretendard", sans-serif;
            margin: 0; display: flex; justify-content: center; min-height: 100vh;
            transition: all 0.3s ease;
        }

        .container { width: 92%; max-width: 500px; padding: 40px 0; position: relative; }

        .glass-card {
            background: var(--card-bg); border-radius: 24px; padding: 24px; margin-bottom: 20px;
            border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 { font-size: 2.2rem; font-weight: 800; text-align: center; letter-spacing: -1.5px; margin-bottom: 5px; }
        .subtitle { color: var(--accent); text-align: center; font-weight: 700; font-size: 0.8rem; margin-bottom: 40px; letter-spacing: 2px; }

        button { border-radius: 16px; cursor: pointer; transition: all 0.2s; font-weight: 700; border: none; padding: 18px; font-size: 1rem; display: flex; align-items: center; justify-content: center; width: 100%; }
        .btn-primary { background: var(--accent); color: #ffffff; }
        .btn-abort { background: var(--danger); color: #ffffff; width: auto; padding: 8px 16px; font-size: 0.75rem; position: absolute; top: 10px; right: 0; }
        
        .opt-btn { background: var(--opt-bg); color: var(--text-main); border: 1px solid var(--border); text-align: left; justify-content: flex-start; margin-bottom: 12px; }
        .opt-btn:hover { border-color: var(--accent); background: var(--accent); color: #ffffff; }

        .pb-wrap { height: 6px; background: var(--border); border-radius: 100px; margin: 25px 0; }
        .pb-fill { height: 100%; background: var(--accent); transition: 0.5s ease; width: 0%; }

        #feedback-layer {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 500px; background: var(--card-bg);
            border-radius: 30px 30px 0 0; padding: 30px; display: none; z-index: 1000;
            border-top: 2px solid var(--accent); box-shadow: 0 -15px 40px rgba(0,0,0,0.2);
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div id="main-page">
        <h1>ATC CENTER</h1>
        <p class="subtitle">CALIFORNIA DESIGN v4.1</p>
        <div class="glass-card">
            <button class="btn-primary" onclick="window.loadQuiz('LAW')">MISSION START</button>
        </div>
    </div>

    <div id="quiz-page" class="hidden">
        <button class="btn-abort" onclick="location.reload()">ABORT MISSION</button>
        <div id="pos-display" style="text-align:center; font-weight:800; margin-top:20px;"></div>
        <div class="pb-wrap"><div class="pb-fill" id="pb"></div></div>
        <div id="question-box" class="glass-card" style="font-size:1.2rem; font-weight:700;"></div>
        <div id="answer-area"></div>
    </div>
</div>

<div id="feedback-layer">
    <div id="result-status" style="text-align:center; font-weight:900; font-size:1.2rem; margin-bottom:15px; padding:10px; border-radius:12px;"></div>
    <div id="correct-ans-show" style="color:var(--radar-green); font-weight:800; margin-bottom:10px;"></div>
    <button class="btn-primary" onclick="window.nextQuestion()">NEXT CONTACT</button>
</div>

<button id="theme-toggle" onclick="window.toggleTheme()" style="position:fixed; bottom:20px; right:20px; width:50px; height:50px; border-radius:25px; background:var(--accent); color:white; border:none; cursor:pointer; font-size:1.5rem; z-index:2000;">🌓</button>

<script>
window.state = { questions: [], currentIndex: 0, isProcessing: false };

window.toggleTheme = () => {
    const html = document.documentElement;
    const current = html.getAttribute('data-theme');
    html.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
};

window.loadQuiz = async function() {
    // 셈플 데이터 무결성 검사 포함 로드 (실제 URL 연동 필요)
    window.state.questions = [
        {ID: 1, 문제: "국내 항공안전법의 기본이 되는 국제법은?", 보기1: "동경협약", 보기2: "미국 연방항공규정", 보기3: "국제민간항공협약 및 부속서", 보기4: "국제항공업무통과협정", 정답번호: 3},
        {ID: 2, 문제: "형식증명이란?", 보기1: "안전하게 비행할 성능이 있다는 증명", 보기2: "기술기준에 적합하다는 인정 증명", 보기3: "설계가 기술기준에 적합하다는 증명", 보기4: "기술, 설비 등을 갖추고 있음을 인정", 정답번호: 3}
    ];
    document.getElementById('main-page').classList.add('hidden');
    document.getElementById('quiz-page').classList.remove('hidden');
    window.renderQuestion();
};

window.renderQuestion = function() {
    const q = window.state.questions[window.state.currentIndex];
    if(!q || !q.문제) return; // 데이터 증발 방지 로직

    document.getElementById('pos-display').innerText = `STEP ${window.state.currentIndex + 1} / ${window.state.questions.length}`;
    document.getElementById('pb').style.width = `${((window.state.currentIndex + 1)/window.state.questions.length)*100}%`;
    document.getElementById('question-box').innerText = q.문제;
    
    const area = document.getElementById('answer-area');
    area.innerHTML = '';
    [1,2,3,4].forEach(i => {
        if(q['보기'+i]) {
            const btn = document.createElement('button');
            btn.className = "opt-btn";
            btn.innerText = q['보기'+i];
            btn.onclick = () => window.checkAnswer(i);
            area.appendChild(btn);
        }
    });
};

window.checkAnswer = function(num) {
    if(window.state.isProcessing) return;
    window.state.isProcessing = true;
    const q = window.state.questions[window.state.currentIndex];
    const isCorrect = parseInt(num) === q.정답번호;
    
    const status = document.getElementById('result-status');
    status.innerText = isCorrect ? "CONTACT ESTABLISHED" : "DEVIATION DETECTED";
    status.style.color = isCorrect ? "var(--radar-green)" : "var(--danger)";
    
    document.getElementById('correct-ans-show').innerText = "IDENTIFIED: " + q['보기'+q.정답번호];
    document.getElementById('feedback-layer').style.display = 'block';
};

window.nextQuestion = function() {
    document.getElementById('feedback-layer').style.display = 'none';
    window.state.isProcessing = false;
    window.state.currentIndex++;
    if(window.state.currentIndex < window.state.questions.length) window.renderQuestion();
    else location.reload();
};
</script>
</body>
</html>
