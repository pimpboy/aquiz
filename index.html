<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>항공 훈련소 v3.9 (Full Specs)</title>
    <style>
        :root { --p: #1a73e8; --bg: #f8f9fa; --txt: #202124; --err: #d93025; --suc: #1e8e3e; --border: #dadce0; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 15px; display: flex; justify-content: center; }
        #app { background: #fff; width: 100%; max-width: 500px; border-radius: 15px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); min-height: 85vh; display: flex; flex-direction: column; box-sizing: border-box; }
        
        .btn-main { width: 100%; padding: 16px; background: var(--p); color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 17px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-sub { width: 100%; padding: 12px; background: #fff; color: var(--p); border: 2px solid var(--p); border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .btn-stop { background: #fee; color: var(--err); border: 1px solid #fadad7; padding: 5px 12px; border-radius: 5px; font-size: 12px; cursor: pointer; font-weight: bold; }
        
        .menu-group { margin-bottom: 20px; animation: fadeIn 0.5s; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; color: #5f6368; }
        select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; background: #fff; margin-bottom: 15px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: #70757a; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .q-text { font-size: 19px; font-weight: bold; margin-bottom: 25px; line-height: 1.6; word-break: keep-all; }
        .opt-list { display: grid; gap: 12px; }
        .opt-item { padding: 16px; border: 1px solid var(--border); border-radius: 10px; background: #fff; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .opt-item.correct { background-color: #e6f4ea; border-color: var(--suc); color: var(--suc); font-weight: bold; }
        .opt-item.wrong { background-color: #fce8e6; border-color: var(--err); color: var(--err); }
        .opt-item.disabled { cursor: default; pointer-events: none; }

        .review-card { border: 1px solid #eee; border-radius: 10px; padding: 15px; margin-bottom: 15px; background: #fafafa; border-left: 5px solid var(--err); }
        #feedback-area { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; border: 1px solid var(--border); background: #fafafa; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="app">
    <div id="loader" style="display:none; text-align:center; padding-top:100px;">📡<br>데이터 동기화 중...</div>

    <div id="step1" class="menu-group">
        <h2 style="text-align:center;">✈️ 항공 훈련소 v3.9</h2>
        <button class="btn-main" onclick="selectSubject('법규')">항공법규</button>
        <button class="btn-main" style="background:#5f6368" onclick="selectSubject('관제')">관제일반</button>
    </div>

    <div id="step2" class="menu-group" style="display:none">
        <h3 id="sub-title"></h3>
        <button class="btn-main" onclick="selectType('객관식')">객관식 훈련</button>
        <button class="btn-main" onclick="selectType('주관식')">주관식 훈련</button>
        <button class="btn-sub" onclick="goBack(1)">처음으로</button>
    </div>

    <div id="step3" class="menu-group" style="display:none">
        <h3 id="mission-title"></h3>
        <label>세부 카테고리</label>
        <select id="lcat-select"></select>
        <button class="btn-main" style="background:#d93025" onclick="startSession('weak')">🎯 취약문제 100선 정밀타격</button>
        <button class="btn-main" style="background:#1e8e3e" onclick="startSession('smart')">🍱 200문제 지능형 오마카세</button>
        <button class="btn-sub" onclick="goBack(2)">이전으로</button>
    </div>

    <div id="quiz-ui" style="display:none">
        <div class="header">
            <span id="prog"></span>
            <button class="btn-stop" onclick="finishMission()">🏁 훈련 중단</button>
        </div>
        <div id="q" class="q-text"></div>
        <div id="opts" class="opt-list"></div>
        <div id="feedback-area">
            <div id="feedback-res" style="font-weight:bold; margin-bottom:8px;"></div>
            <div id="exp-content" style="font-size:14px; color:#555; white-space:pre-wrap;"></div>
            <button class="btn-main" onclick="goToNext()">다음 문제</button>
        </div>
    </div>

    <div id="review-ui" style="display:none">
        <h2 style="text-align:center;">📝 미션 디브리핑</h2>
        <div id="report-summary" style="background:#202124; color:white; padding:20px; border-radius:10px; margin-bottom:20px; text-align:center;"></div>
        <div id="review-container"></div>
        <button class="btn-main" onclick="location.reload()">다시 훈련하기</button>
    </div>
</div>

<script>
    const GID_MAP = {
        '법규': { '객관식': '0', '주관식': '2011973258' },
        '관제': { '객관식': '1053182571', '주관식': '217691441' }
    };
    const BASE_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTyZ24Pjcs6P2E4bzyxYuuVBSSxltreMArT-jxVdEK6J-Wc7_uPMTO47NwZQxA7mLZK_WIYqkmj5YAK/pub?single=true&output=csv';
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxtjoaIxCQy8e97qwIhHPhVv5JXRDFaJQxKqMyFUZ_j7aoS_t44vnP-gr4Z77YujA-A/exec';
    
    let currentSub = '', currentType = '';
    let allData = [], filteredQuiz = [], idx = 0, score = 0;
    let wrongHistory = [];

    function selectSubject(sub) {
        currentSub = sub;
        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'block';
        document.getElementById('sub-title').innerText = `🛸 ${sub} 코스`;
    }

    async function selectType(type) {
        currentType = type;
        document.getElementById('step2').style.display = 'none';
        document.getElementById('loader').style.display = 'block';
        const gid = GID_MAP[currentSub][currentType];
        try {
            const res = await fetch(`${BASE_URL}&gid=${gid}`);
            const text = await res.text();
            parseCSVData(text);
            document.getElementById('loader').style.display = 'none';
            document.getElementById('step3').style.display = 'block';
            document.getElementById('mission-title').innerText = `${currentSub} ${currentType} 설정`;
        } catch (e) { alert("데이터 로드 실패!"); location.reload(); }
    }

    function parseCSVData(text) {
        const rows = text.split('\n').map(row => {
            const cells = []; let cell = '', inQuotes = false;
            for(let char of row) {
                if(char === '"') inQuotes = !inQuotes;
                else if(char === ',' && !inQuotes) { cells.push(cell.trim()); cell = ''; }
                else cell += char;
            }
            cells.push(cell.trim()); return cells;
        });
        
        const h = rows[0];
    const find = (k) => h.findIndex(name => name.includes(k));
    
    allData = rows.slice(1).map(r => {
        let answerText = '';
        if (currentType === '주관식') {
            answerText = r[4]; // 주관식: E열(Index 4) 정답 텍스트
        } else {
            // 객관식 정답 처리 로직 보강
            const rawAns = r[find('정답')]; // '정답' 열의 값 (예: 1 또는 지방항공청장)
            const opt1 = r[find('보기1')], opt2 = r[find('보기2')], opt3 = r[find('보기3')], opt4 = r[find('보기4')];
            const opts = [opt1, opt2, opt3, opt4];

            // 만약 정답 열이 숫자(1,2,3,4)라면 해당 보기 텍스트를 정답으로 설정
            if (rawAns == "1") answerText = opt1;
            else if (rawAns == "2") answerText = opt2;
            else if (rawAns == "3") answerText = opt3;
            else if (rawAns == "4") answerText = opt4;
            else answerText = rawAns; // 숫자 형태가 아니면 써진 그대로를 정답으로 간주
        }

        return {
            lcat: r[find('대분류')],
            q: r[3], // D열 (Index 3) 문제
            opts: [r[find('보기1')], r[find('보기2')], r[find('보기3')], r[find('보기4')]],
            ans: answerText,
            exp: r[find('해설')],
            wrongCount: parseInt(r[10]) || 0,
            totalCount: parseInt(r[11]) || 0
        };
    }).filter(i => i.q);

        const lcats = [...new Set(allData.map(d => d.lcat))].filter(Boolean);
        const lSelect = document.getElementById('lcat-select');
        lSelect.innerHTML = '<option value="ALL">전체 카테고리</option>';
        lcats.forEach(c => lSelect.innerHTML += `<option value="${c}">${c}</option>`);
    }

    function startSession(mode) {
        const lVal = document.getElementById('lcat-select').value;
        let pool = allData.filter(d => lVal === 'ALL' || d.lcat === lVal);

        if (mode === 'weak') {
            // 오답 많은 순 100개
            pool.sort((a, b) => b.wrongCount - a.wrongCount);
            filteredQuiz = pool.slice(0, 100);
        } else {
            // 지능형 오마카세 200개 (오답 가중치 랜덤)
            pool.sort((a, b) => (b.wrongCount * 2 - b.totalCount) - (a.wrongCount * 2 - a.totalCount));
            filteredQuiz = pool.slice(0, 200).sort(() => Math.random() - 0.5);
        }

        if(filteredQuiz.length === 0) return alert("문제가 없읍니다.");
        idx = 0; score = 0; wrongHistory = [];
        document.getElementById('step3').style.display = 'none';
        document.getElementById('quiz-ui').style.display = 'block';
        render();
    }

    function render() {
        const item = filteredQuiz[idx];
        document.getElementById('prog').innerText = `${idx + 1} / ${filteredQuiz.length}`;
        document.getElementById('q').innerText = item.q;
        const container = document.getElementById('opts'); container.innerHTML = '';
        document.getElementById('feedback-area').style.display = 'none';

        if (currentType === '주관식') {
            const input = document.createElement('input');
            input.id = 'subjective-ans'; input.placeholder = '답안 입력...';
            input.style = "width:100%; padding:15px; font-size:18px; border:2px solid var(--border); border-radius:10px; box-sizing:border-box;";
            const btn = document.createElement('button');
            btn.className = 'btn-main'; btn.innerText = '제출';
            btn.onclick = () => checkSubjective(input.value.trim(), item);
            container.appendChild(input); container.appendChild(btn);
            setTimeout(() => input.focus(), 100);
        } else {
            item.opts.filter(o => o).forEach(o => {
                const btn = document.createElement('div'); btn.className = 'opt-item';
                btn.innerText = o; btn.onclick = () => check(btn, o === item.ans, item);
                container.appendChild(btn);
            });
        }
    }

    function check(btn, isCorrect, item) {
        if (!isCorrect) wrongHistory.push(item);
        if (isCorrect) score++;
        btn.classList.add(isCorrect ? 'correct' : 'wrong');
        document.querySelectorAll('.opt-item').forEach(b => {
            b.classList.add('disabled');
            if(b.innerText === item.ans) b.classList.add('correct');
        });
        showFeedback(isCorrect, item);
        sendDataToGAS(item.q, currentSub, currentType, btn.innerText, isCorrect);
    }

    function checkSubjective(userAns, item) {
        if(!userAns) return alert("답을 입력하십시오!");
        const isCorrect = userAns.replace(/\s/g, "").toLowerCase() === item.ans.replace(/\s/g, "").toLowerCase();
        if (!isCorrect) wrongHistory.push(item);
        if (isCorrect) score++;
        document.getElementById('subjective-ans').disabled = true;
        showFeedback(isCorrect, item);
        sendDataToGAS(item.q, currentSub, currentType, userAns, isCorrect);
    }

    function showFeedback(isCorrect, item) {
        const res = document.getElementById('feedback-res');
        res.innerText = isCorrect ? "✅ 정답입니다!" : `❌ 틀렸읍니다!`;
        res.style.color = isCorrect ? "var(--suc)" : "var(--err)";
        if(!isCorrect) res.innerHTML += `<br><small style="color:#333">(정답: ${item.ans})</small>`;
        document.getElementById('exp-content').innerText = item.exp || "해설 데이터가 없읍니다.";
        document.getElementById('feedback-area').style.display = 'block';
    }

    function finishMission() {
        if (!confirm("정말 중단하시겠읍니까? 지금까지의 성적이 저장됩니다.")) return;
        const totalTried = idx + (document.getElementById('feedback-area').style.display === 'block' ? 1 : 0);
        const rate = totalTried === 0 ? 0 : Math.round((score / totalTried) * 100);

        document.getElementById('quiz-ui').style.display = 'none';
        document.getElementById('review-ui').style.display = 'block';
        document.getElementById('report-summary').innerHTML = `
            <div style="font-size:32px; font-weight:bold; color:#4cc9f0;">${rate}%</div>
            <div style="font-size:14px; opacity:0.8;">정답률 (${score}/${totalTried})</div>
        `;

        const container = document.getElementById('review-container');
        container.innerHTML = '<h3>❌ 오답 복기 리스트</h3>';
        if(wrongHistory.length === 0) container.innerHTML += "<p>오답이 없읍니다! 훌륭합니다.</p>";
        wrongHistory.forEach((item, i) => {
            container.innerHTML += `
                <div class="review-card">
                    <div style="font-weight:bold; margin-bottom:5px;">${i+1}. ${item.q}</div>
                    <div style="color:var(--err); font-size:14px;">정답: ${item.ans}</div>
                    <div style="font-size:12px; color:#666; margin-top:5px;">해설: ${item.exp || '없음'}</div>
                </div>
            `;
        });
    }

    function sendDataToGAS(q, sub, type, res, isCorrect) {
        const payload = new FormData();
        payload.append('subject', sub); payload.append('type', type);
        payload.append('id', q); payload.append('result', res); payload.append('isCorrect', isCorrect);
        fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: payload });
    }

    function goToNext() { 
        idx++; 
        if(idx < filteredQuiz.length) render(); 
        else finishMission(); 
    }

    function goBack(step) {
        document.querySelectorAll('.menu-group, #quiz-ui, #review-ui').forEach(el => el.style.display = 'none');
        document.getElementById(`step${step}`).style.display = 'block';
    }
</script>
</body>
</html>
