<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATC Training Center - Engine v2.0</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --radar-green: #00ff41;
            --radar-dim: #004411;
            --danger-red: #ff3333;
            --text-white: #e0e0e0;
            --primary-blue: #4f46e5;
            --card-bg: #151515;
            --border-color: #2a2a2a;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Pretendard', sans-serif; }
        body {
            background-color: var(--bg-color); color: var(--text-white);
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 600px; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* UI Components */
        .mode-card { background: var(--card-bg); border-radius: 20px; padding: 24px; margin-bottom: 20px; border: 1px solid var(--border-color); }
        button { border-radius: 12px; cursor: pointer; transition: 0.2s; font-weight: bold; border: none; padding: 16px; width: 100%; font-size: 1rem; }
        button:active { transform: scale(0.98); opacity: 0.8; }
        .btn-primary { background: var(--primary-blue); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border-color); color: #888; }
        .btn-stats { width: auto; padding: 8px 16px; font-size: 0.75rem; background: #333; color: var(--radar-green); border: 1px solid var(--radar-dim); }

        /* Difficulty Toggle */
        .toggle-area { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 30px; font-weight: 900; background: #222; padding: 10px; border-radius: 50px; width: fit-content; margin-left: auto; margin-right: auto; }
        .switch { position: relative; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #444; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: var(--danger-red); }
        input:checked + .slider:before { transform: translateX(24px); }

        /* Quiz Page */
        .progress-container { width: 100%; background: #222; height: 4px; border-radius: 10px; margin: 15px 0; }
        .progress-bar { height: 100%; background: var(--radar-green); width: 0%; transition: 0.4s; box-shadow: 0 0 10px var(--radar-green); }
        #question-text { font-size: 1.25rem; line-height: 1.6; margin: 30px 0; min-height: 80px; }
        #subj-input { width: 100%; padding: 18px; background: #111; border: 2px solid #333; color: white; border-radius: 15px; font-size: 1.1rem; outline: none; margin-bottom: 15px; }
        #subj-input:focus { border-color: var(--radar-green); }

        /* Data Center Table */
        .table-wrap { overflow-x: auto; border: 1px solid var(--border-color); border-radius: 15px; background: #111; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; min-width: 500px; }
        th { background: #1a1a1a; padding: 15px; text-align: center; color: var(--radar-green); border-bottom: 2px solid var(--border-color); cursor: pointer; }
        td { padding: 15px; border-bottom: 1px solid #1a1a1a; text-align: center; }
        .rate-bar-bg { width: 100%; background: #222; height: 4px; border-radius: 2px; margin-top: 5px; }
        .rate-bar-fill { height: 100%; background: var(--danger-red); border-radius: 2px; }

        /* Feedback Layer */
        #feedback-layer { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 600px; background: #0f0f0f; border-top: 3px solid var(--radar-green); padding: 25px; display: none; z-index: 1000; border-radius: 25px 25px 0 0; box-shadow: 0 -10px 40px rgba(0,0,0,0.9); }
        .hidden { display: none !important; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <!-- 1. 메인 홈 -->
    <div id="page-home">
        <h1 style="text-align:center; color:var(--radar-green); letter-spacing:2px; margin-top:40px;">ATC TRAINING CENTER</h1>
        <p style="text-align:center; color:#666; margin-bottom:40px;">Select your mission area, Lieutenant.</p>
        
        <div class="toggle-area">
            <span style="font-size:0.8rem; color:#888;">NORMAL</span>
            <label class="switch">
                <input type="checkbox" id="diff-toggle" onchange="window.handleDiffChange(this.checked)">
                <span class="slider"></span>
            </label>
            <span style="font-size:0.8rem; color:var(--danger-red);">HELL</span>
        </div>

        <div id="subject-selector">
            <!-- 항공법규 카드 -->
            <div class="mode-card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <span style="font-weight:900; font-size:1.1rem;">✈️ 항공법규 (Law)</span>
                    <button class="btn-stats" onclick="window.loadStats('LAW')">DATA CENTER</button>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <button class="btn-primary" onclick="window.prepSession('LAW', 'MULTI')">객관식</button>
                    <button class="btn-primary" onclick="window.prepSession('LAW', 'SUBJ')">주관식</button>
                </div>
            </div>
            <!-- 항공관제 카드 -->
            <div class="mode-card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <span style="font-weight:900; font-size:1.1rem;">📡 항공관제 (Control)</span>
                    <button class="btn-stats" onclick="window.loadStats('CTRL')">DATA CENTER</button>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <button class="btn-primary" onclick="window.prepSession('CTRL', 'MULTI')">객관식</button>
                    <button class="btn-primary" onclick="window.prepSession('CTRL', 'SUBJ')">주관식</button>
                </div>
            </div>
        </div>

        <!-- 모드 선택 (Profile) -->
        <div id="profile-selector" class="hidden">
            <div class="mode-card" style="text-align:center;">
                <p style="color:var(--radar-green); font-weight:900; font-size:0.8rem; margin-bottom:5px;">MISSION PROFILE</p>
                <h2 id="profile-title" style="margin-top:0;"></h2>
                <button class="btn-outline" onclick="window.startMission('OMAKASE')" style="margin-bottom:10px; color:white; border-color:#444;">🍱 100문항 오마카세 (신규 위주)</button>
                <button class="btn-outline" onclick="window.startMission('WRONG')" style="color:white; border-color:#444;">📝 100문항 오답노트 (취약 위주)</button>
                <button onclick="location.reload()" style="margin-top:20px; background:none; color:#555; font-size:0.8rem;">CANCEL</button>
            </div>
        </div>
    </div>

    <!-- 2. 퀴즈 세션 -->
    <div id="page-quiz" class="hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; color:var(--radar-green); font-weight:bold; font-size:0.8rem;">
            <span id="quiz-pos">POS: 0 / 100</span>
            <span id="quiz-diff-label">MODE: NORMAL</span>
        </div>
        <div class="progress-container"><div class="progress-bar" id="quiz-pb"></div></div>
        <div id="question-text"></div>
        <div id="quiz-options"></div>
        <button onclick="window.exitSession()" style="margin-top:60px; background:none; color:#444; border:1px solid #222; font-size:0.8rem;">ABORT MISSION</button>
    </div>

    <!-- 3. 데이터 센터 -->
    <div id="page-stats" class="hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="color:var(--radar-green); margin:0;">DATA CENTER</h2>
            <button class="btn-stats" onclick="location.reload()">EXIT</button>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th onclick="window.sortStats('type')">유형</th>
                        <th onclick="window.sortStats('problem')" style="text-align:left;">문제 분석</th>
                        <th onclick="window.sortStats('count')">기출</th>
                        <th onclick="window.sortStats('rate')">오답률</th>
                    </tr>
                </thead>
                <tbody id="stats-body"></tbody>
            </table>
        </div>
    </div>

    <!-- 4. 로딩 -->
    <div id="page-loading" class="hidden">
        <div style="text-align:center; margin-top:150px;">
            <div style="width:40px; height:40px; border:3px solid var(--radar-dim); border-top-color:var(--radar-green); border-radius:50%; animation: spin 1s linear infinite; margin:0 auto 20px;"></div>
            <p id="loading-text" style="color:var(--radar-green); font-weight:bold; letter-spacing:2px;">LINKING TO TOWER...</p>
        </div>
    </div>
</div>

<!-- 피드백 레이어 -->
<div id="feedback-layer">
    <div id="fb-status" style="text-align:center; padding:15px; border-radius:12px; font-weight:900; margin-bottom:20px;"></div>
    <div style="background:#1a1a1a; padding:20px; border-radius:15px; margin-bottom:20px; border:1px solid #333;">
        <div id="fb-answer" style="color:var(--radar-green); font-weight:bold; margin-bottom:10px; border-bottom:1px solid #2a2a2a; padding-bottom:10px;"></div>
        <div id="fb-explan" style="font-size:0.95rem; color:#aaa; line-height:1.6; white-space:pre-wrap;"></div>
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px;">
        <button id="btn-goaround" style="background:none; border:1px solid var(--radar-green); color:var(--radar-green); font-size:0.85rem;">✈️ Go Around</button>
        <button id="btn-deviation" style="background:none; border:1px solid orange; color:orange; font-size:0.85rem;">⚠️ Deviation</button>
    </div>
    <button id="btn-next" style="background:var(--radar-green); color:black; font-weight:900; font-size:1.1rem;">NEXT CONTACT</button>
</div>

<script>
/** * ATC Engine v2.0 - 9-Column Schema Scratch Version 
 * A(0):Date, B(1):Type, C(2):Category, D(3):Problem, E(4):Answer, F(5):Explan, G(6):Count, H(7):Wrong, I(8):Rate
 */

window.state = {
    difficulty: 'EZ', subject: '', type: '', 
    questions: [], currentIndex: 0,
    sessionResults: [], reportedIds: [], excludedIds: [],
    statsData: [], isProcessing: false
};

const CONFIG = {
    EZ: {
        URL: "https://script.google.com/macros/s/AKfycbxQdRw8bAcYSfZWNV6r808lVpwED88FaZj6bviR1pMZ2DimYDKHYu13jeT7oXaT04ErGw/exec",
        GIDs: { LAW_MULTI: 0, LAW_SUBJ: 1036407965, CTRL_MULTI: 438358690, CTRL_SUBJ: 1403157384, LAW_STATS: 1846282036, CTRL_STATS: 1880986641 }
    },
    INFERNO: {
        URL: "https://script.google.com/macros/s/AKfycbzjGLlSq7-xpO0dZxCWExg06paUtwsP1kcPBXTCXhDzm8wkU0CJCyCADB0gJKsU76z7RA/exec",
        GIDs: { LAW_MULTI: 0, LAW_SUBJ: 1805786990, CTRL_MULTI: 2049752243, CTRL_SUBJ: 570358631, LAW_STATS: 668283973, CTRL_STATS: 1546545747 }
    }
};

// UI 제어
window.showPage = (id) => {
    ['page-home', 'page-quiz', 'page-stats', 'page-loading'].forEach(p => {
        document.getElementById(p).classList.add('hidden');
    });
    document.getElementById(id).classList.remove('hidden');
};

window.handleDiffChange = (isHell) => {
    window.state.difficulty = isHell ? 'INFERNO' : 'EZ';
    const label = document.getElementById('quiz-diff-label');
    label.innerText = isHell ? 'MODE: INFERNO' : 'MODE: NORMAL';
    label.style.color = isHell ? 'var(--danger-red)' : 'var(--radar-green)';
};

window.prepSession = (sub, type) => {
    window.state.subject = sub;
    window.state.type = type;
    document.getElementById('profile-title').innerText = `${sub === 'LAW' ? '항공법규' : '항공관제'} [${type === 'MULTI' ? '객관식' : '주관식'}]`;
    document.getElementById('subject-selector').classList.add('hidden');
    document.getElementById('profile-selector').classList.remove('hidden');
};

// 미션 시작 및 데이터 로드 (9열 스키마 완벽 대응)
window.startMission = async (mode) => {
    window.showPage('page-loading');
    const cfg = CONFIG[window.state.difficulty];
    const targetGid = cfg.GIDs[`${window.state.subject}_${window.state.type}`];

    try {
        const res = await fetch(`${cfg.URL}?gid=${targetGid}`);
        const data = await res.json();
        
        // 9열 스키마에 최적화된 수치 추출 로직
        const getVal = (v) => Number(String(v || '0').replace(/[^0-9.-]+/g, "")) || 0;

        if (mode === 'OMAKASE') {
            data.sort((a,b) => getVal(a.count) - getVal(b.count));
        } else {
            data.sort((a,b) => getVal(b.wrong) - getVal(a.wrong));
        }

        window.state.questions = data.slice(0, 100);
        window.state.currentIndex = 0;
        window.state.sessionResults = [];
        window.state.reportedIds = [];
        window.state.excludedIds = [];
        
        if (window.state.questions.length === 0) {
            alert("No data found in Tower.");
            location.reload();
            return;
        }

        window.renderQuestion();
        window.showPage('page-quiz');
    } catch(e) {
        alert("Link Error: Tower is not responding.");
        location.reload();
    }
};

window.renderQuestion = () => {
    const q = window.state.questions[window.state.currentIndex];
    const total = window.state.questions.length;
    
    document.getElementById('quiz-pos').innerText = `POS: ${window.state.currentIndex + 1} / ${total}`;
    document.getElementById('quiz-pb').style.width = `${((window.state.currentIndex + 1) / total) * 100}%`;
    document.getElementById('question-text').innerText = `[${q.category}] ${q.problem}`;
    
    const optionsArea = document.getElementById('quiz-options');
    optionsArea.innerHTML = '';

    if (window.state.type === 'MULTI') {
        // [SCRATCH LOGIC] 객관식 선택지 파싱 - 9열 스키마 이후 모든 열을 선택지로 간주
        const rawChoices = Object.keys(q)
            .filter(key => key.includes('보기') || key.toLowerCase().includes('choice'))
            .map(key => q[key])
            .filter(val => val !== "");

        rawChoices.forEach((choice, idx) => {
            const btn = document.createElement('button');
            btn.className = 'btn-outline';
            btn.style.marginBottom = '10px';
            btn.style.textAlign = 'left';
            btn.style.color = '#eee';
            btn.innerText = `${idx + 1}. ${choice}`;
            btn.onclick = () => window.processAnswer(idx + 1, choice);
            optionsArea.appendChild(btn);
        });
    } else {
        const input = document.createElement('input');
        input.id = 'subj-input';
        input.placeholder = 'Type your command...';
        input.onkeyup = (e) => e.key === 'Enter' && window.processAnswer(input.value, input.value);
        optionsArea.appendChild(input);
        
        const sendBtn = document.createElement('button');
        sendBtn.className = 'btn-primary';
        sendBtn.innerText = 'SEND COMMAND';
        sendBtn.onclick = () => window.processAnswer(input.value, input.value);
        optionsArea.appendChild(sendBtn);
        setTimeout(() => input.focus(), 300);
    }
};

window.processAnswer = (userVal, userText) => {
    if (window.state.isProcessing) return;
    window.state.isProcessing = true;

    const q = window.state.questions[window.state.currentIndex];
    let isCorrect = false;

    // [9열 스키마 핵심] 백엔드에서 내려준 'answer' 필드와 직접 비교
    const clean = (s) => String(s || '').replace(/\s+/g, '').toLowerCase();
    
    if (window.state.type === 'MULTI') {
        // 객관식은 정답 인덱스(숫자) 또는 정답 텍스트와 비교
        isCorrect = (String(userVal) === String(q.answer)) || (clean(userText) === clean(q.answer));
    } else {
        isCorrect = clean(userVal) === clean(q.answer);
    }

    // 결과 기록
    window.state.sessionResults.push({
        problem: q.problem,
        isCorrect: isCorrect,
        type: window.state.type,
        answer: q.answer,
        explanation: q.explan
    });

    // 피드백 UI
    const fbLayer = document.getElementById('feedback-layer');
    const status = document.getElementById('fb-status');
    status.innerText = isCorrect ? "● CORRECT (CLEARED)" : "● INCORRECT (DEVIATION)";
    status.style.background = isCorrect ? "rgba(0,255,65,0.1)" : "rgba(255,51,51,0.1)";
    status.style.color = isCorrect ? "var(--radar-green)" : "var(--danger-red)";
    status.style.border = `1px solid ${isCorrect ? 'var(--radar-green)' : 'var(--danger-red)'}`;
    
    document.getElementById('fb-answer').innerText = `IDENTIFIED: ${q.answer}`;
    document.getElementById('fb-explan').innerText = q.explan || "No manual instructions available.";

    // 특수 버튼 바인딩
    document.getElementById('btn-goaround').onclick = () => {
        window.state.excludedIds.push(q.problem); // 문제 텍스트를 식별자로 사용 (백엔드와 통일)
        alert("Marked: Go Around (Excluded from Stats)");
    };
    document.getElementById('btn-deviation').onclick = () => {
        window.state.reportedIds.push(q.problem);
        alert("Marked: Deviation (Reported to Master)");
    };
    
    document.getElementById('btn-next').onclick = () => {
        fbLayer.style.display = 'none';
        window.state.isProcessing = false;
        window.state.currentIndex++;
        if (window.state.currentIndex < window.state.questions.length) {
            window.renderQuestion();
        } else {
            window.exitSession();
        }
    };

    fbLayer.style.display = 'block';
};

window.exitSession = async () => {
    if (window.state.sessionResults.length === 0) { location.reload(); return; }
    if (!confirm("Complete mission and sync data with Tower?")) return;

    window.showPage('page-loading');
    document.getElementById('loading-text').innerText = "SYNCING WITH TOWER...";

    const cfg = CONFIG[window.state.difficulty];
    try {
        await fetch(cfg.URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({
                results: window.state.sessionResults,
                reportedIds: window.state.reportedIds,
                excludedIds: window.state.excludedIds,
                statsGid: cfg.GIDs[`${window.state.subject}_STATS`],
                masterGid: cfg.GIDs[`${window.state.subject}_${window.state.type}`]
            })
        });
        alert("Mission Accomplished. Logs updated.");
        location.reload();
    } catch(e) {
        alert("Sync Failed. Please check connection.");
        window.showPage('page-quiz');
    }
};

// 데이터 센터 (9열 스키마 최적화 로드)
window.loadStats = async (subject) => {
    window.showPage('page-loading');
    const cfg = CONFIG[window.state.difficulty];
    try {
        const res = await fetch(`${cfg.URL}?gid=${cfg.GIDs[subject+'_STATS']}`);
        const data = await res.json();
        
        const getNum = (v) => Number(String(v || '0').replace(/[^0-9.-]+/g, "")) || 0;

        window.state.statsData = data
            .filter(d => getNum(d.count) > 0) // 기출 이력 있는 것만
            .map(d => ({
                type: d.type,
                problem: d.problem,
                answer: d.answer,
                explan: d.explan,
                count: getNum(d.count),
                wrong: getNum(d.wrong),
                rate: parseFloat(String(d.rate || '0').replace('%','')) || 0
            }));
        
        window.renderStats();
        window.showPage('page-stats');
    } catch(e) {
        alert("Data Center Link Failure.");
        location.reload();
    }
};

window.renderStats = () => {
    const tbody = document.getElementById('stats-body');
    if (window.state.statsData.length === 0) {
        tbody.innerHTML = `<tr><td colspan="4" style="padding:50px; color:#444;">No mission logs found.</td></tr>`;
        return;
    }

    tbody.innerHTML = window.state.statsData.map((d, i) => `
        <tr>
            <td style="color:#666; font-size:0.7rem;">${d.type}</td>
            <td style="text-align:left;">
                <div style="font-weight:bold; margin-bottom:5px;">${d.problem}</div>
                <span style="color:var(--radar-green); font-size:0.7rem; cursor:pointer; text-decoration:underline;" 
                      onclick="const e=document.getElementById('st-exp-${i}'); e.classList.toggle('hidden')">[VIEW MANUAL]</span>
                <div id="st-exp-${i}" class="hidden" style="margin-top:10px; padding:10px; background:#1a1a1a; border-left:2px solid var(--radar-green); font-size:0.8rem; color:#888;">
                    <b style="color:var(--radar-green);">정답: ${d.answer}</b><br><br>${d.explan}
                </div>
            </td>
            <td>${d.count}</td>
            <td>
                <span style="font-weight:bold; color:${d.rate > 50 ? 'var(--danger-red)' : '#eee'}">${d.rate.toFixed(1)}%</span>
                <div class="rate-bar-bg"><div class="rate-bar-fill" style="width:${d.rate}%"></div></div>
            </td>
        </tr>
    `).join('');
};

window.sortStats = (key) => {
    const asc = window.state.lastSortKey === key ? !window.state.lastSortAsc : false;
    window.state.statsData.sort((a,b) => {
        if (typeof a[key] === 'string') return asc ? a[key].localeCompare(b[key]) : b[key].localeCompare(a[key]);
        return asc ? a[key] - b[key] : b[key] - a[key];
    });
    window.state.lastSortKey = key;
    window.state.lastSortAsc = asc;
    window.renderStats();
};
</script>
</body>
</html>
