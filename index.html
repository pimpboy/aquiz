<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATC Training Center</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --radar-green: #00ff41;
            --radar-dim: #004411;
            --danger-red: #ff3333;
            --text-white: #e0e0e0;
            --primary-blue: #4f46e5;
            --card-bg: #1a1a1a;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'Pretendard', sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 600px; }
        
        /* 메인 메뉴 디자인 */
        .mode-card {
            background: var(--card-bg); border-radius: 20px;
            padding: 20px; margin-bottom: 20px; border: 1px solid #333;
        }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        button { border-radius: 12px; cursor: pointer; transition: 0.2s; font-weight: bold; border: 1px solid transparent; padding: 15px; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-start { background: var(--primary-blue); color: white; flex: 2; min-width: 140px; }
        .btn-stats { background: #4b5563; color: white; flex: 1; font-size: 0.85rem; min-width: 100px; }

        /* 토글 스위치 */
        .toggle-container { background: #eee; border-radius: 50px; padding: 10px 30px; display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 30px; color: #333; font-weight: bold; }
        .switch { position: relative; display: inline-block; width: 60px; height: 34px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--danger-red); }
        input:checked + .slider:before { transform: translateX(26px); }

        /* 통계 테이블 */
        .stats-wrap { width: 100%; overflow-x: auto; margin-top: 10px; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; background: #111; min-width: 500px; }
        th { background: #222; padding: 12px; cursor: pointer; border-bottom: 2px solid #333; color: var(--radar-green); position: sticky; top: 0; }
        td { padding: 10px; border-bottom: 1px solid #222; text-align: center; vertical-align: middle; }
        .text-left { text-align: left; }
        
        .rate-bg { width: 100%; background: #333; height: 6px; border-radius: 3px; margin-top: 5px; }
        .rate-bar { height: 100%; background: var(--danger-red); }
        .exp-content { display: none; background: #222; padding: 10px; margin-top: 8px; border-radius: 8px; color: #bbb; line-height: 1.4; }
        .exp-btn { color: var(--radar-green); cursor: pointer; font-size: 0.75rem; text-decoration: underline; }

        .hidden { display: none !important; }
        
        /* 퀴즈 UI 보강 */
        #feedback-layer {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #111; border-top: 2px solid var(--radar-green);
            padding: 20px; display: none; z-index: 1000;
            max-height: 85vh; overflow-y: auto; border-radius: 25px 25px 0 0;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="main-page">
        <h1 style="text-align: center; margin-bottom: 10px;">항공 훈련 관제소</h1>
        <p style="text-align: center; color: #888; font-size: 0.9rem; margin-bottom: 25px;">포커 소좌, 훈련 모드를 선택하십시오.</p>

        <div class="toggle-container">
            <span>NORMAL</span>
            <label class="switch">
                <input type="checkbox" id="diff-toggle" onchange="state.difficulty = this.checked ? 'INFERNO' : 'EZ'">
                <span class="slider"></span>
            </label>
            <span style="color:var(--danger-red)">HELL</span>
        </div>

        <div id="subject-cards">
            <div class="mode-card">
                <div style="font-weight: bold;">✈️ 항공법규 (Law)</div>
                <div class="btn-group">
                    <button class="btn-start" onclick="prepType('LAW')">🚀 훈련 시작</button>
                    <button class="btn-stats" onclick="loadStats('LAW')">📊 데이터 센터</button>
                </div>
            </div>

            <div class="mode-card">
                <div style="font-weight: bold;">📡 항공관제 (Control)</div>
                <div class="btn-group">
                    <button class="btn-start" onclick="prepType('CTRL')">🚀 훈련 시작</button>
                    <button class="btn-stats" onclick="loadStats('CTRL')">📊 데이터 센터</button>
                </div>
            </div>
        </div>

        <div id="type-selection" class="hidden">
            <p style="text-align:center; color:var(--radar-green); margin-bottom: 20px;">시험 유형 선택</p>
            <button class="btn-start" onclick="prepMission('MULTI')" style="margin-bottom:10px;">Multiple Choice (객관식)</button>
            <button class="btn-start" onclick="prepMission('SUBJ')">Subjective (주관식)</button>
            <button onclick="location.reload()" style="background:none; border:1px solid #444; color:#666; margin-top:20px; width:100%;">CANCEL</button>
        </div>

        <div id="mode-selection" class="hidden">
            <p style="text-align:center; color:orange; margin-bottom: 20px;">MISSION PROFILE</p>
            <button class="btn-start" onclick="loadQuiz('OMAKASE')" style="background:#444; margin-bottom:10px;">🍱 100문항 오마카세</button>
            <button class="btn-start" onclick="loadQuiz('WRONG')" style="background:#444;">📝 100문항 오답노트</button>
            <button onclick="location.reload()" style="background:none; border:1px solid #444; color:#666; margin-top:20px; width:100%;">BACK TO BASE</button>
        </div>
    </div>

    <div id="stats-page" class="hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 id="stats-title" style="margin:0; color:var(--radar-green);">DATA CENTER</h2>
            <button onclick="location.reload()" style="padding:8px 15px; background:#333; color:white; border-radius:8px;">EXIT</button>
        </div>
        <div class="stats-wrap">
            <table>
                <thead>
                    <tr>
                        <th onclick="sortStats('type')">유형</th>
                        <th onclick="sortStats('problem')">문제 분석</th>
                        <th onclick="sortStats('count')">기출</th>
                        <th onclick="sortStats('wrong')">오답</th>
                        <th onclick="sortStats('rate')">오답률</th>
                    </tr>
                </thead>
                <tbody id="stats-body"></tbody>
            </table>
        </div>
    </div>

    <div id="loading-page" class="hidden">
        <div style="text-align: center; margin-top: 150px;">
            <h2 id="loading-msg" style="color: var(--radar-green);">LINKING...</h2>
        </div>
    </div>

    <div id="quiz-page" class="hidden">
        <div style="text-align:center; color:var(--radar-green); font-size:0.8rem;" id="pos-display"></div>
        <div id="question-box" style="margin:30px 0; font-size:1.1rem; line-height:1.5;"></div>
        <div id="answer-area"></div>
    </div>
</div>

<div id="feedback-layer">
    <div id="result-status" style="text-align:center; padding:15px; font-weight:bold; border-radius:10px; margin-bottom:10px;"></div>
    <div id="correct-ans-show" style="color:var(--radar-green); margin-bottom:10px;"></div>
    <div id="explanation-box" style="background:#222; padding:15px; border-radius:10px; font-size:0.9rem; line-height:1.4; color:#ccc;"></div>
    <button onclick="nextQuestion()" style="background:var(--radar-green); color:black; width:100%; margin-top:20px; font-size:1.2rem;">NEXT CONTACT</button>
</div>

<script>
/**
 * [CONFIG] 
 */
const CONFIG = {
    EZ: {
        URL: "https://script.google.com/macros/s/AKfycbxQdRw8bAcYSfZWNV6r808lVpwED88FaZj6bviR1pMZ2DimYDKHYu13jeT7oXaT04ErGw/exec",
        GIDs: { LAW_MULTI: 0, LAW_SUBJ: 1036407965, CTRL_MULTI: 438358690, CTRL_SUBJ: 1403157384, LAW_STATS: 1846282036, CTRL_STATS: 1880986641 }
    },
    INFERNO: {
        URL: "https://script.google.com/macros/s/AKfycbzjGLlSq7-xpO0dZxCWExg06paUtwsP1kcPBXTCXhDzm8wkU0CJCyCADB0gJKsU76z7RA/exec",
        GIDs: { LAW_MULTI: 0, LAW_SUBJ: 1805786990, CTRL_MULTI: 2049752243, CTRL_SUBJ: 570358631, LAW_STATS: 668283973, CTRL_STATS: 1546545747 }
    }
};

let state = { difficulty: 'EZ', subject: '', type: '', questions: [], currentIndex: 0, sessionResults: [] };

function showPage(id) {
    ['main-page', 'stats-page', 'loading-page', 'quiz-page'].forEach(p => document.getElementById(p)?.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
}

// 훈련 시작 흐름 제어
function prepType(sub) {
    state.subject = sub;
    document.getElementById('subject-cards').classList.add('hidden');
    document.getElementById('type-selection').classList.remove('hidden');
}

function prepMission(type) {
    state.type = type;
    document.getElementById('type-selection').classList.add('hidden');
    document.getElementById('mode-selection').classList.remove('hidden');
}

// 퀴즈 로드 로직
async function loadQuiz(mode) {
    showPage('loading-page');
    const cfg = CONFIG[state.difficulty];
    const targetGid = cfg.GIDs[`${state.subject}_${state.type}`];

    try {
        const res = await fetch(`${cfg.URL}?gid=${targetGid}`);
        let data = await res.json();

        if (mode === 'OMAKASE') {
            data.sort((a, b) => (a['기출_Total'] || 0) - (b['기출_Total'] || 0));
        } else {
            data.sort((a, b) => (b['오답_Total'] || 0) - (a['오답_Total'] || 0));
        }

        state.questions = data.slice(0, 100);
        state.currentIndex = 0;
        renderQuestion();
        showPage('quiz-page');
    } catch (e) {
        alert("데이터 로드 실패!");
        location.reload();
    }
}

function renderQuestion() {
    const q = state.questions[state.currentIndex];
    document.getElementById('pos-display').innerText = `Progress: ${state.currentIndex + 1} / 100`;
    document.getElementById('question-box').innerText = q.문제;
    
    const area = document.getElementById('answer-area');
    area.innerHTML = '';

    if (state.type === 'MULTI') {
        for(let i=1; i<=4; i++) {
            const btn = document.createElement('button');
            btn.className = 'btn-start';
            btn.style.background = 'none';
            btn.style.border = '1px solid #00ff41';
            btn.style.width = '100%';
            btn.innerText = q[`보기${i}`];
            btn.onclick = () => checkAnswer(i);
            area.appendChild(btn);
        }
    } else {
        // 주관식 로직 생략(기존 동일)
    }
}

function checkAnswer(userAns) {
    // 버튼 비활성화 및 피드백 레이어 노출 로직 (기존 동일)
    const q = state.questions[state.currentIndex];
    const isCorrect = parseInt(userAns) === parseInt(q.정답번호);
    
    const status = document.getElementById('result-status');
    status.innerText = isCorrect ? "CORRECT" : "INCORRECT";
    status.style.background = isCorrect ? "rgba(0,255,65,0.2)" : "rgba(255,51,51,0.2)";
    document.getElementById('correct-ans-show').innerText = "정답: " + q[`보기${q.정답번호}`];
    document.getElementById('explanation-box').innerText = q.해설 || "해설 없음";
    document.getElementById('feedback-layer').style.display = 'block';
}

function nextQuestion() {
    document.getElementById('feedback-layer').style.display = 'none';
    state.currentIndex++;
    if (state.currentIndex < state.questions.length) renderQuestion();
    else alert("훈련 종료!");
}

// 통계 로직 (이전 답변과 동일)
async function loadStats(subject) {
    showPage('loading-page');
    // ... (이후 통계 fetch 및 렌더링 로직)
}
</script>
</body>
</html>
