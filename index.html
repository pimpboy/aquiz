<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATC Training Center</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --radar-green: #00ff41;
            --radar-dim: #004411;
            --danger-red: #ff3333;
            --text-white: #e0e0e0;
            --primary-blue: #4f46e5;
            --card-bg: #1a1a1a;
        }
        body {
            background-color: var(--bg-color); color: var(--text-white);
            font-family: 'Pretendard', sans-serif; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 600px; }
        .mode-card { background: var(--card-bg); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid #333; }
        button { border-radius: 12px; cursor: pointer; transition: 0.2s; font-weight: bold; border: 1px solid transparent; padding: 15px; width: 100%; }
        button:disabled { border-color: #333 !important; color: #555 !important; cursor: not-allowed; opacity: 0.6; }
        .btn-start { background: var(--primary-blue); color: white; }
        .btn-stats { background: #4b5563; color: white; font-size: 0.85rem; width: auto; padding: 10px 20px; }
        .toggle-container { background: #eee; border-radius: 50px; padding: 10px 30px; display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 30px; color: #333; font-weight: bold; }
        .switch { position: relative; display: inline-block; width: 60px; height: 34px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--danger-red); }
        input:checked + .slider:before { transform: translateX(26px); }
        .progress-container { width: 100%; background: #222; height: 8px; border-radius: 4px; margin: 20px 0; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--radar-green); width: 0%; transition: 0.3s; }
        .stats-wrap { width: 100%; overflow-x: auto; margin-top: 10px; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; background: #111; min-width: 550px; }
        th { background: #222; padding: 12px; cursor: pointer; border-bottom: 2px solid #333; color: var(--radar-green); position: sticky; top: 0; z-index: 10; }
        td { padding: 15px 12px; border-bottom: 1px solid #222; text-align: center; }
        .rate-bg { width: 100%; background: #333; height: 6px; border-radius: 3px; margin-top: 8px; }
        .rate-bar { height: 100%; background: var(--danger-red); }
        .exp-content { display: none; background: #222; padding: 12px; margin-top: 10px; border-radius: 8px; color: #bbb; text-align: left; line-height: 1.5; border-left: 3px solid var(--radar-green); }
        #feedback-layer { position: fixed; bottom: 0; left: 0; right: 0; background: #111; border-top: 2px solid var(--radar-green); padding: 20px; display: none; z-index: 1000; max-height: 85vh; overflow-y: auto; border-radius: 25px 25px 0 0; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div id="main-page">
        <h1 style="text-align: center; margin-bottom: 5px;">항공 훈련 관제소</h1>
        <p style="text-align: center; color: #888; font-size: 0.9rem; margin-bottom: 25px;">포커 소좌, 훈련 시스템이 준비되었습니다.</p>
        <div class="toggle-container">
            <span>NORMAL</span>
            <label class="switch"><input type="checkbox" id="diff-toggle" onchange="window.setDifficulty(this.checked)"><span class="slider"></span></label>
            <span style="color:var(--danger-red)">HELL</span>
        </div>
        <div id="subject-cards">
            <div class="mode-card">
                <div style="font-weight: bold; display: flex; justify-content: space-between; align-items: center; margin-bottom:15px;">
                    <span>✈️ 항공법규 (Law)</span>
                    <button class="btn-stats" onclick="window.loadStats('LAW')">📊 DATA CENTER</button>
                </div>
                <div style="display:flex; gap:10px;">
                    <button class="btn-start" onclick="window.prepMission('LAW', 'MULTI')">🚀 훈련 시작 (객)</button>
                    <button class="btn-start" onclick="window.prepMission('LAW', 'SUBJ')">🚀 훈련 시작 (주)</button>
                </div>
            </div>
            <div class="mode-card">
                <div style="font-weight: bold; display: flex; justify-content: space-between; align-items: center; margin-bottom:15px;">
                    <span>📡 항공관제 (Control)</span>
                    <button class="btn-stats" onclick="window.loadStats('CTRL')">📊 DATA CENTER</button>
                </div>
                <div style="display:flex; gap:10px;">
                    <button class="btn-start" onclick="window.prepMission('CTRL', 'MULTI')">🚀 훈련 시작 (객)</button>
                    <button class="btn-start" onclick="window.prepMission('CTRL', 'SUBJ')">🚀 훈련 시작 (주)</button>
                </div>
            </div>
        </div>
        <div id="mode-selection" class="hidden">
            <p style="text-align:center; color:orange; font-weight:bold;">MISSION PROFILE</p>
            <button class="btn-start" onclick="window.loadQuiz('OMAKASE')" style="background:#333; margin-bottom:10px;">🍱 100문항 오마카세 (신규 위주)</button>
            <button class="btn-start" onclick="window.loadQuiz('WRONG')" style="background:#333;">📝 100문항 오답노트 (취약 위주)</button>
            <button onclick="location.reload()" style="background:none; color:#666; margin-top:20px; border:1px solid #333;">BACK TO BASE</button>
        </div>
    </div>
    <div id="stats-page" class="hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="margin:0; color:var(--radar-green);">DATA CENTER</h2>
            <button onclick="location.reload()" style="padding:10px 25px; background:#333; color:white; border-radius:8px;">EXIT</button>
        </div>
        <div class="stats-wrap">
            <table><thead><tr><th onclick="window.sortStats('type')">유형</th><th onclick="window.sortStats('problem')">문제 분석</th><th onclick="window.sortStats('count')">기출</th><th onclick="window.sortStats('wrong')">오답</th><th onclick="window.sortStats('rate')">오답률</th></tr></thead><tbody id="stats-body"></tbody></table>
        </div>
    </div>
    <div id="quiz-page" class="hidden">
        <div style="text-align:center; color:var(--radar-green); font-size:0.8rem;" id="pos-display"></div>
        <div class="progress-container"><div class="progress-bar" id="pb"></div></div>
        <div id="question-box" style="margin:30px 0; font-size:1.15rem; line-height:1.6; min-height:80px;"></div>
        <div id="answer-area"></div>
        <button onclick="window.stopSession()" style="border:1px solid #444; color:#444; margin-top:40px; background: none;">ABORT MISSION</button>
    </div>
    <div id="loading-page" class="hidden">
        <div style="text-align: center; margin-top: 150px;"><h2 id="loading-msg" style="color: var(--radar-green);">LINKING TO TOWER...</h2></div>
    </div>
</div>

<div id="feedback-layer">
    <div id="result-status" style="text-align:center; padding:15px; font-weight:bold; border-radius:10px; margin-bottom:15px;"></div>
    <div style="background:#222; padding:15px; border-radius:12px; margin-bottom:15px;">
        <div id="correct-ans-show" style="color:var(--radar-green); font-weight:bold; margin-bottom:10px;"></div>
        <div id="explanation-box" style="font-size:0.95rem; line-height:1.5; color:#ccc; white-space:pre-wrap;"></div>
    </div>
    <div style="display:flex; gap:10px; margin-bottom:10px;">
        <button id="go-around-btn" style="flex:1; border:1px solid var(--radar-green); color:var(--radar-green); background:none;">✈️ Go Around</button>
        <button id="deviation-btn" style="flex:1; border:1px solid orange; color:orange; background:none;">⚠️ Deviation</button>
    </div>
    <button id="next-btn" style="background:var(--radar-green); color:black; font-size:1.2rem; border:none; margin-top:10px;">NEXT CONTACT</button>
</div>

<script>
/** [CRITICAL] 변수 선언 전역 강제화 (state is not defined 방어) */
window.state = {
    difficulty: 'EZ', subject: '', type: '', questions: [], currentIndex: 0,
    sessionResults: [], reportedIds: [], excludedIds: [], statsData: [],
    isProcessing: false
};

const CONFIG = {
    EZ: {
        URL: "https://script.google.com/macros/s/AKfycbxQdRw8bAcYSfZWNV6r808lVpwED88FaZj6bviR1pMZ2DimYDKHYu13jeT7oXaT04ErGw/exec",
        GIDs: { LAW_MULTI: 0, LAW_SUBJ: 1036407965, CTRL_MULTI: 438358690, CTRL_SUBJ: 1403157384, LAW_STATS: 1846282036, CTRL_STATS: 1880986641 }
    },
    INFERNO: {
        URL: "https://script.google.com/macros/s/AKfycbzjGLlSq7-xpO0dZxCWExg06paUtwsP1kcPBXTCXhDzm8wkU0CJCyCADB0gJKsU76z7RA/exec",
        GIDs: { LAW_MULTI: 0, LAW_SUBJ: 1805786990, CTRL_MULTI: 2049752243, CTRL_SUBJ: 570358631, LAW_STATS: 668283973, CTRL_STATS: 1546545747 }
    }
};

/** [핵심] 모든 함수를 window 객체에 할당하여 호출 안정성 보장 */
window.showPage = function(id) {
    ['main-page', 'stats-page', 'loading-page', 'quiz-page'].forEach(p => {
        const el = document.getElementById(p);
        if(el) el.classList.add('hidden');
    });
    document.getElementById(id).classList.remove('hidden');
};

window.setDifficulty = function(isHell) {
    window.state.difficulty = isHell ? 'INFERNO' : 'EZ';
};

window.prepMission = function(sub, type) {
    window.state.subject = sub;
    window.state.type = type;
    document.getElementById('subject-cards').classList.add('hidden');
    document.getElementById('mode-selection').classList.remove('hidden');
};

window.loadQuiz = async function(mode) {
    window.showPage('loading-page');
    const cfg = CONFIG[window.state.difficulty];
    const targetGid = cfg.GIDs[`${window.state.subject}_${window.state.type}`];
    try {
        const res = await fetch(`${cfg.URL}?gid=${targetGid}`);
        if (!res.ok) throw new Error("Tower Link Failure");
        let data = await res.json();
        if (mode === 'OMAKASE') data.sort((a,b) => (Number(a['누적 기출 횟수'])||0)-(Number(b['누적 기출 횟수'])||0));
        else data.sort((a,b) => (Number(b['누적 오답 횟수'])||0)-(Number(a['누적 오답 횟수'])||0));
        window.state.questions = data.slice(0, 100);
        window.state.currentIndex = 0;
        window.state.sessionResults = [];
        window.state.isProcessing = false;
        window.renderQuestion();
        window.showPage('quiz-page');
    } catch(e) { alert("통신 오류! 설정 확인 바람."); location.reload(); }
};

window.renderQuestion = function() {
    const q = window.state.questions[window.state.currentIndex];
    document.getElementById('pos-display').innerText = `Position: ${window.state.currentIndex + 1} / 100`;
    document.getElementById('pb').style.width = `${window.state.currentIndex + 1}%`;
    document.getElementById('question-box').innerText = `[${q.대분류||'ATC'}] ${q.문제}`;
    const area = document.getElementById('answer-area');
    area.innerHTML = '';

    if (window.state.type === 'MULTI') {
        for(let i=1; i<=4; i++) {
            const btn = document.createElement('button');
            btn.style = "margin-bottom:10px; border:1px solid #333; text-align:left; background:none; color:#eee; padding-left:20px;";
            btn.innerText = `${i}. ${q['보기'+i]}`;
            btn.onclick = () => window.checkAnswer(i);
            area.appendChild(btn);
        }
    } else {
        const input = document.createElement('input');
        input.id = "subj-input";
        input.placeholder = "명령어를 입력하십시오...";
        input.style = "width:100%; padding:15px; background:#1a1a1a; border:1px solid var(--radar-green); color:white; border-radius:12px; box-sizing:border-box; margin-bottom:15px;";
        input.onkeyup = (e) => e.key === 'Enter' && window.checkAnswer(input.value);
        area.appendChild(input);
        const b = document.createElement('button');
        b.innerText = "SEND COMMAND"; b.style = "background:var(--primary-blue); color:white;";
        b.onclick = () => window.checkAnswer(input.value);
        area.appendChild(b);
        setTimeout(() => { if(document.getElementById('subj-input')) document.getElementById('subj-input').focus(); }, 200);
    }
};

window.checkAnswer = function(userAns) {
    if (window.state.isProcessing) return;
    window.state.isProcessing = true;
    const q = window.state.questions[window.state.currentIndex];
    const realAnsText = (window.state.type === 'MULTI') ? q['보기'+q.정답번호] : q.정답;
    let isCorrect = false;
    
    if (window.state.type === 'MULTI') isCorrect = parseInt(userAns) === parseInt(q.정답번호);
    else {
        const clean = (s) => String(s || '').replace(/\s+/g, '').toLowerCase();
        isCorrect = clean(userAns) === clean(q.정답);
    }

    window.state.sessionResults.push({ id: q.ID, isCorrect: isCorrect, userAns: userAns });
    const status = document.getElementById('result-status');
    status.innerText = isCorrect ? "● CORRECT (CLEARED)" : "● INCORRECT (DEVIATION)";
    status.style.background = isCorrect ? "rgba(0,255,65,0.2)" : "rgba(255,51,51,0.2)";
    status.style.color = isCorrect ? "var(--radar-green)" : "var(--danger-red)";
    document.getElementById('correct-ans-show').innerText = "IDENTIFIED AS: " + (realAnsText || "데이터 없음");
    document.getElementById('explanation-box').innerText = q.해설 || "NO MANUAL.";
    document.getElementById('go-around-btn').onclick = () => { if(!window.state.excludedIds.includes(q.ID)) window.state.excludedIds.push(q.ID); alert("Go Around."); };
    document.getElementById('deviation-btn').onclick = () => { if(!window.state.reportedIds.includes(q.ID)) window.state.reportedIds.push(q.ID); alert("Reported."); };
    document.getElementById('next-btn').onclick = () => window.nextQuestion();
    document.getElementById('feedback-layer').style.display = 'block';
};

window.nextQuestion = function() {
    document.getElementById('feedback-layer').style.display = 'none';
    window.state.isProcessing = false;
    window.state.currentIndex++;
    if (window.state.currentIndex < window.state.questions.length) window.renderQuestion();
    else window.stopSession();
};

window.stopSession = async function() {
    if(!confirm("Sync with Tower?")) return;
    window.showPage('loading-page');
    const cfg = CONFIG[window.state.difficulty];
    const results = window.state.sessionResults.map(res => {
        const q = window.state.questions.find(item => item.ID === res.id);
        return q ? { id: res.id, isCorrect: res.isCorrect, type: window.state.type, problem: q.문제, userResponse: res.userAns, correctAnswer: (window.state.type==='MULTI'?q['보기'+q.정답번호]:q.정답) } : null;
    }).filter(r => r);
    try {
        const response = await fetch(cfg.URL, { method: 'POST', body: JSON.stringify({ results, reportedIds: window.state.reportedIds, excludedIds: window.state.excludedIds, masterGid: cfg.GIDs[`${window.state.subject}_${window.state.type}`], statsGid: cfg.GIDs[`${window.state.subject}_STATS`] }) });
        if (!response.ok) throw new Error();
        location.reload();
    } catch(e) { alert("전송 실패. 네트워크 확인 바람."); window.showPage('quiz-page'); }
};

window.loadStats = async function(subject) {
    window.showPage('loading-page');
    const cfg = CONFIG[window.state.difficulty];
    try {
        const res = await fetch(`${cfg.URL}?gid=${cfg.GIDs[subject+'_STATS']}`);
        const data = await res.json();
        window.state.statsData = data.map(row => {
            const c = Number(row['누적 기출 횟수'])||0;
            const w = Number(row['누적 오답 횟수'])||0;
            return { type: row['유형']||'-', problem: row['문제']||'-', answer: row['실제정답']||row['정답']||'-', exp: row['해설']||'-', count: c, wrong: w, rate: c>0?(w/c)*100:0 };
        });
        window.renderStats();
        window.showPage('stats-page');
    } catch(e) { alert("데이터 로드 실패."); location.reload(); }
};

window.renderStats = function() {
    const tbody = document.getElementById('stats-body');
    tbody.innerHTML = window.state.statsData.map((d, i) => `
        <tr><td>${d.type}</td><td style="text-align:left;"><b>${d.problem}</b><br><small style="color:var(--radar-green)">정답: ${d.answer}</small><br>
        <span style="cursor:pointer;text-decoration:underline;font-size:0.75rem;color:#666;" onclick="const e=document.getElementById('st-exp-${i}'); e.style.display=e.style.display==='block'?'none':'block'">[MANUAL]</span>
        <div id="st-exp-${i}" class="exp-content">${d.exp}</div></td><td>${d.count}</td><td>${d.wrong}</td><td>${d.rate.toFixed(0)}%<div class="rate-bg"><div class="rate-bar" style="width:${d.rate}%"></div></div></td></tr>
    `).join('');
};

window.sortStats = function(key) {
    this.asc = !this.asc;
    window.state.statsData.sort((a,b) => this.asc ? (a[key]>b[key]?1:-1) : (b[key]>a[key]?1:-1));
    window.renderStats();
};
</script>
</body>
</html>
