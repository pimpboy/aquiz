    async function prepareTraining(subject) {
        const btns = document.querySelectorAll('.btn');
        btns.forEach(b => b.disabled = true);
        const loaderMsg = document.getElementById('loader-msg');
        loaderMsg.innerText = `[${currentMode.toUpperCase()}] Checklist(객/주/통) 수행 중...`;

        try {
            const target = CONFIG[currentMode][subject];
            
            // 🚀 객관식, 주관식, 그리고 '통계 CSV'까지 3개를 동시에 fetch!
            const [resObj, resSub, resStats] = await Promise.all([
                fetch(target.obj),
                fetch(target.sub),
                fetch(target.stats)
            ]);

            const dataObj = await resObj.text();
            const dataSub = await resSub.text();
            const dataStats = await resStats.text(); // 통계 데이터 로드

            // 세션 스토리지에 3종 세트 저장
            sessionStorage.setItem('quiz_obj', dataObj);
            sessionStorage.setItem('quiz_sub', dataSub);
            sessionStorage.setItem('quiz_stats', dataStats); // 통계 데이터 저장
            
            sessionStorage.setItem('quiz_config', JSON.stringify({
                mode: currentMode,
                subject: subject,
                gasUrl: target.gas
            }));

            loaderMsg.innerText = "✅ 데이터 동기화 완료! Cleared for takeoff";
            setTimeout(() => { location.href = 'quiz.html'; }, 800);

        } catch (e) {
            loaderMsg.innerText = "❌ 로드 실패! 통계 혹은 문제 CSV 주소를 확인하십시오.";
            btns.forEach(b => b.disabled = false);
        }
    }
