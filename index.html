<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ATC ENGINE v3.3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   TOKENS
═══════════════════════════════════════════════ */
:root {
  --bg:          #0a0a0a;
  --bg2:         #0e0e0e;
  --card:        #111;
  --card2:       #161616;
  --border:      #1e1e1e;
  --border2:     #2a2a2a;
  --text:        #d4d4d4;
  --muted:       #444;
  --muted2:      #666;

  --acc:         #00ff41;
  --acc-dim:     rgba(0,255,65,.07);
  --acc-glow:    rgba(0,255,65,.35);
  --acc-border:  rgba(0,255,65,.18);

  --danger:      #ff3333;
  --danger-dim:  rgba(255,51,51,.07);
  --danger-glow: rgba(255,51,51,.35);
  --danger-border: rgba(255,51,51,.18);

  --font-mono: 'Share Tech Mono', monospace;
  --font-hud:  'Orbitron', monospace;

  --transition: 0.3s cubic-bezier(.4,0,.2,1);
}

body.hell {
  --acc:        #ff3333;
  --acc-dim:    rgba(255,51,51,.07);
  --acc-glow:   rgba(255,51,51,.35);
  --acc-border: rgba(255,51,51,.18);
}

/* ═══════════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  min-height: 100vh;
  overflow-x: hidden;
  transition: background var(--transition);
}

/* scanline overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,.03) 2px,
    rgba(0,0,0,.03) 4px
  );
  pointer-events: none;
  z-index: 9000;
}

.page-wrap {
  width: 100%;
  max-width: 640px;
  margin: 0 auto;
  padding: 16px 16px 80px;
}

.hidden { display: none !important; }

/* ═══════════════════════════════════════════════
   ANIMATIONS
═══════════════════════════════════════════════ */
@keyframes fadeIn   { from { opacity:0; transform:translateY(8px) } to { opacity:1; transform:translateY(0) } }
@keyframes slideUp  { from { transform:translateY(100%) } to { transform:translateY(0) } }
@keyframes spin     { to { transform:rotate(360deg) } }
@keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:.4} }
@keyframes scanline { 0%{top:-10%} 100%{top:110%} }
@keyframes glitch   { 0%,100%{clip-path:inset(50% 0 30% 0)} 20%{clip-path:inset(10% 0 60% 0)} 40%{clip-path:inset(80% 0 5% 0)} }

.fade-in { animation: fadeIn .35s ease forwards; }

/* ═══════════════════════════════════════════════
   TYPOGRAPHY UTILS
═══════════════════════════════════════════════ */
.hud        { font-family: var(--font-hud); }
.mono       { font-family: var(--font-mono); }
.label-xs   { font-size:.62rem; letter-spacing:.18em; text-transform:uppercase; color:var(--muted2); }
.label-sm   { font-size:.72rem; letter-spacing:.12em; text-transform:uppercase; color:var(--muted2); }
.acc-text   { color:var(--acc); transition:color var(--transition); }
.glow-text  { color:var(--acc); text-shadow: 0 0 20px var(--acc-glow); transition:color var(--transition), text-shadow var(--transition); }

/* ═══════════════════════════════════════════════
   CARD
═══════════════════════════════════════════════ */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px;
  margin-bottom: 12px;
  transition: border-color var(--transition);
}

.card:hover { border-color: var(--border2); }

.card-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

/* ═══════════════════════════════════════════════
   TAG / BADGE
═══════════════════════════════════════════════ */
.tag {
  font-family: var(--font-mono);
  font-size: .6rem;
  letter-spacing: .12em;
  padding: 3px 9px;
  border-radius: 4px;
  border: 1px solid var(--acc-border);
  background: var(--acc-dim);
  color: var(--acc);
  transition: all var(--transition);
}

/* ═══════════════════════════════════════════════
   BUTTON SYSTEM
═══════════════════════════════════════════════ */
button {
  font-family: var(--font-mono);
  border: none;
  cursor: pointer;
  transition: all .15s;
  -webkit-tap-highlight-color: transparent;
}

button:active { transform: scale(.97); }

.btn {
  display: block;
  width: 100%;
  padding: 14px 18px;
  border-radius: 9px;
  font-size: .88rem;
  letter-spacing: .06em;
  font-weight: bold;
  margin: 5px 0;
}

.btn-primary {
  background: #0f2318;
  color: var(--acc);
  border: 1px solid var(--acc-border);
}
.btn-primary:hover { background: #142d1e; box-shadow: 0 0 12px var(--acc-glow); }

.btn-outline {
  background: transparent;
  color: var(--muted2);
  border: 1px solid var(--border2);
  text-align: left;
}
.btn-outline:hover {
  border-color: var(--acc);
  color: var(--acc);
  background: var(--acc-dim);
}

.btn-ghost {
  background: none;
  color: var(--muted);
  font-size: .76rem;
  padding: 10px;
  width: 100%;
}
.btn-ghost:hover { color: var(--muted2); }

.btn-sm {
  display: inline-block;
  width: auto;
  padding: 5px 12px;
  font-size: .68rem;
  border-radius: 6px;
  margin: 0;
}

.subject-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

/* ═══════════════════════════════════════════════
   DIFFICULTY TOGGLE
═══════════════════════════════════════════════ */
.diff-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  padding: 18px 0 4px;
}

.diff-lbl {
  font-family: var(--font-hud);
  font-size: .65rem;
  letter-spacing: .2em;
  transition: color .3s, text-shadow .3s;
}
.diff-lbl.ez   { color: #00ff41; }
.diff-lbl.hell { color: #ff3333; }
.diff-lbl.dim  { color: var(--muted); text-shadow: none; }

.toggle-track {
  width: 56px; height: 28px;
  background: #111;
  border-radius: 14px;
  border: 1px solid var(--border2);
  position: relative;
  cursor: pointer;
  transition: border-color .3s, background .3s;
  flex-shrink: 0;
}
.toggle-track.hell { background: #150505; border-color: rgba(255,51,51,.3); }
.toggle-track.ez   { border-color: rgba(0,255,65,.3); }

.toggle-thumb {
  position: absolute;
  top: 4px; left: 4px;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: #00ff41;
  box-shadow: 0 0 8px rgba(0,255,65,.6);
  transition: transform .3s cubic-bezier(.4,0,.2,1), background .3s, box-shadow .3s;
}
.toggle-track.hell .toggle-thumb {
  transform: translateX(28px);
  background: #ff3333;
  box-shadow: 0 0 8px rgba(255,51,51,.6);
}

/* ═══════════════════════════════════════════════
   LOGO / LANDING
═══════════════════════════════════════════════ */
.logo-block {
  text-align: center;
  padding: 10px 0 22px;
}

.logo-title {
  font-family: var(--font-hud);
  font-size: 2.2rem;
  font-weight: 900;
  letter-spacing: .22em;
  color: var(--acc);
  text-shadow: 0 0 30px var(--acc-glow), 0 0 60px color-mix(in srgb, var(--acc) 15%, transparent);
  transition: color .4s, text-shadow .4s;
}

.logo-sub {
  font-family: var(--font-mono);
  font-size: .65rem;
  color: var(--muted);
  letter-spacing: .28em;
  margin-top: 5px;
}

.mode-badge {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: .6rem;
  letter-spacing: .14em;
  padding: 4px 12px;
  border-radius: 4px;
  margin-top: 10px;
  border: 1px solid var(--acc-border);
  background: var(--acc-dim);
  color: var(--acc);
  transition: all .3s;
}

/* ═══════════════════════════════════════════════
   MODAL (Mission Profile)
═══════════════════════════════════════════════ */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.85);
  z-index: 500;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(4px);
  animation: fadeIn .2s ease;
}

.modal-box {
  background: var(--card);
  border: 1px solid var(--acc-border);
  border-radius: 14px;
  padding: 28px 24px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 0 40px var(--acc-glow);
  transition: border-color .3s, box-shadow .3s;
}

.modal-title {
  font-family: var(--font-hud);
  font-size: .9rem;
  letter-spacing: .15em;
  color: var(--acc);
  margin-bottom: 6px;
  transition: color .3s;
}

.modal-sub {
  font-size: .72rem;
  color: var(--muted2);
  margin-bottom: 20px;
  letter-spacing: .06em;
}

.profile-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 18px;
}

.profile-item .k { font-size:.6rem; letter-spacing:.12em; color:var(--muted); margin-bottom:3px; }
.profile-item .v { font-size:.82rem; color:var(--text); }

/* ═══════════════════════════════════════════════
   QUIZ PAGE
═══════════════════════════════════════════════ */
.quiz-statusbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: .68rem;
  letter-spacing: .1em;
  color: var(--muted2);
  margin-bottom: 8px;
}

.sync-dot {
  display: flex;
  align-items: center;
  gap: 5px;
  color: var(--acc);
  transition: color .3s;
}
.sync-dot::before {
  content: '';
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--acc);
  animation: pulse 2s infinite;
  transition: background .3s;
}

.progress-track {
  background: #151515;
  height: 3px;
  border-radius: 2px;
  margin-bottom: 26px;
  overflow: visible;
  position: relative;
}

.progress-bar {
  height: 100%;
  background: var(--acc);
  width: 0%;
  border-radius: 2px;
  transition: width .5s cubic-bezier(.4,0,.2,1), background .4s;
  position: relative;
}
.progress-bar::after {
  content: '';
  position: absolute;
  right: -1px; top: -3px;
  width: 3px; height: 9px;
  border-radius: 2px;
  background: var(--acc);
  box-shadow: 0 0 10px var(--acc-glow), 0 0 20px var(--acc-glow);
  transition: background .4s, box-shadow .4s;
}

.q-category {
  font-size: .65rem;
  letter-spacing: .14em;
  color: var(--acc);
  margin-bottom: 10px;
  transition: color .3s;
}

#question-text {
  font-size: 1rem;
  line-height: 1.75;
  color: #e0e0e0;
  margin-bottom: 22px;
  min-height: 64px;
  word-break: keep-all;
}

.quiz-options .btn-outline {
  margin: 5px 0;
  padding: 14px 16px;
  font-size: .88rem;
  line-height: 1.4;
}

input[type="text"] {
  width: 100%;
  padding: 15px 16px;
  background: #0a0a0a;
  border: 1px solid var(--border2);
  color: #fff;
  border-radius: 9px;
  margin-bottom: 10px;
  font-size: .95rem;
  font-family: var(--font-mono);
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
input[type="text"]:focus {
  border-color: var(--acc);
  box-shadow: 0 0 0 2px var(--acc-dim), 0 0 12px var(--acc-glow);
}

/* ═══════════════════════════════════════════════
   FEEDBACK BOTTOM SHEET
═══════════════════════════════════════════════ */
#feedback-layer {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 640px;
  background: #0d0d0d;
  border-top: 1px solid var(--border2);
  border-radius: 18px 18px 0 0;
  padding: 20px 18px 28px;
  z-index: 300;
  display: none;
  box-shadow: 0 -30px 80px rgba(0,0,0,.9);
}

#feedback-layer.show { display: block; animation: slideUp .28s cubic-bezier(.4,0,.2,1); }

#fb-status {
  text-align: center;
  font-family: var(--font-hud);
  font-size: .75rem;
  letter-spacing: .22em;
  padding: 10px 14px;
  border-radius: 7px;
  margin-bottom: 14px;
}

.fb-detail {
  background: #101010;
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 14px 16px;
  margin-bottom: 14px;
  max-height: 180px;
  overflow-y: auto;
}

#fb-answer {
  font-size: .88rem;
  color: var(--acc);
  font-weight: bold;
  margin-bottom: 9px;
  transition: color .3s;
}

#fb-explan {
  font-size: .8rem;
  color: #888;
  line-height: 1.65;
}

#btn-next {
  padding: 16px;
  font-size: .9rem;
  letter-spacing: .1em;
  border-radius: 10px;
  background: var(--acc-dim);
  color: var(--acc);
  border: 1px solid var(--acc-border);
  transition: all .2s;
}
#btn-next:hover { background: #142d1e; box-shadow: 0 0 14px var(--acc-glow); }
#btn-next:active { transform: scale(.97); }

/* ═══════════════════════════════════════════════
   LOADING
═══════════════════════════════════════════════ */
#page-loading {
  text-align: center;
  padding-top: 130px;
}

.spinner {
  width: 36px; height: 36px;
  border: 3px solid #1a1a1a;
  border-top-color: var(--acc);
  border-radius: 50%;
  animation: spin .8s linear infinite;
  margin: 0 auto 20px;
  transition: border-top-color .4s;
}

#loading-text {
  font-family: var(--font-hud);
  font-size: .72rem;
  letter-spacing: .22em;
  color: var(--acc);
  animation: pulse 1.5s infinite;
  transition: color .4s;
}

/* ═══════════════════════════════════════════════
   SYNC OVERLAY
═══════════════════════════════════════════════ */
#sync-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.95);
  z-index: 900;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
}
#sync-overlay.show { display: flex; }

#sync-overlay p {
  font-family: var(--font-hud);
  font-size: .72rem;
  letter-spacing: .25em;
  color: var(--acc);
  animation: pulse 1.2s infinite;
  transition: color .4s;
}

/* ═══════════════════════════════════════════════
   DATA CENTER
═══════════════════════════════════════════════ */
.dc-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}

.dc-title {
  font-family: var(--font-hud);
  font-size: .85rem;
  letter-spacing: .18em;
  color: var(--acc);
  transition: color .3s;
}

.dc-meta { font-size:.65rem; color:var(--muted2); letter-spacing:.08em; margin-top:3px; }

.dc-sort-bar {
  display: flex;
  gap: 6px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}

.sort-btn {
  background: var(--card2);
  border: 1px solid var(--border2);
  color: var(--muted2);
  border-radius: 6px;
  padding: 6px 12px;
  font-size: .65rem;
  letter-spacing: .1em;
  width: auto;
  white-space: nowrap;
}
.sort-btn:hover  { border-color: var(--acc); color: var(--acc); }
.sort-btn.active { border-color: var(--acc); color: var(--acc); background: var(--acc-dim); }

.dc-table {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.dc-row {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 9px;
  overflow: hidden;
  transition: border-color .2s;
}
.dc-row:hover { border-color: var(--border2); }

.dc-row-main {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  cursor: default;
}

.dc-problem {
  font-size: .78rem;
  color: var(--text);
  line-height: 1.45;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.dc-category {
  font-size: .6rem;
  color: var(--muted2);
  letter-spacing: .08em;
  margin-bottom: 4px;
}

.dc-stats-col { flex-shrink: 0; text-align: right; min-width: 90px; }

.dc-numbers {
  font-size: .7rem;
  color: var(--muted2);
  margin-bottom: 5px;
}
.dc-numbers span { color: var(--acc); transition: color .3s; }

.rate-bar-wrap {
  background: #1a1a1a;
  border-radius: 3px;
  height: 4px;
  width: 90px;
  overflow: hidden;
}

.rate-bar-fill {
  height: 100%;
  border-radius: 3px;
  background: var(--acc);
  transition: width .6s cubic-bezier(.4,0,.2,1), background .4s;
  box-shadow: 0 0 6px var(--acc-glow);
}

.rate-bar-fill.danger { background: var(--danger); box-shadow: 0 0 6px var(--danger-glow); }

.dc-view-btn {
  background: none;
  border: none;
  color: var(--muted);
  font-size: .62rem;
  letter-spacing: .1em;
  cursor: pointer;
  padding: 4px 0 0;
  width: auto;
  display: block;
  text-align: right;
  transition: color .2s;
}
.dc-view-btn:hover { color: var(--acc); }
.dc-view-btn:active { transform: none; }

/* accordion */
.dc-accordion {
  display: none;
  border-top: 1px solid var(--border);
  padding: 12px 14px;
  background: var(--bg2);
  animation: fadeIn .2s ease;
}
.dc-accordion.open { display: block; }

.dc-acc-answer {
  font-size: .8rem;
  color: var(--acc);
  font-weight: bold;
  margin-bottom: 6px;
  transition: color .3s;
}

.dc-acc-explan {
  font-size: .76rem;
  color: #777;
  line-height: 1.6;
}

/* ═══════════════════════════════════════════════
   SCROLLBAR
═══════════════════════════════════════════════ */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
</style>
</head>
<body>

<!-- ════════════════════════════════════
     PAGE: HOME
════════════════════════════════════ -->
<div id="page-home">
<div class="page-wrap">

  <!-- Difficulty Toggle -->
  <div class="diff-wrap">
    <span class="diff-lbl ez" id="lbl-ez">NORMAL</span>
    <div class="toggle-track ez" id="diff-toggle" onclick="toggleDifficulty()">
      <div class="toggle-thumb"></div>
    </div>
    <span class="diff-lbl hell dim" id="lbl-hell">HELL</span>
  </div>

  <!-- Logo -->
  <div class="logo-block fade-in">
    <div class="logo-title hud">ATC TOWER</div>
    <div class="logo-sub">TRAINING ENGINE v3.3</div>
    <div class="mode-badge" id="mode-badge">● NORMAL MODE · EZ DATABASE</div>
  </div>

  <!-- LAW Card -->
  <div class="card fade-in">
    <div class="card-row">
      <div>
        <div class="label-xs" style="margin-bottom:4px;">항공법규</div>
        <div class="tag">LAW</div>
      </div>
      <button class="btn btn-sm btn-outline acc-text" onclick="openDataCenter('LAW')" style="border-color:var(--acc-border);">
        ▣ DATA CENTER
      </button>
    </div>
    <div class="subject-grid">
      <button class="btn btn-primary" onclick="prepSession('LAW','MULTI')">객관식</button>
      <button class="btn btn-primary" onclick="prepSession('LAW','SUBJ')">주관식</button>
    </div>
  </div>

  <!-- CTRL Card -->
  <div class="card fade-in">
    <div class="card-row">
      <div>
        <div class="label-xs" style="margin-bottom:4px;">항공관제</div>
        <div class="tag">CTRL</div>
      </div>
      <button class="btn btn-sm btn-outline acc-text" onclick="openDataCenter('CTRL')" style="border-color:var(--acc-border);">
        ▣ DATA CENTER
      </button>
    </div>
    <div class="subject-grid">
      <button class="btn btn-primary" onclick="prepSession('CTRL','MULTI')">객관식</button>
      <button class="btn btn-primary" onclick="prepSession('CTRL','SUBJ')">주관식</button>
    </div>
  </div>

</div>
</div>

<!-- ════════════════════════════════════
     PAGE: QUIZ
════════════════════════════════════ -->
<div id="page-quiz" class="hidden">
<div class="page-wrap">

  <div class="quiz-statusbar">
    <span id="quiz-pos" class="hud">0 / 0</span>
    <span class="sync-dot">AUTO-SYNC</span>
    <span id="quiz-diff-tag" class="label-xs"></span>
  </div>

  <div class="progress-track">
    <div class="progress-bar" id="quiz-pb"></div>
  </div>

  <div class="q-category" id="q-category"></div>
  <div id="question-text"></div>
  <div class="quiz-options" id="quiz-options"></div>

  <button class="btn-ghost" onclick="abortMission()" style="margin-top:22px;">⏏ ABORT &amp; SYNC</button>

</div>
</div>

<!-- ════════════════════════════════════
     PAGE: DATA CENTER
════════════════════════════════════ -->
<div id="page-dc" class="hidden">
<div class="page-wrap">

  <div class="dc-header">
    <div>
      <div class="dc-title" id="dc-title">DATA CENTER</div>
      <div class="dc-meta" id="dc-meta"></div>
    </div>
    <button class="btn btn-sm btn-outline" onclick="showPage('page-home')">✕ EXIT</button>
  </div>

  <div class="dc-sort-bar">
    <button class="sort-btn active" id="sort-rate"  onclick="sortDC('rate')">오답률 ↓</button>
    <button class="sort-btn"        id="sort-wrong" onclick="sortDC('wrong')">오답수 ↓</button>
    <button class="sort-btn"        id="sort-count" onclick="sortDC('count')">기출수 ↑</button>
  </div>

  <div class="dc-table" id="dc-table">
    <!-- rows injected by JS -->
  </div>

</div>
</div>

<!-- ════════════════════════════════════
     PAGE: LOADING
════════════════════════════════════ -->
<div id="page-loading" class="hidden">
<div class="page-wrap">
  <div class="spinner"></div>
  <p id="loading-text">CONNECTING...</p>
</div>
</div>

<!-- ════════════════════════════════════
     MODAL: Mission Profile
════════════════════════════════════ -->
<div id="modal-mission" class="modal-backdrop hidden">
  <div class="modal-box">
    <div class="modal-title">MISSION PROFILE</div>
    <div class="modal-sub" id="modal-sub">현재 설정을 확인하세요</div>
    <div class="profile-grid">
      <div class="profile-item"><div class="k">DIFFICULTY</div><div class="v" id="mp-diff">—</div></div>
      <div class="profile-item"><div class="k">DATABASE</div><div class="v" id="mp-db">—</div></div>
      <div class="profile-item"><div class="k">SUBJECT</div><div class="v" id="mp-sub">—</div></div>
      <div class="profile-item"><div class="k">TYPE</div><div class="v" id="mp-type">—</div></div>
    </div>
    <button class="btn btn-primary" id="modal-omakase" onclick="launchMission('OMAKASE')">
      🍱 오마카세 100 <span style="font-size:.75rem;opacity:.7;">기출↓ 오답률↑</span>
    </button>
    <button class="btn btn-outline" id="modal-wrong" onclick="launchMission('WRONG')">
      📝 오답노트 100 <span style="font-size:.75rem;opacity:.7;">오답수↑</span>
    </button>
    <button class="btn-ghost" onclick="closeModal()">취소</button>
  </div>
</div>

<!-- ════════════════════════════════════
     FEEDBACK BOTTOM SHEET
════════════════════════════════════ -->
<div id="feedback-layer">
  <div id="fb-status"></div>
  <div class="fb-detail">
    <div id="fb-answer"></div>
    <div id="fb-explan"></div>
  </div>
  <button id="btn-next" class="btn">NEXT CONTACT ›</button>
</div>

<!-- ════════════════════════════════════
     SYNC OVERLAY
════════════════════════════════════ -->
<div id="sync-overlay">
  <div class="spinner"></div>
  <p>DATA SYNCING...</p>
</div>

<!-- ════════════════════════════════════
     JAVASCRIPT
════════════════════════════════════ -->
<script>
/* ──────────────────────────────────────────
   CONFIG
────────────────────────────────────────── */
const CONFIG = {
    EZ: {
        URL: "https://script.google.com/macros/s/AKfycbxQdRw8bAcYSfZWNV6r808lVpwED88FaZj6bviR1pMZ2DimYDKHYu13jeT7oXaT04ErGw/exec",
        GIDs: { LAW_MULTI: 0, LAW_SUBJ: 1036407965, CTRL_MULTI: 438358690, CTRL_SUBJ: 1403157384, LAW_STATS: 1846282036, CTRL_STATS: 1880986641 }
    },
    INFERNO: {
        URL: "https://script.google.com/macros/s/AKfycbzjGLlSq7-xpO0dZxCWExg06paUtwsP1kcPBXTCXhDzm8wkU0CJCyCADB0gJKsU76z7RA/exec",
        GIDs: { LAW_MULTI: 0, LAW_SUBJ: 1805786990, CTRL_MULTI: 2049752243, CTRL_SUBJ: 570358631, LAW_STATS: 668283973, CTRL_STATS: 1546545747 }
    }
};

/* ──────────────────────────────────────────
   STATE
────────────────────────────────────────── */
const state = {
  difficulty:   'EZ',
  subject:      '',
  type:         '',
  mode:         '',
  questions:    [],
  currentIndex: 0,
  results:      [],
  dcData:       [],
  dcSubject:    '',
  dcSort:       'rate'
};

/* ──────────────────────────────────────────
   PAGES
────────────────────────────────────────── */
function showPage(id) {
  ['page-home','page-quiz','page-loading','page-dc'].forEach(p => {
    document.getElementById(p).classList.add('hidden');
  });
  const el = document.getElementById(id);
  el.classList.remove('hidden');
  el.classList.add('fade-in');
  setTimeout(() => el.classList.remove('fade-in'), 400);
}

/* ──────────────────────────────────────────
   DIFFICULTY TOGGLE
────────────────────────────────────────── */
function toggleDifficulty() {
  _applyDiff(state.difficulty === 'EZ' ? 'INFERNO' : 'EZ');
}

function _applyDiff(diff) {
  state.difficulty = diff;
  const isHell = diff === 'INFERNO';

  document.getElementById('diff-toggle').className = `toggle-track ${isHell ? 'hell' : 'ez'}`;
  document.getElementById('lbl-ez').className   = `diff-lbl ez${isHell ? ' dim' : ''}`;
  document.getElementById('lbl-hell').className = `diff-lbl hell${isHell ? '' : ' dim'}`;
  document.getElementById('mode-badge').innerText = isHell
    ? '⚠ HELL MODE · INFERNO DATABASE'
    : '● NORMAL MODE · EZ DATABASE';
  document.body.className = isHell ? 'hell' : '';
}

/* ──────────────────────────────────────────
   HOME FLOW → MODAL
────────────────────────────────────────── */
function prepSession(sub, type) {
  state.subject = sub;
  state.type    = type;

  const diffLabel = state.difficulty === 'EZ' ? 'NORMAL' : '⚠ HELL';
  const subLabel  = sub  === 'LAW'   ? '항공법규' : '항공관제';
  const typeLabel = type === 'MULTI' ? '객관식'  : '주관식';

  document.getElementById('mp-diff').innerText = diffLabel;
  document.getElementById('mp-db').innerText   = state.difficulty === 'EZ' ? 'EZ DB' : 'INFERNO DB';
  document.getElementById('mp-sub').innerText  = subLabel;
  document.getElementById('mp-type').innerText = typeLabel;
  document.getElementById('modal-sub').innerText = `[${subLabel} · ${typeLabel}] 훈련 모드를 선택하세요`;

  document.getElementById('modal-mission').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('modal-mission').classList.add('hidden');
  state.subject = '';
  state.type    = '';
}

/* ──────────────────────────────────────────
   SESSION START
────────────────────────────────────────── */
async function launchMission(mode) {
  closeModal();
  state.mode = mode;
  showPage('page-loading');
  setLoadingText('CONNECTING...');

  const cfg      = CONFIG[state.difficulty];
  const statsGid = cfg.GIDs[`${state.subject}_STATS`];
  const questGid = cfg.GIDs[`${state.subject}_${state.type}`];

  try {
    const [statsRes, questRes] = await Promise.all([
      fetch(`${cfg.URL}?gid=${statsGid}`),
      fetch(`${cfg.URL}?gid=${questGid}`)
    ]);
    const stats     = await statsRes.json();
    const questions = await questRes.json();

    const norm = s => String(s||'').replace(/\s+/g,' ').trim();
    const statsMap = {};
    stats.forEach(s => { statsMap[norm(s.problem)] = s; });

    if (mode === 'OMAKASE') {
      questions.sort((a,b) => {
        const sA = statsMap[norm(a.problem)] || {count:0, rate:0};
        const sB = statsMap[norm(b.problem)] || {count:0, rate:0};
        if (sA.count !== sB.count) return sA.count - sB.count;
        return Number(sB.rate) - Number(sA.rate);
      });
    } else {
      questions.sort((a,b) => {
        const sA = statsMap[norm(a.problem)] || {wrong:0};
        const sB = statsMap[norm(b.problem)] || {wrong:0};
        return Number(sB.wrong) - Number(sA.wrong);
      });
    }

    state.questions    = shuffle(questions.slice(0,100));
    state.currentIndex = 0;
    state.results      = [];

    document.getElementById('quiz-diff-tag').innerText =
      state.difficulty === 'EZ' ? 'NORMAL' : '⚠ HELL';

    renderQuestion();
    showPage('page-quiz');
  } catch(err) {
    console.error(err);
    alert(`통신 오류: ${err.message}`);
    showPage('page-home');
  }
}

/* ──────────────────────────────────────────
   RENDER QUESTION
────────────────────────────────────────── */
function renderQuestion() {
  const q   = state.questions[state.currentIndex];
  const pos = state.currentIndex + 1;
  const tot = state.questions.length;

  document.getElementById('quiz-pos').innerText   = `${pos} / ${tot}`;
  document.getElementById('quiz-pb').style.width  = `${(pos/tot)*100}%`;
  document.getElementById('q-category').innerText = `[ ${q.category} ]`;
  document.getElementById('question-text').innerText = q.problem;

  const area = document.getElementById('quiz-options');
  area.innerHTML = '';

  if (q.sheetType === 'MULTI') {
    const idx = parseInt(q.answer,10) - 1;
    q.answerText = String(q.choices[idx]||'').trim();

    shuffle(q.choices.map(c => String(c).trim())).forEach((text,i) => {
      const btn = document.createElement('button');
      btn.className = 'btn btn-outline';
      btn.innerText = `${i+1}.  ${text}`;
      btn.onclick   = () => { disableOptions(); processAnswer(text); };
      area.appendChild(btn);
    });
  } else {
    q.answerText = String(q.answer||'').trim();
    const inp = document.createElement('input');
    inp.type        = 'text';
    inp.placeholder = '정답을 입력하세요...';
    inp.onkeyup     = e => { if(e.key==='Enter') processAnswer(inp.value); };
    area.appendChild(inp);
    const btn = document.createElement('button');
    btn.className = 'btn btn-primary';
    btn.innerText = '제출 SUBMIT';
    btn.onclick   = () => processAnswer(inp.value);
    area.appendChild(btn);
    setTimeout(() => inp.focus(), 60);
  }
}

function disableOptions() {
  document.querySelectorAll('#quiz-options .btn-outline').forEach(b => {
    b.style.pointerEvents = 'none';
    b.style.opacity = '.5';
  });
}

/* ──────────────────────────────────────────
   ANSWER PROCESSING
────────────────────────────────────────── */
function processAnswer(userText) {
  const q         = state.questions[state.currentIndex];
  const norm      = s => String(s||'').replace(/\s+/g,'').toLowerCase();
  const isCorrect = norm(userText) === norm(q.answerText);

  state.results.push({ problem:q.problem, isCorrect });

  const layer  = document.getElementById('feedback-layer');
  const status = document.getElementById('fb-status');

  if(isCorrect){
    status.innerText        = '✓  CORRECT';
    status.style.cssText    = `background:rgba(0,255,65,.07);color:#00ff41;border:1px solid rgba(0,255,65,.2)`;
  } else {
    status.innerText        = '✗  INCORRECT';
    status.style.cssText    = `background:rgba(255,51,51,.07);color:#ff3333;border:1px solid rgba(255,51,51,.2)`;
  }

  document.getElementById('fb-answer').innerText = `정답: ${q.answerText}`;
  document.getElementById('fb-explan').innerText = q.explan || '해설이 없습니다.';

  document.getElementById('btn-next').onclick = () => {
    layer.classList.remove('show');
    layer.style.display = 'none';
    state.currentIndex++;
    if(state.currentIndex < state.questions.length) renderQuestion();
    else finishMission();
  };

  layer.style.display = 'block';
  requestAnimationFrame(() => layer.classList.add('show'));
}

/* ──────────────────────────────────────────
   ABORT / FINISH
────────────────────────────────────────── */
function abortMission() {
  if(state.results.length === 0){ showPage('page-home'); return; }
  if(confirm(`${state.results.length}문항 기록을 동기화하고 종료할까요?`)) finishMission();
}

async function finishMission() {
  document.getElementById('feedback-layer').style.display = 'none';
  document.getElementById('sync-overlay').classList.add('show');

  const cfg      = CONFIG[state.difficulty];
  const statsGid = cfg.GIDs[`${state.subject}_STATS`];

  try {
    await fetch(cfg.URL, {
      method:  'POST',
      mode:    'no-cors',
      headers: {'Content-Type':'text/plain'},
      body:    JSON.stringify({ results:state.results, statsGid })
    });
    document.getElementById('sync-overlay').classList.remove('show');
    const dl = state.difficulty === 'EZ' ? 'NORMAL' : 'HELL';
    alert(`[${dl}] 훈련 완료! 데이터가 동기화되었습니다.`);
    location.reload();
  } catch(err) {
    console.error(err);
    document.getElementById('sync-overlay').classList.remove('show');
    alert('동기화 오류. 훈련 기록은 보존됩니다.');
    location.reload();
  }
}

/* ──────────────────────────────────────────
   DATA CENTER
────────────────────────────────────────── */
async function openDataCenter(sub) {
  state.dcSubject = sub;
  showPage('page-loading');
  setLoadingText('LOADING DATA...');

  const cfg = CONFIG[state.difficulty];
  const gid = cfg.GIDs[`${sub}_STATS`];

  try {
    const res  = await fetch(`${cfg.URL}?gid=${gid}`);
    const data = await res.json();
    state.dcData = data.filter(d => d.problem);
    state.dcSort = 'rate';
    renderDataCenter();
    showPage('page-dc');
  } catch(err) {
    alert(`데이터 로드 오류: ${err.message}`);
    showPage('page-home');
  }
}

function renderDataCenter() {
  const sub    = state.dcSubject;
  const diff   = state.difficulty === 'EZ' ? 'NORMAL' : 'HELL';
  const subLbl = sub === 'LAW' ? '항공법규' : '항공관제';

  document.getElementById('dc-title').innerText = `DATA CENTER · ${subLbl}`;
  document.getElementById('dc-meta').innerText  =
    `${diff} DATABASE · ${state.dcData.length} RECORDS`;

  // sort
  const sorted = [...state.dcData].sort((a,b) => {
    if(state.dcSort==='rate')  return Number(b.rate)  - Number(a.rate);
    if(state.dcSort==='wrong') return Number(b.wrong) - Number(a.wrong);
    if(state.dcSort==='count') return Number(a.count) - Number(b.count);
    return 0;
  });

  // sort btn highlight
  ['rate','wrong','count'].forEach(k => {
    document.getElementById(`sort-${k}`).className =
      `sort-btn${state.dcSort===k?' active':''}`;
  });

  const table = document.getElementById('dc-table');
  table.innerHTML = '';

  sorted.forEach((row,i) => {
    const rate     = Math.min(Number(row.rate||0)*100, 100);
    const isDanger = rate >= 50;
    const rowEl    = document.createElement('div');
    rowEl.className = 'dc-row';
    rowEl.innerHTML = `
      <div class="dc-row-main">
        <div>
          <div class="dc-category">[ ${row.category||'—'} ]</div>
          <div class="dc-problem">${row.problem}</div>
          <button class="dc-view-btn" onclick="toggleAccordion(this, ${i})">▾ VIEW MANUAL</button>
        </div>
        <div class="dc-stats-col">
          <div class="dc-numbers">
            기출 <span>${row.count||0}</span> &nbsp; 오답 <span>${row.wrong||0}</span>
          </div>
          <div class="rate-bar-wrap">
            <div class="rate-bar-fill${isDanger?' danger':''}" style="width:${rate}%"></div>
          </div>
          <div style="font-size:.6rem;color:var(--muted2);text-align:right;margin-top:3px;">
            ${(rate).toFixed(0)}%
          </div>
        </div>
      </div>
      <div class="dc-accordion" id="acc-${i}">
        <div class="dc-acc-answer">정답: ${row.answer||'—'}</div>
        <div class="dc-acc-explan">${row.explan||'해설이 없습니다.'}</div>
      </div>
    `;
    table.appendChild(rowEl);
  });
}

function toggleAccordion(btn, idx) {
  const acc = document.getElementById(`acc-${idx}`);
  const open = acc.classList.toggle('open');
  btn.innerText = open ? '▴ HIDE' : '▾ VIEW MANUAL';
}

function sortDC(key) {
  state.dcSort = key;
  renderDataCenter();
}

/* ──────────────────────────────────────────
   UTILS
────────────────────────────────────────── */
function shuffle(arr) {
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function setLoadingText(t) {
  document.getElementById('loading-text').innerText = t;
}
</script>
</body>
