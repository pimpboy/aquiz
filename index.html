<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>항공 훈련 센터 : 통합 관제소</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f4f7fa; --card: #ffffff; --text: #2d3436; --primary: #4361ee; --transition: 0.4s; }
        body.hell-mode { --bg: #0f0f0f; --card: #1a1a1a; --text: #eee; --primary: #d93025; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; transition: var(--transition); }
        .container { text-align: center; padding: 40px; background: var(--card); border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); width: 90%; max-width: 550px; transition: var(--transition); }
        h1 { font-weight: 900; font-size: 2.2rem; margin-bottom: 5px; }
        .mode-switch-container { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 35px; padding: 15px; background: rgba(128, 128, 128, 0.1); border-radius: 20px; }
        .switch { position: relative; display: inline-block; width: 70px; height: 34px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #d93025; }
        input:checked + .slider:before { transform: translateX(36px); }
        .subject-group { margin-bottom: 25px; padding: 20px; border: 1px solid rgba(128, 128, 128, 0.2); border-radius: 20px; text-align: left; }
        .subject-title { font-weight: 800; font-size: 1.1rem; margin-bottom: 15px; display: block; }
        .btn-row { display: grid; grid-template-columns: 1.5fr 1fr; gap: 10px; }
        .btn { padding: 15px; border: none; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; color: white; background: var(--primary); transition: var(--transition); }
        .btn-stats { background: #636e72; font-size: 0.85rem; }
        .btn:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.1); }
        .btn:disabled { background: #555 !important; opacity: 0.5; cursor: wait; }
        #loader-msg { margin-top: 15px; font-size: 0.85rem; font-weight: 600; color: var(--primary); min-height: 1.2em; }
        body.hell-mode .container { border: 2px solid var(--primary); animation: shake 0.4s infinite; }
        @keyframes shake { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(1px,1px); } 75% { transform: translate(-1px,1px); } }
    </style>
</head>
<body>

<div class="container">
    <h1 id="main-title">항공 훈련 관제소</h1>
    <p style="color: #95a5a6; font-size: 0.9rem; margin-bottom: 25px;">포커 소좌, 훈련 모드를 선택하십시오.</p>

    <div class="mode-switch-container">
        <span>NORMAL</span>
        <label class="switch">
            <input type="checkbox" id="mode-toggle">
            <span class="slider"></span>
        </label>
        <span style="color:#d93025; font-weight:bold;">HELL</span>
    </div>

    <div class="subject-group">
        <span class="subject-title">✈️ 항공법규 (Law)</span>
        <div class="btn-row">
            <button class="btn" onclick="prepareTraining('law')">🚀 훈련 시작</button>
            <button class="btn btn-stats" onclick="openDataCenter('law')">📊 데이터 센터</button>
        </div>
    </div>

    <div class="subject-group">
        <span class="subject-title">📡 항공관제 (Control)</span>
        <div class="btn-row">
            <button class="btn" onclick="prepareTraining('control')">🚀 훈련 시작</button>
            <button class="btn btn-stats" onclick="openDataCenter('control')">📊 데이터 센터</button>
        </div>
    </div>

    <div id="loader-msg"></div>
</div>

<script>
    /**
     * ------------------------------------------------------------------
     * ⚠️ [포커 소좌 전용 통합 주소 설정창]
     * ------------------------------------------------------------------
     */
    const CONFIG = {
        normal: {
            law: {
                obj: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSt4rnBHn09jQMQkDvTY-shEQKw_hSVERS4YhR7__ZetWeFtgSNF_dCgmeEVVvvihz2E-DoLsSXQQeH/pub?gid=0&single=true&output=csv",
                sub: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSt4rnBHn09jQMQkDvTY-shEQKw_hSVERS4YhR7__ZetWeFtgSNF_dCgmeEVVvvihz2E-DoLsSXQQeH/pub?gid=1036407965&single=true&output=csv",
                stats: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSt4rnBHn09jQMQkDvTY-shEQKw_hSVERS4YhR7__ZetWeFtgSNF_dCgmeEVVvvihz2E-DoLsSXQQeH/pub?gid=1846282036&single=true&output=csv",
                gas: "https://script.google.com/macros/s/AKfycbzgyYj5bS-NjFueQar5k4HLTs7CpdsKOiYn76PK2Z5ydrn74Ds8fov8gnemaaRTWiMT/exec"
            },
            control: {
                obj: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSt4rnBHn09jQMQkDvTY-shEQKw_hSVERS4YhR7__ZetWeFtgSNF_dCgmeEVVvvihz2E-DoLsSXQQeH/pub?gid=438358690&single=true&output=csv",
                sub: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSt4rnBHn09jQMQkDvTY-shEQKw_hSVERS4YhR7__ZetWeFtgSNF_dCgmeEVVvvihz2E-DoLsSXQQeH/pub?gid=1403157384&single=true&output=csv",
                stats: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSt4rnBHn09jQMQkDvTY-shEQKw_hSVERS4YhR7__ZetWeFtgSNF_dCgmeEVVvvihz2E-DoLsSXQQeH/pub?gid=1880986641&single=true&output=csv",
                gas: "https://script.google.com/macros/s/AKfycbzgyYj5bS-NjFueQar5k4HLTs7CpdsKOiYn76PK2Z5ydrn74Ds8fov8gnemaaRTWiMT/exec"
            }
        },
        hell: {
            law: {
                obj: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTHqWTrWL6RM0ko1WIXeYKzjlQ0wb1LtQti-AeR7Q8cuGWJ1P905Q4DywrBLsKBKU8I7BYojLFRor5f/pub?gid=0&single=true&output=csv",
                sub: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTHqWTrWL6RM0ko1WIXeYKzjlQ0wb1LtQti-AeR7Q8cuGWJ1P905Q4DywrBLsKBKU8I7BYojLFRor5f/pub?gid=606421897&single=true&output=csv",
                stats: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTHqWTrWL6RM0ko1WIXeYKzjlQ0wb1LtQti-AeR7Q8cuGWJ1P905Q4DywrBLsKBKU8I7BYojLFRor5f/pub?gid=1366188626&single=true&output=csv",
                gas: "https://script.google.com/macros/s/AKfycbyhGW6_7Zl5P2Z-hDOvd4r_4Iw0FXF0-ygQduMJJAAqkqvEhHRxskPMn4st2LFshxUc/exec"
            },
            control: {
                obj: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTHqWTrWL6RM0ko1WIXeYKzjlQ0wb1LtQti-AeR7Q8cuGWJ1P905Q4DywrBLsKBKU8I7BYojLFRor5f/pub?gid=371932808&single=true&output=csv",
                sub: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTHqWTrWL6RM0ko1WIXeYKzjlQ0wb1LtQti-AeR7Q8cuGWJ1P905Q4DywrBLsKBKU8I7BYojLFRor5f/pub?gid=157857311&single=true&output=csv",
                stats: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTHqWTrWL6RM0ko1WIXeYKzjlQ0wb1LtQti-AeR7Q8cuGWJ1P905Q4DywrBLsKBKU8I7BYojLFRor5f/pub?gid=720487079&single=true&output=csv",
                gas: "https://script.google.com/macros/s/AKfycbyhGW6_7Zl5P2Z-hDOvd4r_4Iw0FXF0-ygQduMJJAAqkqvEhHRxskPMn4st2LFshxUc/exec"
            }
        }
    };

    let currentMode = 'normal';
    const toggle = document.getElementById('mode-toggle');
    const loaderMsg = document.getElementById('loader-msg');

    toggle.addEventListener('change', () => {
        currentMode = toggle.checked ? 'hell' : 'normal';
        document.body.classList.toggle('hell-mode', toggle.checked);
        document.getElementById('main-title').innerText = toggle.checked ? "🔥 불지옥 커리큘럼" : "항공 훈련 관제소";
    });

    async function prepareTraining(subject) {
        const btns = document.querySelectorAll('.btn');
        btns.forEach(b => b.disabled = true);
        loaderMsg.innerText = `[${currentMode.toUpperCase()}] Checklist(객/주/통) 수행 중...`;

        try {
            const target = CONFIG[currentMode][subject];
            
            const [resObj, resSub, resStats] = await Promise.all([
                fetch(target.obj),
                fetch(target.sub),
                fetch(target.stats)
            ]);

            if (!resObj.ok || !resSub.ok || !resStats.ok) throw new Error("로드 실패");

            const dataObj = await resObj.text();
            const dataSub = await resSub.text();
            const dataStats = await resStats.text();

            sessionStorage.setItem('quiz_obj', dataObj);
            sessionStorage.setItem('quiz_sub', dataSub);
            sessionStorage.setItem('quiz_stats', dataStats);
            sessionStorage.setItem('quiz_config', JSON.stringify({
                mode: currentMode,
                subject: subject,
                gasUrl: target.gas
            }));

            loaderMsg.innerText = "✅ 데이터 동기화 완료! Cleared for takeoff";
            setTimeout(() => { location.href = 'quiz.html'; }, 800);

        } catch (e) {
            loaderMsg.innerText = "❌ 로드 실패! 주소 설정을 확인하십시오.";
            btns.forEach(b => b.disabled = false);
        }
    }

    function openDataCenter(subject) {
        const target = CONFIG[currentMode][subject];
        window.open(target.gas, '_blank');
    }
</script>

</body>
</html>
