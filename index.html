<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>항공 훈련소 v3.0 (Data-Driven)</title>
    <style>
        :root { --p: #1a73e8; --bg: #f8f9fa; --txt: #202124; --err: #d93025; --suc: #1e8e3e; --border: #dadce0; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 15px; display: flex; justify-content: center; }
        #app { background: #fff; width: 100%; max-width: 500px; border-radius: 15px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); min-height: 85vh; display: flex; flex-direction: column; box-sizing: border-box; }
        
        /* 버튼 스타일 */
        .btn-main { width: 100%; padding: 16px; background: var(--p); color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-sub { width: 100%; padding: 12px; background: #fff; color: var(--p); border: 2px solid var(--p); border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        
        /* 레이아웃 */
        .menu-group { margin-bottom: 20px; animation: fadeIn 0.5s; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; color: #5f6368; }
        select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; background: #fff; }
        
        /* 퀴즈 UI */
        .header { display: flex; justify-content: space-between; font-size: 13px; color: #70757a; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .q-stats { font-size: 12px; color: #70757a; margin-bottom: 10px; display: flex; gap: 12px; }
        .q-text { font-size: 19px; font-weight: bold; margin-bottom: 25px; line-height: 1.6; word-break: keep-all; }
        .opt-list { display: grid; gap: 12px; }
        .opt-item { padding: 16px; border: 1px solid var(--border); border-radius: 10px; background: #fff; font-size: 16px; cursor: pointer; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        
        /* 상태 효과 */
        .opt-item.correct { background-color: #e6f4ea; border-color: var(--suc); color: var(--suc); font-weight: bold; }
        .opt-item.wrong { background-color: #fce8e6; border-color: var(--err); color: var(--err); }
        .opt-item.disabled { cursor: default; pointer-events: none; }

        #feedback-area { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; border: 1px solid var(--border); background: #fafafa; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="app">
    <div id="loader" style="display:none; text-align:center; padding-top:100px;">
        <div style="font-size:24px; margin-bottom:10px;">📡</div>
        <div>데이터 링크 동기화 중...</div>
    </div>

    <div id="step1" class="menu-group">
        <h2 style="margin-top:0; text-align:center;">✈️ 항공 훈련소 v3.0</h2>
        <label>과목을 선택하십시오</label>
        <button class="btn-main" onclick="selectSubject('법규')">항공법규</button>
        <button class="btn-main" style="background:#5f6368" onclick="selectSubject('관제')">관제일반</button>
    </div>

    <div id="step2" class="menu-group" style="display:none">
        <h2 id="selected-sub-title"></h2>
        <label>훈련 유형을 선택하십시오</label>
        <button class="btn-main" onclick="selectType('객관식')">객관식 훈련</button>
        <button class="btn-main" onclick="selectType('주관식')">주관식 훈련</button>
        <button class="btn-sub" onclick="goBack(1)">처음으로</button>
    </div>

    <div id="step3" class="menu-group" style="display:none">
        <h2 id="mission-title"></h2>
        <div class="menu-group">
            <label>세부 카테고리</label>
            <select id="lcat-select"></select>
        </div>
        <button class="btn-main" onclick="startSession('weak')">⚠️ 취약 문제 정밀 타격 (TOP 30)</button>
        <button class="btn-main" style="background:#34a853" onclick="startSession('smart')">🎲 지능형 랜덤 (200문제)</button>
        <button class="btn-sub" onclick="goBack(2)">이전 단계로</button>
    </div>

    <div id="quiz-ui" style="display:none">
        <div class="header">
            <span id="prog"></span>
            <span id="acc">정답률: 0%</span>
        </div>
        <div class="q-stats">
            <span id="stat-wrong" style="color:var(--err); font-weight:bold;"></span>
            <span id="stat-count"></span>
        </div>
        <div id="q" class="q-text"></div>
        <div id="opts" class="opt-list"></div>
        <div id="feedback-area">
            <div id="feedback-res" style="font-weight:bold; margin-bottom:8px; font-size:18px;"></div>
            <div id="exp-content" style="font-size:14px; color:#555; white-space:pre-wrap; line-height:1.5;"></div>
            <button class="btn-main" onclick="goToNext()">다음 문제</button>
        </div>
    </div>
</div>

<script>
    // [설정] 실제 시트의 gid 번호와 배포 URL을 입력하십시오!
    const GID_MAP = {
        '법규': { '객관식': '0', '주관식': '2011973258' },
        '관제': { '객관식': '1053182571', '주관식': '217691441' }
    };
    const BASE_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTyZ24Pjcs6P2E4bzyxYuuVBSSxltreMArT-jxVdEK6J-Wc7_uPMTO47NwZQxA7mLZK_WIYqkmj5YAK/pub?single=true&output=csv';
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxtjoaIxCQy8e97qwIhHPhVv5JXRDFaJQxKqMyFUZ_j7aoS_t44vnP-gr4Z77YujA-A/exec';
    
    let currentSub = '', currentType = '';
    let allData = [], filteredQuiz = [], idx = 0, score = 0;

    // 1단계 과목 선택
    function selectSubject(sub) {
        currentSub = sub;
        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'block';
        document.getElementById('selected-sub-title').innerText = `🚀 ${sub} 훈련 코스`;
    }

    // 2단계 유형 선택 및 데이터 로드
    async function selectType(type) {
        currentType = type;
        document.getElementById('step2').style.display = 'none';
        document.getElementById('loader').style.display = 'block';
        
        const gid = GID_MAP[currentSub][currentType];
        try {
            const res = await fetch(`${BASE_URL}&gid=${gid}`);
            const text = await res.text();
            parseCSVData(text);
            
            document.getElementById('loader').style.display = 'none';
            document.getElementById('step3').style.display = 'block';
            document.getElementById('mission-title').innerText = `${currentSub} > ${type}`;
        } catch (e) {
            alert("데이터를 가져오는데 실패했읍니다. gid 설정을 확인하십시오.");
            location.reload();
        }
    }

    // 데이터 파싱 (K열: 오답수, L열: 기출수 포함)
    function parseCSVData(text) {
        const rows = text.split('\n').map(row => {
            const cells = [];
            let cell = '', inQuotes = false;
            for(let char of row) {
                if(char === '"') inQuotes = !inQuotes;
                else if(char === ',' && !inQuotes) { cells.push(cell.trim()); cell = ''; }
                else cell += char;
            }
            cells.push(cell.trim());
            return cells;
        });

        const h = rows[0];
        const find = (k) => h.findIndex(name => name.includes(k));
        
        allData = rows.slice(1).map(r => ({
            lcat: r[find('대분류')],
            q: r[find('문제')],
            opts: [r[find('보기1')], r[find('보기2')], r[find('보기3')], r[find('보기4')]],
            ans: r[find('보기' + r[find('정답')])],
            exp: r[find('해설')],
            wrongCount: parseInt(r[10]) || 0, // K열
            totalCount: parseInt(r[11]) || 0  // L열
        })).filter(i => i.q);

        const lcats = [...new Set(allData.map(d => d.lcat))].filter(Boolean);
        const lSelect = document.getElementById('lcat-select');
        lSelect.innerHTML = '<option value="ALL">전체 대분류</option>';
        lcats.forEach(c => lSelect.innerHTML += `<option value="${c}">${c}</option>`);
    }

    // 3단계 미션 시작 (지능형 선별)
    function startSession(mode) {
        const lVal = document.getElementById('lcat-select').value;
        filteredQuiz = allData.filter(d => lVal === 'ALL' || d.lcat === lVal);

        if (mode === 'weak') {
            // 취약 타격: 오답 횟수 많은 순 TOP 30
            filteredQuiz.sort((a, b) => b.wrongCount - a.wrongCount);
            filteredQuiz = filteredQuiz.slice(0, 30);
        } else {
            // 지능형 랜덤: (오답 가중치 - 기출 빈도) 계산 후 상위 200개 추출 후 셔플
            filteredQuiz.sort((a, b) => (b.wrongCount * 2 - b.totalCount) - (a.wrongCount * 2 - a.totalCount));
            filteredQuiz = filteredQuiz.slice(0, 200);
            for (let i = filteredQuiz.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [filteredQuiz[i], filteredQuiz[j]] = [filteredQuiz[j], filteredQuiz[i]];
            }
        }

        if(filteredQuiz.length === 0) { alert("문제가 없읍니다."); return; }
        idx = 0; score = 0;
        document.getElementById('step3').style.display = 'none';
        document.getElementById('quiz-ui').style.display = 'block';
        render();
    }

    function render() {
        const item = filteredQuiz[idx];
        document.getElementById('prog').innerText = `${idx + 1} / ${filteredQuiz.length}`;
        document.getElementById('stat-wrong').innerText = `⚠️ 누적 오답: ${item.wrongCount}회`;
        document.getElementById('stat-count').innerText = `📊 누적 학습: ${item.totalCount}회`;
        document.getElementById('acc').innerText = `정답률: ${idx === 0 ? 0 : Math.round((score/idx)*100)}%`;
        document.getElementById('q').innerText = item.q;
        
        const container = document.getElementById('opts'); 
        container.innerHTML = '';
        document.getElementById('feedback-area').style.display = 'none';

        if (currentType === '주관식') {
            // ✍️ 주관식 전용 UI 생성
            const input = document.createElement('input');
            input.id = 'subjective-ans';
            input.type = 'text';
            input.placeholder = '답안을 입력하십시오...';
            input.style = 'width:100%; padding:15px; font-size:18px; border:2px solid var(--border); border-radius:10px; box-sizing:border-box;';
            
            const subBtn = document.createElement('button');
            subBtn.className = 'btn-main';
            subBtn.innerText = '답안 제출';
            subBtn.style.marginTop = '15px';
            subBtn.onclick = () => {
                const userAns = input.value.trim();
                if(!userAns) return alert("답을 입력하십시오!");
                checkSubjective(userAns, item);
            };

            container.appendChild(input);
            container.appendChild(subBtn);
            input.focus(); // 바로 입력 가능하게 포커스
        } else {
            // 🔘 객관식 전용 UI 생성
            item.opts.filter(o => o).forEach(o => {
                const btn = document.createElement('div');
                btn.className = 'opt-item';
                btn.innerText = o;
                btn.onclick = () => check(btn, o === item.ans, item);
                container.appendChild(btn);
            });
        }
    }

    // 🎯 주관식 정답 체크 로직
    function checkSubjective(userAns, item) {
        const input = document.getElementById('subjective-ans');
        const isCorrect = userAns.replace(/\s/g, "") === item.ans.replace(/\s/g, ""); // 공백 무시 체크
        
        input.disabled = true;
        if (isCorrect) {
            score++;
            input.style.borderColor = "var(--suc)";
            input.style.backgroundColor = "#e6f4ea";
            document.getElementById('feedback-res').innerText = "✅ 정확합니다!";
            document.getElementById('feedback-res').style.color = "var(--suc)";
        } else {
            input.style.borderColor = "var(--err)";
            input.style.backgroundColor = "#fce8e6";
            document.getElementById('feedback-res').innerText = "❌ 틀렸읍니다!";
            document.getElementById('feedback-res').style.color = "var(--err)";
            document.getElementById('feedback-res').innerHTML += `<br><span style="font-size:14px; color:#333;">(정답: ${item.ans})</span>`;
        }

        sendDataToGAS(item.q, currentSub, currentType, userAns, isCorrect);
        document.getElementById('exp-content').innerText = item.exp || "해설 데이터가 없읍니다.";
        document.getElementById('feedback-area').style.display = 'block';
    }
        
    function sendDataToGAS(q, sub, type, res, isCorrect) {
        const payload = new FormData();
        payload.append('subject', sub);
        payload.append('type', type);
        payload.append('id', q);
        payload.append('result', res);
        payload.append('isCorrect', isCorrect);

        fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: payload })
        .then(() => console.log("Data Linked."));
    }

    function goToNext() { 
        idx++; 
        if(idx < filteredQuiz.length) { render(); window.scrollTo(0,0); } 
        else { alert("훈련 종료! 수고하셨읍니다."); location.reload(); }
    }

    function goBack(step) {
        document.getElementById('step2').style.display = 'none';
        document.getElementById('step3').style.display = 'none';
        document.getElementById(`step${step}`).style.display = 'block';
    }
</script>
</body>
</html>
