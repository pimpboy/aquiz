<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>항공안전법 스마트 퀴즈 v2.0</title>
    <style>
        :root { --p: #1a73e8; --bg: #f8f9fa; --txt: #202124; --err: #d93025; --suc: #1e8e3e; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 15px; display: flex; justify-content: center; }
        #app { background: #fff; width: 100%; max-width: 500px; border-radius: 15px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); min-height: 85vh; display: flex; flex-direction: column; }
        
        /* 메인 메뉴 스타일 */
        .menu-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; color: #5f6368; }
        select, input { width: 100%; padding: 12px; border: 1px solid #dadce0; border-radius: 8px; font-size: 16px; margin-bottom: 10px; box-sizing: border-box; }
        
        .btn-main { width: 100%; padding: 16px; background: var(--p); color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s; }
        .btn-main:active { transform: scale(0.98); background: #1557b0; }

        /* 퀴즈 UI */
        .header { display: flex; justify-content: space-between; font-size: 13px; color: #70757a; margin-bottom: 20px; }
        .q-text { font-size: 19px; font-weight: bold; margin-bottom: 25px; line-height: 1.6; word-break: keep-all; }
        .opt-list { display: grid; gap: 12px; flex-grow: 1; }
        .opt-item { padding: 16px; border: 1px solid #dadce0; border-radius: 10px; background: #fff; text-align: left; font-size: 16px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .opt-item:active { background: #f1f3f4; }
        
        /* 결과 UI */
        .summary { background: #e8f0fe; padding: 20px; border-radius: 10px; text-align: center; margin-bottom: 20px; }
        .wrong-card { border-left: 5px solid var(--err); background: #fff5f5; padding: 15px; margin-bottom: 15px; border-radius: 4px; font-size: 14px; }
        .loading { text-align: center; padding-top: 50px; }
    </style>
</head>
<body>

<div id="app">
    <div id="loader" class="loading">데이터 피드 확인 중...</div>

    <div id="menu-ui" style="display:none">
        <h2 style="margin-top:0">✈️ 학습 설정</h2>
        <div class="menu-group">
            <label>1. 학습 범위 선택</label>
            <select id="cat-select"><option value="ALL">전체 범위</option></select>
        </div>
        <div class="menu-group">
            <label>2. 문항 수 설정</label>
            <select id="limit-select">
                <option value="10">10문제</option>
                <option value="30">30문제</option>
                <option value="50">50문제</option>
                <option value="100">100문제</option>
                <option value="999">전체 풀기</option>
            </select>
        </div>
        <p style="font-size:12px; color:#888;">* 문제와 보기 순서가 매번 무작위로 섞입니다.</p>
        <button class="btn-main" onclick="startSession()">테이크오프 (시작)</button>
    </div>

    <div id="quiz-ui" style="display:none">
        <div class="header">
            <span id="prog"></span>
            <span id="acc">정답률: 0%</span>
        </div>
        <div id="cat-tag" style="font-size:12px; color:var(--p); font-weight:bold; margin-bottom:8px"></div>
        <div id="q" class="q-text"></div>
        <div id="opts" class="opt-list"></div>
    </div>

    <div id="res-ui" style="display:none">
        <h2 style="text-align:center">미션 분석 리포트</h2>
        <div id="total-stat" class="summary"></div>
        <div id="wrong-list"></div>
        <button class="btn-main" onclick="location.reload()">새로운 세션</button>
    </div>
</div>

<script>
    // 보내주신 URL 사용
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTyZ24Pjcs6P2E4bzyxYuuVBSSxltreMArT-jxVdEK6J-Wc7_uPMTO47NwZQxA7mLZK_WIYqkmj5YAK/pub?gid=0&single=true&output=csv';

    let allData = [], filteredQuiz = [], idx = 0, score = 0, logs = [];

    // 배열 섞기 함수 (Fisher-Yates Shuffle)
    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    async function loadData() {
        try {
            const res = await fetch(CSV_URL);
            const data = await res.text();
            const rows = data.split('\n').map(row => 
                row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cell => cell.replace(/"/g, '').trim())
            );

            // 헤더 키워드 매핑
            const h = rows[0];
            const find = (k) => h.findIndex(name => name.includes(k));
            
            allData = rows.slice(1).map(r => ({
                lcat: r[find('대분류')], mcat: r[find('중분류')], q: r[find('문제')],
                opts: [r[find('보기1')], r[find('보기2')], r[find('보기3')], r[find('보기4')]],
                ansText: r[find('보기' + r[find('정답')])] || r[4 + (parseInt(r[find('정답')]) - 1)], // 정답 번호에 해당하는 텍스트 보관
                exp: r[find('해설')] || ""
            })).filter(i => i.q);

            // 대분류 메뉴 생성
            const cats = [...new Set(allData.map(d => d.lcat))];
            const select = document.getElementById('cat-select');
            cats.forEach(c => {
                if(c) select.innerHTML += `<option value="${c}">${c}</option>`;
            });

            document.getElementById('loader').style.display = 'none';
            document.getElementById('menu-ui').style.display = 'block';
        } catch (e) {
            document.getElementById('loader').innerHTML = `❌ 로드 실패<br>${e.message}`;
        }
    }

    function startSession() {
        const cat = document.getElementById('cat-select').value;
        const limit = parseInt(document.getElementById('limit-select').value);

        // 1. 카테고리 필터링
        filteredQuiz = cat === 'ALL' ? [...allData] : allData.filter(d => d.lcat === cat);
        
        // 2. 문제 순서 섞기
        shuffle(filteredQuiz);
        
        // 3. 문항 수 제한
        filteredQuiz = filteredQuiz.slice(0, limit);

        document.getElementById('menu-ui').style.display = 'none';
        document.getElementById('quiz-ui').style.display = 'block';
        render();
    }

    function render() {
        if (idx >= filteredQuiz.length) { end(); return; }
        const item = filteredQuiz[idx];
        
        // 보기 섞기
        let optionsWithMeta = item.opts.map((t, i) => ({ text: t, isCorrect: t === item.ansText }));
        shuffle(optionsWithMeta);

        document.getElementById('prog').innerText = `${idx + 1} / ${filteredQuiz.length}`;
        document.getElementById('acc').innerText = `정답률: ${idx === 0 ? 0 : Math.round((score/idx)*100)}%`;
        document.getElementById('cat-tag').innerText = `${item.lcat} > ${item.mcat}`;
        document.getElementById('q').innerText = item.q;

        const container = document.getElementById('opts');
        container.innerHTML = '';
        optionsWithMeta.forEach((opt, i) => {
            const btn = document.createElement('div');
            btn.className = 'opt-item';
            btn.innerText = `${i + 1}. ${opt.text}`;
            btn.onclick = () => {
                if (opt.isCorrect) score++;
                logs.push({...item, userChoice: opt.text, isCorrect: opt.isCorrect, shuffledOpts: optionsWithMeta});
                idx++; render();
            };
            container.appendChild(btn);
        });
    }

    function end() {
        document.getElementById('quiz-ui').style.display = 'none';
        document.getElementById('res-ui').style.display = 'block';
        const rate = Math.round((score/logs.length)*100);
        document.getElementById('total-stat').innerHTML = `<strong>성취도: ${rate}%</strong><br>${logs.length}문제 중 ${score}개 정답`;

        const wArea = document.getElementById('wrong-list');
        const wrongs = logs.filter(l => !l.isCorrect);
        wArea.innerHTML = wrongs.length === 0 ? '<p style="text-align:center; color:var(--suc)">🎉 만점입니다!</p>' : '<h4>오답 리스트</h4>';
        
        wrongs.forEach(w => {
            wArea.innerHTML += `
                <div class="wrong-card">
                    <strong>Q: ${w.q}</strong><br>
                    <div style="margin-top:8px">
                        <span style="color:var(--err)">제출: ${w.userChoice}</span><br>
                        <span style="color:var(--suc)">정답: ${w.ansText}</span>
                    </div>
                    ${w.exp ? `<div style="margin-top:8px; font-size:12px; color:#666; border-top:1px dashed #ddd; padding-top:5px">💡 ${w.exp}</div>` : ''}
                </div>`;
        });
    }

    window.onload = loadData;
</script>
</body>
</html>
