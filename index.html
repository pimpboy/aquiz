<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATC Training Center - NextGen</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --radar-green: #00ff41;
            --radar-dim: #004411;
            --danger-red: #ff3333;
            --text-white: #e0e0e0;
            --primary-blue: #4f46e5;
            --card-bg: #1a1a1a;
            --border-color: #333;
            --hover-color: #00ff41;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-font-smoothing: antialiased;
        }

        .container { width: 100%; max-width: 600px; }

        .mode-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            transition: border-color 0.3s ease;
        }
        .mode-card:hover { border-color: var(--hover-color); }

        button {
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 600;
            border: 1px solid transparent;
            padding: 16px;
            width: 100%;
            outline: none;
        }
        button:hover:not(:disabled) { border-color: var(--radar-green); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-start { background: var(--primary-blue); color: white; }
        .btn-stats { background: #333; color: var(--radar-green); font-size: 0.8rem; width: auto; padding: 8px 16px; }

        .toggle-wrap {
            background: #1a1a1a;
            border-radius: 50px;
            padding: 8px 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            border: 1px solid #333;
        }
        .switch { position: relative; display: inline-block; width: 50px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333; transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 20px; width: 20px; left: 4px; bottom: 4px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--danger-red); }
        input:checked + .slider:before { transform: translateX(22px); }

        .progress-container { width: 100%; background: #222; height: 6px; border-radius: 3px; margin: 20px 0; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--radar-green); width: 0%; transition: 0.4s ease-out; }

        .stats-wrap { width: 100%; overflow-x: auto; margin-top: 10px; border-radius: 12px; border: 1px solid #333; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; background: #0a0a0a; min-width: 600px; }
        th { background: #1a1a1a; padding: 15px; text-align: center; color: var(--radar-green); border-bottom: 2px solid #333; cursor: pointer; }
        td { padding: 15px; border-bottom: 1px solid #222; text-align: center; }

        #feedback-layer {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 600px; background: #111;
            border-top: 3px solid var(--radar-green); padding: 24px;
            display: none; z-index: 1000; border-radius: 24px 24px 0 0;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }

        .hidden { display: none !important; }
        .abort-btn { background: none; color: #666; border: 1px solid #333; padding: 8px 16px; width: auto; font-size: 0.75rem; }
        .abort-btn:hover { color: var(--danger-red); border-color: var(--danger-red); }
        .exp-box { background: #1a1a1a; padding: 15px; border-radius: 12px; margin: 15px 0; border-left: 4px solid var(--radar-green); font-size: 0.9rem; line-height: 1.6; }
        
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div id="main-page">
        <header style="text-align: center; margin-top: 40px; margin-bottom: 40px;">
            <h1 style="margin: 0; color: var(--radar-green); letter-spacing: -1px;">ATC TRAINING CENTER</h1>
            <p style="color: #666; font-size: 0.95rem; margin-top: 8px;">Squadron Leader <strong>Porker</strong>, 시스템 가동 중...</p>
        </header>

        <div class="toggle-wrap">
            <span style="font-size: 0.8rem; font-weight: bold; color: #888;">NORMAL</span>
            <label class="switch">
                <input type="checkbox" id="diff-toggle" onchange="window.setDifficulty(this.checked)">
                <span class="slider"></span>
            </label>
            <span style="font-size: 0.8rem; font-weight: bold; color: var(--danger-red);">INFERNO</span>
        </div>

        <div id="subject-cards">
            <div class="mode-card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <span style="font-size: 1.1rem; font-weight: bold;">✈️ 항공법규 (Law)</span>
                    <button class="btn-stats" onclick="window.loadStats('LAW')">DATA CENTER</button>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                    <button class="btn-start" onclick="window.prepMission('LAW', 'MULTI')">객관식 훈련</button>
                    <button class="btn-start" onclick="window.prepMission('LAW', 'SUBJ')">주관식 훈련</button>
                </div>
            </div>

            <div class="mode-card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <span style="font-size: 1.1rem; font-weight: bold;">📡 항공관제 (Control)</span>
                    <button class="btn-stats" onclick="window.loadStats('CTRL')">DATA CENTER</button>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                    <button class="btn-start" onclick="window.prepMission('CTRL', 'MULTI')">객관식 훈련</button>
                    <button class="btn-start" onclick="window.prepMission('CTRL', 'SUBJ')">주관식 훈련</button>
                </div>
            </div>
        </div>

        <div id="mode-selection" class="hidden" style="text-align: center;">
            <h3 style="color: orange; margin-bottom: 20px;">MISSION PROFILE</h3>
            <button class="btn-start" onclick="window.loadQuiz('OMAKASE')" style="margin-bottom: 12px; background: #222;">🍱 100문항 오마카세 (신규 위주)</button>
            <button class="btn-start" onclick="window.loadQuiz('WRONG')" style="margin-bottom: 24px; background: #222;">📝 100문항 오답노트 (취약 위주)</button>
            <button onclick="location.reload()" style="background: none; color: #555; border: 1px solid #333; width: auto; padding: 10px 30px;">기지로 복귀</button>
        </div>
    </div>

    <div id="quiz-page" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div id="pos-display" style="color: var(--radar-green); font-weight: bold; font-family: monospace;">POS: 0 / 100</div>
            <button class="abort-btn" onclick="window.stopSession()">ABORT MISSION</button>
        </div>
        <div class="progress-container"><div class="progress-bar" id="pb"></div></div>
        <div id="question-box" style="margin: 40px 0; font-size: 1.25rem; font-weight: 500; line-height: 1.6; min-height: 100px;"></div>
        <div id="answer-area"></div>
    </div>

    <div id="loading-page" class="hidden">
        <div style="text-align: center; margin-top: 150px;">
            <div style="display: inline-block; width: 40px; height: 40px; border: 3px solid var(--radar-dim); border-top-color: var(--radar-green); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px;"></div>
            <h3 id="loading-msg" style="color: var(--radar-green); letter-spacing: 2px;">LINKING TO TOWER...</h3>
        </div>
    </div>

    <div id="stats-page" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
            <h2 style="margin: 0; color: var(--radar-green);">DATA CENTER</h2>
            <button onclick="location.reload()" style="width: auto; padding: 10px 20px; background: #222; border: 1px solid #444; color: white; border-radius: 8px;">EXIT</button>
        </div>
        <div class="stats-wrap">
            <table>
                <thead>
                    <tr>
                        <th onclick="window.sortStats('type')">유형</th>
                        <th onclick="window.sortStats('problem')">문제</th>
                        <th onclick="window.sortStats('count')">기출</th>
                        <th onclick="window.sortStats('wrong')">오답</th>
                        <th onclick="window.sortStats('rate')">오답률</th>
                    </tr>
                </thead>
                <tbody id="stats-body"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="feedback-layer">
    <div id="result-status" style="text-align: center; padding: 12px; border-radius: 12px; font-weight: bold; margin-bottom: 20px; font-size: 1.1rem;"></div>
    <div id="correct-ans-show" style="color: var(--radar-green); font-weight: bold; font-size: 1.1rem; margin-bottom: 10px;"></div>
    <div id="explanation-box" class="exp-box"></div>
    <button id="next-btn" style="background: var(--radar-green); color: black; font-size: 1.1rem;">NEXT CONTACT</button>
</div>

<script>
window.state = {
    difficulty: 'EZ',
    subject: '',
    type: '',
    questions: [],
    currentIndex: 0,
    sessionResults: [],
    statsData: [],
    isProcessing: false,
    sortAsc: true
};

const CONFIG = {
    EZ: {
        URL: "https://script.google.com/macros/s/AKfycbxQdRw8bAcYSfZWNV6r808lVpwED88FaZj6bviR1pMZ2DimYDKHYu13jeT7oXaT04ErGw/exec",
        GIDs: { LAW_MULTI: 0, LAW_SUBJ: 1036407965, CTRL_MULTI: 438358690, CTRL_SUBJ: 1403157384, LAW_STATS: 1846282036, CTRL_STATS: 1880986641 }
    },
    INFERNO: {
        URL: "https://script.google.com/macros/s/AKfycbzjGLlSq7-xpO0dZxCWExg06paUtwsP1kcPBXTCXhDzm8wkU0CJCyCADB0gJKsU76z7RA/exec",
        GIDs: { LAW_MULTI: 0, LAW_SUBJ: 1805786990, CTRL_MULTI: 2049752243, CTRL_SUBJ: 570358631, LAW_STATS: 668283973, CTRL_STATS: 1546545747 }
    }
};

window.showPage = function(pageId) {
    const pages = ['main-page', 'quiz-page', 'loading-page', 'stats-page'];
    pages.forEach(id => document.getElementById(id).classList.add('hidden'));
    document.getElementById(pageId).classList.remove('hidden');
};

window.setDifficulty = (val) => window.state.difficulty = val ? 'INFERNO' : 'EZ';

window.prepMission = (subject, type) => {
    window.state.subject = subject;
    window.state.type = type;
    document.getElementById('subject-cards').classList.add('hidden');
    document.getElementById('mode-selection').classList.remove('hidden');
};

window.loadQuiz = async function(mode) {
    window.showPage('loading-page');
    const cfg = CONFIG[window.state.difficulty];
    const gid = cfg.GIDs[`${window.state.subject}_${window.state.type}`];

    try {
        const res = await fetch(`${cfg.URL}?gid=${gid}`);
        let data = await res.json();
        
        // 데이터 정규화: 헤더 이름에 의존하지 않도록 필드 유연하게 처리
        data = data.filter(row => row.문제 || row['문제']).map(r => ({
            ...r,
            problem: r['문제'] || r['문제 분석'] || '',
            count: Number(r['누적 기출 횟수'] || r['기출'] || 0),
            wrong: Number(r['누적 오답 횟수'] || r['오답'] || 0)
        }));

        if (mode === 'OMAKASE') {
            data.sort((a, b) => a.count - b.count);
        } else {
            data.sort((a, b) => b.wrong - a.wrong);
        }

        window.state.questions = data.slice(0, 100).sort(() => Math.random() - 0.5);
        window.state.currentIndex = 0;
        window.state.sessionResults = [];
        
        window.renderQuestion();
        window.showPage('quiz-page');
    } catch (e) {
        alert("데이터 로드 실패.");
        location.reload();
    }
};

window.renderQuestion = function() {
    const q = window.state.questions[window.state.currentIndex];
    const area = document.getElementById('answer-area');
    area.innerHTML = '';
    window.state.isProcessing = false;

    document.getElementById('pos-display').innerText = `POS: ${window.state.currentIndex + 1} / ${window.state.questions.length}`;
    document.getElementById('pb').style.width = `${((window.state.currentIndex + 1) / window.state.questions.length) * 100}%`;
    document.getElementById('question-box').innerText = `[${q['유형'] || '통합'}] ${q.problem}`;

    if (window.state.type === 'MULTI') {
        const options = [
            { id: 1, text: q['보기1'] }, { id: 2, text: q['보기2'] },
            { id: 3, text: q['보기3'] }, { id: 4, text: q['보기4'] }
        ].filter(o => o.text).sort(() => Math.random() - 0.5);

        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.style = "margin-bottom: 12px; text-align: left; background: #1a1a1a; color: #ddd; border: 1px solid #333;";
            btn.innerText = opt.text;
            btn.onclick = () => window.checkAnswer(opt.id);
            area.appendChild(btn);
        });
    } else {
        const input = document.createElement('input');
        input.id = 'subj-input';
        input.placeholder = "정답을 입력하세요...";
        input.style = "width: 100%; padding: 18px; background: #111; border: 1px solid var(--radar-green); color: white; border-radius: 12px; margin-bottom: 15px; font-size: 1.1rem; box-sizing: border-box;";
        input.onkeyup = (e) => e.key === 'Enter' && window.checkAnswer(input.value);
        area.appendChild(input);

        const btn = document.createElement('button');
        btn.innerText = "제출하기";
        btn.className = "btn-start";
        btn.onclick = () => window.checkAnswer(input.value);
        area.appendChild(btn);
        setTimeout(() => document.getElementById('subj-input')?.focus(), 300);
    }
};

window.checkAnswer = function(userAns) {
    if (window.state.isProcessing) return;
    window.state.isProcessing = true;

    const q = window.state.questions[window.state.currentIndex];
    let isCorrect = false;
    let correctAnswerDisplay = "";

    if (window.state.type === 'MULTI') {
        isCorrect = parseInt(userAns) === parseInt(q['정답번호']);
        correctAnswerDisplay = q[`보기${q['정답번호']}`];
    } else {
        const clean = (s) => String(s || '').replace(/\s+/g, '').toLowerCase().trim();
        isCorrect = clean(userAns) === clean(q['정답']);
        correctAnswerDisplay = q['정답'];
    }

    // [중요] 시트 열 순서에 맞춰 배열로 데이터 전송 (이미지 ce3a02 기준)
    // A: 날짜, B: 유형, C: 문제, D: 사용자 응답, E: 기출횟수, F: 오답횟수, G: 오답률추이, H: 정답여부, I: 실제정답
    const logArray = [
        new Date().toLocaleString('ko-KR'), // A
        q['유형'] || '통합',              // B
        q.problem,                         // C
        String(userAns),                   // D
        1,                                 // E (누적 기출 횟수 증분)
        isCorrect ? 0 : 1,                 // F (누적 오답 횟수 증분)
        "",                                // G (오답률 추이 - 시트 수식용)
        isCorrect ? "O" : "X",             // H
        correctAnswerDisplay               // I
    ];

    window.state.sessionResults.push(logArray);

    const layer = document.getElementById('feedback-layer');
    const status = document.getElementById('result-status');
    status.innerText = isCorrect ? "● CORRECT" : "● INCORRECT";
    status.style.background = isCorrect ? "rgba(0, 255, 65, 0.15)" : "rgba(255, 51, 51, 0.15)";
    status.style.color = isCorrect ? "var(--radar-green)" : "var(--danger-red)";
    
    document.getElementById('correct-ans-show').innerText = `정답: ${correctAnswerDisplay}`;
    document.getElementById('explanation-box').innerText = q['해설'] || "제공된 해설이 없습니다.";
    
    document.getElementById('next-btn').onclick = () => {
        layer.style.display = 'none';
        window.nextQuestion();
    };
    layer.style.display = 'block';
};

window.nextQuestion = () => {
    window.state.currentIndex++;
    if (window.state.currentIndex < window.state.questions.length) window.renderQuestion();
    else window.stopSession();
};

window.stopSession = async function() {
    if (window.state.sessionResults.length === 0) return location.reload();
    
    window.showPage('loading-page');
    document.getElementById('loading-msg').innerText = "DATA SYNCING...";
    const cfg = CONFIG[window.state.difficulty];
    
    try {
        // [수정] 배열 데이터를 전송
        await fetch(cfg.URL, { 
            method: 'POST', 
            mode: 'no-cors',
            body: JSON.stringify({
                results: window.state.sessionResults, // 이제 객체가 아닌 [ [], [], ... ] 배열임
                statsGid: cfg.GIDs[`${window.state.subject}_STATS`],
                isRawArray: true // 배열 전송임을 알리는 플래그
            }) 
        });
        setTimeout(() => location.reload(), 1000);
    } catch (e) {
        location.reload();
    }
};

window.loadStats = async function(subject) {
    window.showPage('loading-page');
    const cfg = CONFIG[window.state.difficulty];
    const gid = cfg.GIDs[`${subject}_STATS`];

    try {
        const res = await fetch(`${cfg.URL}?gid=${gid}`);
        const raw = await res.json();
        
        window.state.statsData = raw.filter(r => r['문제'] || r['문제 분석']).map(r => {
            const count = Number(r['누적 기출 횟수'] || r['기출'] || 0);
            const wrong = Number(r['누적 오답 횟수'] || r['오답'] || 0);
            return {
                type: r['유형'] || '-',
                problem: r['문제'] || r['문제 분석'] || '제목 없음',
                count: count,
                wrong: wrong,
                rate: count > 0 ? (wrong / count) * 100 : 0
            };
        });
        
        window.renderStats();
        window.showPage('stats-page');
    } catch (e) {
        alert("통계 로드 실패.");
        location.reload();
    }
};

window.renderStats = function() {
    const tbody = document.getElementById('stats-body');
    if (window.state.statsData.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" style="padding: 40px; color: #555;">기록이 없습니다.</td></tr>`;
        return;
    }
    tbody.innerHTML = window.state.statsData.map((d, i) => `
        <tr>
            <td><span style="color: #888; font-size: 0.75rem;">${d.type}</span></td>
            <td style="text-align: left;"><div style="font-weight: 600;">${d.problem}</div></td>
            <td>${d.count}</td>
            <td style="color: var(--danger-red);">${d.wrong}</td>
            <td>${d.rate.toFixed(1)}%</td>
        </tr>
    `).join('');
};

window.sortStats = (key) => {
    window.state.sortAsc = !window.state.sortAsc;
    window.state.statsData.sort((a, b) => window.state.sortAsc ? (a[key] > b[key] ? 1 : -1) : (b[key] > a[key] ? 1 : -1));
    window.renderStats();
};
</script>
</body>
</html>
