<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATC Engine v3.0</title>
    <style>
        :root { --bg: #0a0a0a; --green: #00ff41; --red: #ff3333; --card: #151515; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 600px; }
        .hidden { display: none !important; }
        .card { background: var(--card); border: 1px solid #2a2a2a; border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        button { width: 100%; padding: 15px; margin: 5px 0; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.2s; }
        .btn-primary { background: #4f46e5; color: white; }
        .btn-outline { background: transparent; border: 1px solid #333; color: #ccc; }
        .progress-bar { width: 0%; height: 4px; background: var(--green); transition: 0.3s; box-shadow: 0 0 10px var(--green); }
        #feedback-layer { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 600px; background: #111; border-top: 3px solid var(--green); padding: 20px; display: none; border-radius: 20px 20px 0 0; }
        input { width: 100%; padding: 15px; background: #000; border: 1px solid #333; color: #fff; border-radius: 10px; margin-bottom: 10px; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="container" id="app">
    <div id="page-home">
        <h1 style="text-align:center; color:var(--green);">ATC TOWER v3.0</h1>
        <div class="card">
            <h3>항공법규 (LAW)</h3>
            <div style="display:flex; gap:10px;">
                <button class="btn-primary" onclick="prepSession('LAW', 'MULTI')">객관식</button>
                <button class="btn-primary" onclick="prepSession('LAW', 'SUBJ')">주관식</button>
            </div>
        </div>
        <div class="card">
            <h3>항공관제 (CTRL)</h3>
            <div style="display:flex; gap:10px;">
                <button class="btn-primary" onclick="prepSession('CTRL', 'MULTI')">객관식</button>
                <button class="btn-primary" onclick="prepSession('CTRL', 'SUBJ')">주관식</button>
            </div>
        </div>
        <div id="mode-select" class="hidden">
            <div class="card" style="text-align:center; border-color:var(--green);">
                <h2 id="target-title"></h2>
                <button class="btn-outline" onclick="startMission('OMAKASE')">🍱 100문항 오마카세</button>
                <button class="btn-outline" onclick="startMission('WRONG')">📝 100문항 오답노트</button>
                <button onclick="location.reload()" style="background:none; color:#555;">취소</button>
            </div>
        </div>
    </div>

    <div id="page-quiz" class="hidden">
        <div style="display:flex; justify-content:space-between; font-size:0.8rem; color:var(--green); margin-bottom:5px;">
            <span id="quiz-pos">POS: 0 / 0</span>
            <span>AUTO-SYNC ENABLED</span>
        </div>
        <div style="background:#222; height:4px; border-radius:2px;"><div class="progress-bar" id="quiz-pb"></div></div>
        <h2 id="question-text" style="margin: 30px 0; min-height: 100px; line-height:1.5;"></h2>
        <div id="quiz-options"></div>
    </div>

    <div id="page-loading" class="hidden" style="text-align:center; margin-top:100px;">
        <div style="border:4px solid #222; border-top:4px solid var(--green); width:40px; height:40px; border-radius:50%; animation:spin 1s linear infinite; margin: 0 auto;"></div>
        <p id="loading-text" style="color:var(--green); margin-top:20px;">CONNECTING...</p>
    </div>
</div>

<div id="feedback-layer">
    <div id="fb-status" style="text-align:center; font-weight:bold; margin-bottom:15px; padding:10px; border-radius:10px;"></div>
    <div style="background:#222; padding:15px; border-radius:10px; margin-bottom:15px;">
        <div id="fb-answer" style="color:var(--green); margin-bottom:10px; font-weight:bold;"></div>
        <div id="fb-explan" style="font-size:0.9rem; color:#aaa; line-height:1.4;"></div>
    </div>
    <button id="btn-next" class="btn-primary">NEXT CONTACT</button>
</div>

<script>
const CONFIG = {
    URL: "여기에_배포한_GAS_URL_입력",
    GIDs: { 
        LAW_MULTI: 0, LAW_SUBJ: 1, CTRL_MULTI: 2, CTRL_SUBJ: 3, 
        LAW_STATS: 4, CTRL_STATS: 5 
    }
};

let state = {
    subject: '', type: '', questions: [], currentIndex: 0, results: []
};

function showPage(id) {
    ['page-home', 'page-quiz', 'page-loading'].forEach(p => document.getElementById(p).classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
}

function prepSession(sub, type) {
    state.subject = sub; state.type = type;
    document.getElementById('target-title').innerText = `${sub} - ${type === 'MULTI' ? '객관식' : '주관식'}`;
    document.getElementById('mode-select').classList.remove('hidden');
}

async function startMission(mode) {
    showPage('page-loading');
    const statsGid = CONFIG.GIDs[`${state.subject}_STATS`];
    const targetGid = CONFIG.GIDs[`${state.subject}_${state.type}`];

    try {
        // 1. 통계 데이터 로드 (정렬용)
        const sRes = await fetch(`${CONFIG.URL}?gid=${statsGid}`);
        const stats = await sRes.json();
        
        // 2. 실제 문제 데이터 로드
        const qRes = await fetch(`${CONFIG.URL}?gid=${targetGid}`);
        const questions = await qRes.json();

        // 3. 모드별 정렬 로직 (ID 또는 문제텍스트 기준 매칭)
        if (mode === 'OMAKASE') {
            questions.sort((a, b) => {
                const sA = stats.find(s => s.problem === a.problem) || {count: 0, rate: 0};
                const sB = stats.find(s => s.problem === b.problem) || {count: 0, rate: 0};
                return sA.count - sB.count || sB.rate - sA.rate;
            });
        } else {
            questions.sort((a, b) => {
                const sA = stats.find(s => s.problem === a.problem) || {wrong: 0};
                const sB = stats.find(s => s.problem === b.problem) || {wrong: 0};
                return sB.wrong - sA.wrong;
            });
        }

        // 4. 상위 100개 추출 후 셔플
        state.questions = shuffle([...questions.slice(0, 100)]);
        state.currentIndex = 0;
        state.results = [];
        
        renderQuestion();
        showPage('page-quiz');
    } catch (e) {
        alert("통신 오류가 발생했습니다.");
        location.reload();
    }
}

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function renderQuestion() {
    const q = state.questions[state.currentIndex];
    document.getElementById('quiz-pos').innerText = `POS: ${state.currentIndex + 1} / ${state.questions.length}`;
    document.getElementById('quiz-pb').style.width = `${((state.currentIndex + 1) / state.questions.length) * 100}%`;
    document.getElementById('question-text').innerText = `[${q.category}] ${q.problem}`;
    
    const area = document.getElementById('quiz-options');
    area.innerHTML = '';

    if (q.sheetType === 'MULTI') {
        const indexed = q.choices.map((c, i) => ({text: c, originalIdx: i + 1}));
        shuffle(indexed).forEach((c, idx) => {
            const btn = document.createElement('button');
            btn.className = 'btn-outline';
            btn.innerText = `${idx + 1}. ${c.text}`;
            btn.onclick = () => processAnswer(c.originalIdx, c.text);
            area.appendChild(btn);
        });
    } else {
        const input = document.createElement('input');
        input.id = 'ans-input';
        input.onkeyup = (e) => e.key === 'Enter' && processAnswer(input.value, input.value);
        area.appendChild(input);
        const b = document.createElement('button');
        b.className = 'btn-primary'; b.innerText = '제출';
        b.onclick = () => processAnswer(input.value, input.value);
        area.appendChild(b);
        input.focus();
    }
}

function processAnswer(userVal, userText) {
    const q = state.questions[state.currentIndex];
    const clean = (s) => String(s || '').replace(/\s+/g, '').toLowerCase();
    
    // 번호 매칭 또는 텍스트 매칭 (이중 검증)
    const isCorrect = (q.sheetType === 'MULTI') 
        ? (String(userVal) === q.answer || clean(userText) === clean(q.answer))
        : (clean(userVal) === clean(q.answer));

    state.results.push({ problem: q.problem, isCorrect: isCorrect });

    const layer = document.getElementById('feedback-layer');
    const status = document.getElementById('fb-status');
    status.innerText = isCorrect ? "CORRECT" : "INCORRECT";
    status.style.background = isCorrect ? "rgba(0,255,65,0.1)" : "rgba(255,51,51,0.1)";
    status.style.color = isCorrect ? "var(--green)" : "var(--red)";
    
    document.getElementById('fb-answer').innerText = `정답: ${q.answer}`;
    document.getElementById('fb-explan').innerText = q.explan || "해설이 없습니다.";
    
    document.getElementById('btn-next').onclick = () => {
        layer.style.display = 'none';
        state.currentIndex++;
        if (state.currentIndex < state.questions.length) renderQuestion();
        else finishMission();
    };
    layer.style.display = 'block';
}

async function finishMission() {
    showPage('page-loading');
    document.getElementById('loading-text').innerText = "DATA SYNCING...";
    
    try {
        await fetch(CONFIG.URL, {
            method: 'POST',
            body: JSON.stringify({
                results: state.results,
                statsGid: CONFIG.GIDs[`${state.subject}_STATS`]
            })
        });
        alert("훈련 완료! 데이터가 성공적으로 동기화되었습니다.");
        location.reload();
    } catch (e) {
        alert("동기화 중 오류가 발생했으나 훈련은 종료됩니다.");
        location.reload();
    }
}
</script>
<style>@keyframes spin { to { transform: rotate(360deg); } }</style>
</body>
</html>
