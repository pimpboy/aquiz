<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>훈련 진행 중</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f4f7fa; --card: #ffffff; --text: #2d3436;
            --primary: #4361ee; --danger: #ff4d4f; --success: #52c41a;
        }
        body.hell-mode {
            --bg: #0f0f0f; --card: #1a1a1a; --text: #eeeeee;
            --primary: #d93025;
        }
        body {
            font-family: 'Pretendard', sans-serif; background-color: var(--bg);
            color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .quiz-container {
            width: 90%; max-width: 600px; background: var(--card); padding: 30px;
            border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center;
        }
        .header { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 20px; color: #95a5a6; }
        .question { font-size: 1.3rem; font-weight: 800; margin-bottom: 30px; line-height: 1.5; word-break: keep-all; }
        .options { display: grid; gap: 12px; margin-bottom: 30px; }
        .opt-btn {
            padding: 15px; border: 2px solid #dfe6e9; border-radius: 12px;
            background: none; color: var(--text); font-size: 1rem; font-weight: 600;
            cursor: pointer; transition: 0.2s; text-align: left;
        }
        .opt-btn:hover { border-color: var(--primary); background: rgba(67, 97, 238, 0.05); }
        body.hell-mode .opt-btn:hover { background: rgba(217, 48, 37, 0.1); }
        
        .nav-footer { display: flex; gap: 10px; justify-content: center; }
        .btn { padding: 12px 25px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; color: white; }
        .btn-dispute { background: var(--danger); }
        .btn-home { background: #636e72; }

        #result-msg { margin-top: 20px; font-weight: 800; font-size: 1.1rem; min-height: 1.5em; }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="header">
        <span id="mode-badge">LOADING...</span>
        <span id="score-board">Q. 0/0</span>
    </div>

    <div id="quiz-box">
        <div class="question" id="q-text">데이터를 불러오는 중입니다...</div>
        <div class="options" id="q-options"></div>
    </div>

    <div id="result-msg"></div>

    <div class="nav-footer">
        <button class="btn btn-home" onclick="location.href='index.html'">기지 복귀</button>
        <button id="dispute-btn" class="btn btn-dispute" style="display:none;" onclick="triggerDispute()">⚠️ 이의 제기</button>
    </div>
</div>

<script>
    let questions = [];
    let currentIdx = 0;
    let config = {};

    // 1. 데이터 장전 (index.html에서 보낸 세션 읽기)
    window.onload = () => {
        const objData = sessionStorage.getItem('quiz_obj');
        const subData = sessionStorage.getItem('quiz_sub');
        config = JSON.parse(sessionStorage.getItem('quiz_config') || '{}');

        if (!objData) {
            alert("데이터가 없읍니다. 다시 출격하십시오!");
            location.href = 'index.html';
            return;
        }

        if (config.mode === 'hell') {
            document.body.classList.add('hell-mode');
            document.getElementById('mode-badge').innerText = "🔥 HELL MODE";
            document.getElementById('dispute-btn').style.display = "block";
        } else {
            document.getElementById('mode-badge').innerText = "📊 NORMAL MODE";
        }

        // CSV 파싱 (단순화된 파싱 로직)
        parseCSV(objData);
        showQuestion();
    };

    function parseCSV(csv) {
        const lines = csv.split('\n').filter(line => line.trim() !== "");
        const headers = lines[0].split(',');
        
        questions = lines.slice(1).map(line => {
            const cols = line.split(',');
            return {
                id: cols[2], // 문제 내용
                options: [cols[3], cols[4], cols[5], cols[6]],
                ans: cols[7]?.trim()
            };
        }).sort(() => Math.random() - 0.5); // 셔플
    }

   // 1. CSV 파싱 로직 (이걸로 교체하십시오)
function parseCSV(csv) {
    const rows = [];
    let currentRow = [];
    let currentCell = '';
    let inQuotes = false;

    // 문자 단위로 정밀 분석 (따옴표 내 콤마 무시 로직)
    for (let i = 0; i < csv.length; i++) {
        const char = csv[i];
        const nextChar = csv[i + 1];

        if (inQuotes) {
            if (char === '"' && nextChar === '"') { currentCell += '"'; i++; }
            else if (char === '"') { inQuotes = false; }
            else { currentCell += char; }
        } else {
            if (char === '"') { inQuotes = true; }
            else if (char === ',') { currentRow.push(currentCell.trim()); currentCell = ''; }
            else if (char === '\n' || char === '\r') {
                if (currentCell || currentRow.length > 0) {
                    currentRow.push(currentCell.trim());
                    rows.push(currentRow);
                    currentRow = [];
                    currentCell = '';
                }
                if (char === '\r' && nextChar === '\n') i++;
            } else { currentCell += char; }
        }
    }
    if (currentCell || currentRow.length > 0) {
        currentRow.push(currentCell.trim());
        rows.push(currentRow);
    }

    // 데이터 매핑 (아우님의 열 순서: ID(0), 대(1), 중(2), 문제(3), 보기1-4(4-7), 정답(8), 해설(9))
    questions = rows.slice(1).map(cols => {
        if (cols.length < 5) return null; // 유효하지 않은 행 제외

        return {
            mainCat: cols[1] || "",
            subCat: cols[2] || "",
            id: cols[3] ? cols[3].replace(/^[0-9]+\.\s*/, "") : "내용 없음", // 문제 앞 '1. ' 제거
            options: [cols[4], cols[5], cols[6], cols[7]].map(opt => opt ? opt.replace(/^[0-9]+\.\s*/, "") : ""), // 보기 앞 '1. ' 제거
            ansIdx: cols[8] ? Math.floor(parseFloat(cols[8].toString().replace(/[^0-9.]/g, ""))).toString() : "",
            desc: cols[9] || ""
        };
    }).filter(q => q && q.id !== "내용 없음");

    questions.sort(() => Math.random() - 0.5);
    console.log("장전 완료된 문제 수:", questions.length);
}

// 2. 문제 표시 로직 (정제된 데이터 출력)
function showQuestion() {
    const q = questions[currentIdx];
    if (!q) {
        document.getElementById('q-text').innerText = "문제를 찾을 수 없읍니다. (Index Error)";
        return;
    }

    // 상단 분류 표시
    document.getElementById('q-text').innerHTML = `
        <div style="font-size:0.75em; color:var(--primary); font-weight:600; margin-bottom:8px; opacity:0.8;">
            ${q.mainCat} > ${q.subCat}
        </div>
        <div style="line-height:1.4;">${q.id}</div>
    `;
    
    document.getElementById('score-board').innerText = `Q. ${currentIdx + 1}/${questions.length}`;
    
    const optBox = document.getElementById('q-options');
    optBox.innerHTML = "";
    
    q.options.forEach((opt, i) => {
        if (opt) {
            const btn = document.createElement('button');
            btn.className = "opt-btn";
            btn.innerText = `${i + 1}. ${opt}`; // 깔끔하게 번호 붙여서 출력
            btn.onclick = () => checkAnswer((i + 1).toString(), q);
            optBox.appendChild(btn);
        }
    });
}
function checkAnswer(selectedIdx, q) {
    // 정답 번호에서 소수점 제거 (1.0 -> 1)
    const correctIdx = Math.floor(parseFloat(q.ansIdx)).toString();
    const isCorrect = (selectedIdx === correctIdx);
    
    const msg = document.getElementById('result-msg');
    msg.innerHTML = isCorrect 
        ? "✅ 정답입니다!" 
        : `❌ 오답! 정답: ${correctIdx}번<br><small style="font-weight:400; font-size:0.8em;">${q.desc || ''}</small>`;
    
    msg.style.color = isCorrect ? "var(--success)" : "var(--danger)";

    // GAS 전송 데이터 구성
    const resultText = isCorrect ? "PASS" : `FAIL(선택:${selectedIdx}/정답:${correctIdx})`;
    sendRecord(isCorrect, resultText, q.options[parseInt(correctIdx)-1]);

    setTimeout(() => {
        if (currentIdx < questions.length - 1) {
            currentIdx++;
            showQuestion();
            document.getElementById('result-msg').innerText = "";
        } else {
            alert("임무 완료! 기지로 귀환합니다.");
            location.href = 'index.html';
        }
    }, isCorrect ? 1000 : 3000); // 오답 시 해설 볼 시간 부여
}
    function sendRecord(isCorrect, selected) {
        const q = questions[currentIdx];
        const formData = new URLSearchParams();
        formData.append('id', q.id);
        formData.append('isCorrect', isCorrect);
        formData.append('result', selected);
        formData.append('correctAns', q.ans);
        formData.append('subject', config.subject);

        fetch(config.gasUrl, { method: 'POST', body: formData, mode: 'no-cors' });
    }

    // 🔥 불지옥 전용 이의 제기 기능
    function triggerDispute() {
        const q = questions[currentIdx];
        const formData = new URLSearchParams();
        formData.append('action', 'dispute');
        formData.append('id', q.id);
        formData.append('subject', config.subject);

        fetch(config.gasUrl, { method: 'POST', body: formData, mode: 'no-cors' })
        .then(() => {
            alert("⚠️ 이의 제기가 접수되었읍니다. 시트에 박제 완료!");
        });
    }
</script>

</body>
</html>
